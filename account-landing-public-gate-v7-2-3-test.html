<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.2.3 Account Landing TEST</title></head><body><script>
(async function(){
  const src='account-landing-global-helpers-v7-2-1-test.html';
  let html=await fetch(src,{cache:'no-store'}).then(r=>r.text());
  const logo='https://xzxqfrvqdgkzwujbkdbk.supabase.co/storage/v1/object/public/stream-bandit-images/profiles/af380be8-d1e2-4154-a5ed-a113c8271afd/avatar-1779217257297.png';
  html=html.replaceAll('Stream Bandit V7.2.1 Account Landing TEST','Stream Bandit V7.2.3 Account Landing TEST');
  html=html.replaceAll('V7.2.1 Account Landing Global Helpers TEST','V7.2.3 Account Landing Public Gate TEST');
  html=html.replaceAll('This is the account landing route with the current global helper stack: auth sync, avatar, shared style and Settings bridge. When signed out, it shows the landing screen. When signed in, it shows the account dashboard.','This is the account landing route with a clean signed-out landing gate. Signed-out users see the Stream Bandit Original sign in / sign up free screen. Signed-in users see the account dashboard.');
  html=html.replaceAll('V7.2.1 Account Landing Global Helpers TEST — no app data writes, no live/index promotion.','V7.2.3 Account Landing Public Gate TEST — no app data writes, no live/index promotion.');
  html=html.replace('</style>', `
.sb-public-gate{text-align:center;max-width:820px;margin:0 auto;padding:18px}.sb-gate-logo-wrap{position:relative;width:min(330px,72vw);height:min(330px,72vw);margin:0 auto 18px;display:grid;place-items:center}.sb-gate-logo{position:relative;z-index:2;width:100%;height:100%;object-fit:cover;border-radius:36px;box-shadow:0 30px 90px #000b,0 0 60px color-mix(in srgb,var(--good),transparent 45%);border:1px solid #ffffff24}.sb-gate-glow{position:absolute;inset:-18px;border-radius:42px;background:radial-gradient(circle,color-mix(in srgb,var(--purple),transparent 50%),transparent 68%);filter:blur(14px);opacity:.9}.sb-gate-line{font-size:clamp(18px,2.2vw,24px);max-width:700px;margin:14px auto;color:#d9def7}.sb-gate-form{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;margin-top:18px}.sb-gate-form .field{max-width:380px}.sb-public-gate h1{font-size:clamp(46px,8vw,86px);letter-spacing:-.06em}.sb-gate-mini{margin-top:12px;color:var(--muted);font-weight:850}.sb-hidden-when-landing{display:none!important}@media(max-width:700px){.sb-gate-form{display:grid}.sb-gate-form .btn,.sb-gate-form .field{width:100%;max-width:100%}}
</style>`);
  html=html.replace('</body>', `<script>
(function(){
  var LOGO=${JSON.stringify(logo)};
  function buildLanding(){
    var out=document.getElementById('signedOutView');
    if(!out || out.dataset.publicGateReady==='yes') return;
    out.dataset.publicGateReady='yes';
    out.className='box';
    out.innerHTML='<div class="sb-public-gate"><div class="sb-gate-logo-wrap"><img class="sb-gate-logo" src="'+LOGO+'" alt="Stream Bandit Original logo"><div class="sb-gate-glow"></div></div><span class="badge">Stream Bandit Original</span><h1>Stream Bandit</h1><p class="sb-gate-line">Sign in or sign up free to unlock your Stream Bandit account, profile, watch progress and creator tools.</p><div class="sb-gate-form"><input id="emailInput" class="field" type="email" placeholder="Email address"><button id="sendLinkBtn" class="btn primary">Sign in / Sign up free</button><button id="clearEmailBtn" class="btn">Clear</button></div><div class="note">One account link gives access to your profile, dashboard and saved progress. No billing, role or user-management change happens here.</div><div class="sb-gate-mini">Account needed for saved lists, profiles, creator tools and future user management.</div></div>';
    var send=document.getElementById('sendLinkBtn');
    var clear=document.getElementById('clearEmailBtn');
    if(send && typeof window.sendLink==='function') send.onclick=window.sendLink;
    if(clear) clear.onclick=function(){var e=document.getElementById('emailInput'); if(e)e.value=''; var s=document.getElementById('statusBox'); if(s)s.textContent='Email cleared.';};
  }
  function syncLandingVisibility(){
    var out=document.getElementById('signedOutView');
    var inn=document.getElementById('signedInView');
    var signedIn=inn && !inn.classList.contains('hidden');
    var helpers=document.getElementById('globalHelperStatusBox');
    var tabs=document.getElementById('accountTabsBox');
    ['state','order','locked'].forEach(function(id){var el=document.getElementById(id); if(el)el.classList.toggle('sb-hidden-when-landing',!signedIn);});
    if(helpers)helpers.classList.toggle('sb-hidden-when-landing',!signedIn);
    if(tabs)tabs.classList.toggle('sb-hidden-when-landing',!signedIn);
    if(out && !signedIn) buildLanding();
  }
  document.addEventListener('streambandit:auth-state',function(){setTimeout(syncLandingVisibility,80)});
  document.addEventListener('click',function(){setTimeout(syncLandingVisibility,80)});
  setInterval(syncLandingVisibility,700);
  setTimeout(syncLandingVisibility,1200);
})();
</`+`script></body>`);
  document.open();document.write(html);document.close();
})();
</script></body></html>
