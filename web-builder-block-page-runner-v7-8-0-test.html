<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.8.0 Block Page Runner TEST</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--bg:#050711;--panel:#101529;--panel2:#17122d;--line:#ffffff22;--muted:#b9c0d8;--title:#ffffff;--accent:#22d3a6;--btnText:#ffffff}body{margin:0;background:radial-gradient(circle at 8% 0,color-mix(in srgb,var(--accent),transparent 72%),transparent 34%),var(--bg);color:var(--title);font-family:system-ui,Arial;padding:22px}.wrap{max-width:1120px;margin:auto}.box,.hero,.card{border:1px solid var(--line);border-radius:26px;background:linear-gradient(135deg,var(--panel),var(--panel2));padding:22px;margin:0 0 16px;box-shadow:0 18px 60px #0007}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px;font-size:12px}.btn{border:0;border-radius:999px;padding:11px 15px;background:linear-gradient(135deg,var(--accent),#7c3cff);color:var(--btnText);font-weight:900;text-decoration:none;display:inline-block;margin:4px}.warn{background:linear-gradient(135deg,#ffb142,#7c3cff)}h1{font-size:clamp(40px,7vw,78px);line-height:.93;margin:10px 0}h2{margin:0 0 12px}p,small{color:var(--muted);line-height:1.55}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.card{background:#0004}.media{height:230px;border-radius:18px;background:#ffffff12;display:grid;place-items:center;margin:12px 0;overflow:hidden;font-size:48px}.media img{width:100%;height:100%;object-fit:cover}.note{background:#ffb1421f;border:1px solid #ffb14252;color:#ffe7ad;border-radius:16px;padding:12px;font-weight:800}.src{white-space:pre-wrap;background:#0006;border-radius:14px;padding:12px;color:#dfffee;max-height:220px;overflow:auto}.top{display:flex;gap:8px;flex-wrap:wrap}</style></head><body><div class="wrap"><section class="hero"><span class="pill">V7.8.0 Block Page Runner TEST</span><h1 id="title">Block Page</h1><p id="meta">Loading...</p><div class="top"><a id="back" class="btn warn">Back To Preview</a><a id="form" class="btn" style="display:none">Open Form</a></div><p id="status" class="note">Ready.</p></section><main id="main" class="box"><p>Loading block page...</p></main><section class="box"><h2>Debug</h2><div id="debug" class="src">Waiting...</div></section></div><script src="stream-bandit-shell-v6-24.js"></script><script>let sb,page,block;const $=i=>document.getElementById(i);function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function sl(s){return String(s||'block').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'block'}async function init(){if(sb)return;let t=await fetch('stream-bandit-shell-v6-24.js',{cache:'no-store'}).then(r=>r.text());sb=supabase.createClient((t.match(/SUPABASE_URL\s*=\s*'([^']+)'/)||[])[1],(t.match(/SUPABASE_KEY\s*=\s*'([^']+)'/)||[])[1])}function applyStyle(st){st=st||{};document.documentElement.style.setProperty('--bg',st.bg||'#050711');document.documentElement.style.setProperty('--title',st.titleColor||'#ffffff');document.documentElement.style.setProperty('--muted',st.textColor||'#b9c0d8');document.documentElement.style.setProperty('--accent',st.accent||'#22d3a6');document.documentElement.style.setProperty('--btnText',st.buttonText||'#ffffff');document.body.style.fontFamily=st.font||'system-ui,Arial'}function media(b){if(b.imageUrl)return '<div class="media"><img src="'+esc(b.imageUrl)+'"></div>';return '<div class="media">'+esc(b.icon||'🧱')+'</div>'}function cards(a,fn){return '<div class="grid">'+(Array.isArray(a)?a:[]).map(x=>'<article class="card">'+fn(x)+'</article>').join('')+'</div>'}function renderBlock(b){let a=b.items||[],t=String(b.type||'');if(t==='faq')return cards(a,x=>'<h2>Q: '+esc(x.q)+'</h2><p>A: '+esc(x.a)+'</p>');if(t==='pricing')return cards(a,x=>'<h2>'+esc(x.name)+'</h2><p style="font-size:32px;color:var(--title);font-weight:900">'+esc(x.price)+'</p><p>'+esc(x.features)+'</p><a class="btn">'+esc(x.button||'Choose')+'</a>');if(t==='rating')return cards(a,x=>'<h2>'+esc(x.name)+'</h2><p style="font-size:28px;color:var(--title);font-weight:900">Rating '+esc(x.rating)+'</p><p>'+esc(x.review)+'</p>');if(t==='features')return cards(a,x=>'<h2>'+esc(x.icon)+' '+esc(x.title)+'</h2><p>'+esc(x.text)+'</p>');if(t==='image_gallery')return cards(a,x=>(x.url?'<div class="media"><img src="'+esc(x.url)+'"></div>':'<div class="media">🖼️</div>')+'<h2>'+esc(x.title)+'</h2><p>'+esc(x.caption)+'</p>');if(t==='page_feed'||t==='blog')return cards(a,x=>(x.imageUrl?'<div class="media"><img src="'+esc(x.imageUrl)+'"></div>':'<div class="media">📰</div>')+'<h2>'+esc(x.title)+'</h2><p>'+esc(x.body)+'</p>'+(x.link&&x.link!=='#'?'<a class="btn" href="'+esc(x.link)+'">Open</a>':''));if(t==='form')return '<p>This is a form block. Use the form runner.</p><a class="btn" href="web-builder-form-save-v7-6-5-test.html?page='+encodeURIComponent(page.slug)+'">Open Form</a>';return '<h2>'+esc(b.title||'Block')+'</h2>'+media(b)+'<p>'+esc(b.text||'')+'</p>'}async function load(){try{await init();let p=new URL(location.href).searchParams,slug=p.get('page')||'test-page',blockSlug=p.get('block')||'';let r=await sb.from('sb_site_pages').select('*').eq('slug',slug).maybeSingle();if(r.error)throw r.error;if(!r.data){$('main').innerHTML='<h2>No page found</h2><p>No sb_site_pages row for '+esc(slug)+'.</p>';return}page=r.data;applyStyle(page.settings_json);let layout=Array.isArray(page.layout_json)?page.layout_json:[];block=layout.find(b=>(b.blockSlug||sl(b.title||b.type))===blockSlug)||layout.find(b=>sl(b.title||b.type)===blockSlug)||layout[0];$('back').href='web-builder-style-preview-v7-7-7-test.html?page='+encodeURIComponent(page.slug);if(!block){$('main').innerHTML='<h2>No block found</h2><p>This page has no blocks.</p>';return}$('title').textContent=block.title||'Block Page';$('meta').textContent=[page.slug,block.type,block.blockSlug||sl(block.title||block.type)].filter(Boolean).join(' - ');if(String(block.type||'').includes('form')){$('form').style.display='inline-block';$('form').href='web-builder-form-save-v7-6-5-test.html?page='+encodeURIComponent(page.slug)}$('main').innerHTML='<span class="pill">'+esc(block.type||'block')+'</span>'+media(block)+'<p>'+esc(block.text||'')+'</p>'+renderBlock(block);$('debug').textContent=JSON.stringify({page:page.slug,block:block.blockSlug||sl(block.title||block.type),type:block.type},null,2);$('status').textContent='Loaded block page.'}catch(e){$('status').textContent='Load failed: '+(e.message||e);$('debug').textContent=JSON.stringify(e,null,2)}}load();</script></body></html>
