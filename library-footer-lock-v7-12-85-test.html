<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Bandit V7.12.85 Library Footer Lock Loader</title>
<style>
:root{color-scheme:dark}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#22d3a633,transparent 35%),radial-gradient(circle at top right,#7c3cff55,transparent 40%),#050711;color:#fff;font-family:Inter,system-ui,Arial,sans-serif;display:grid;place-items:center;padding:24px}.box{max-width:820px;border:1px solid #ffffff22;border-radius:28px;background:linear-gradient(135deg,#101529,#17122d);box-shadow:0 20px 70px #0007;padding:24px}.pill{display:inline-flex;border-radius:999px;padding:7px 12px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:950}.muted{color:#d7ccff;line-height:1.5}.err{margin-top:14px;color:#ffc4cf;background:#ff4d6d1f;border:1px solid #ff4d6d52;border-radius:18px;padding:12px;white-space:pre-wrap}</style>
</head>
<body>
<div class="box">
<span class="pill">V7.12.85 Fresh Library Cache Bypass</span>
<h1>Loading fresh Library page…</h1>
<p class="muted">This fresh filename bypasses the stuck old Library render and loads the current GitHub file for testing.</p>
<div id="status" class="muted">Fetching current Library code from GitHub…</div>
<div id="err" class="err" hidden></div>
</div>
<script>
(async function(){
  const raw='https://raw.githubusercontent.com/trevieisking/stream-bandit/main/library-global-helpers-v7-4-8-test.html?cb='+Date.now();
  try{
    const res=await fetch(raw,{cache:'no-store'});
    if(!res.ok) throw new Error('Could not fetch current Library code: HTTP '+res.status);
    const html=await res.text();
    if(!html.includes('V7.12.85 Library Footer Lock Fix')) throw new Error('Fetched Library code is not V7.12.85 yet. GitHub raw may still be catching up.');
    document.open();
    document.write(html.replaceAll('library-global-helpers-v7-4-8-test.html','library-footer-lock-v7-12-85-test.html'));
    document.close();
  }catch(e){
    document.getElementById('status').textContent='Fresh Library loader could not continue.';
    const err=document.getElementById('err');
    err.hidden=false;
    err.textContent=(e&&e.message?e.message:String(e))+'\n\nFallback: open the GitHub file or wait for cache to clear.';
  }
})();
</script>
</body>
</html>
