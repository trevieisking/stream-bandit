<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.6.4 Form Submit TEST</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;padding:22px;background:#050711;color:#fff;font-family:system-ui,Arial}.wrap{max-width:980px;margin:auto}.box,.q{border:1px solid #ffffff22;border-radius:24px;background:linear-gradient(135deg,#101529,#17122d);padding:22px;margin:0 0 16px}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px}h1{font-size:clamp(38px,7vw,72px);line-height:.95;margin:8px 0}p,label{color:#b9c0d8;line-height:1.5}.btn{border:0;border-radius:999px;padding:11px 15px;background:linear-gradient(135deg,#22d3a6,#7c3cff);color:#fff;font-weight:900;text-decoration:none;cursor:pointer;display:inline-block;margin:4px}input,textarea{width:100%;border:1px solid #ffffff24;border-radius:14px;background:#0006;color:#fff;padding:12px;font:inherit}textarea{min-height:100px}.choice{display:block;background:#ffffff10;border-radius:14px;padding:10px;margin:8px 0}.out{white-space:pre-wrap;background:#0006;border-radius:14px;padding:14px;color:#dfffee}.row{display:flex;gap:8px;flex-wrap:wrap}.ok{background:#22d3a61f;border:1px solid #22d3a657;color:#dfffee;border-radius:16px;padding:12px;font-weight:900}</style></head><body><div class="wrap"><section class="box"><span class="pill">V7.6.4 Form Submit TEST</span><h1>🧾 Builder Form</h1><p>Real submit-style form runner from a published Web Builder page. It reads the first Form / Contact block from the saved layout.</p><div class="row"><input id="slug" placeholder="page slug" style="max-width:360px"><button id="load" class="btn">Load Form</button><a class="btn" href="web-builder-repeater-canvas-v7-5-7-test.html">Open Builder</a></div><p id="status" class="pill">Ready</p></section><main id="formBox" class="box"><p>No form loaded yet.</p></main><section class="box"><h2>Submission Result</h2><div id="answers" class="out">Fill the form and click Submit Form.</div></section></div><script src="stream-bandit-shell-v6-24.js"></script><script>let sb,page,formBlock;const $=i=>document.getElementById(i);function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}async function init(){if(sb)return;let t=await fetch('stream-bandit-shell-v6-24.js',{cache:'no-store'}).then(r=>r.text());let u=(t.match(/SUPABASE_URL\s*=\s*'([^']+)'/)||[])[1],k=(t.match(/SUPABASE_KEY\s*=\s*'([^']+)'/)||[])[1];sb=supabase.createClient(u,k)}async function loadForm(){try{await init();let s=$('slug').value.trim()||new URL(location.href).searchParams.get('page')||'';if(!s){$('status').textContent='Add a page slug first';return}let r=await sb.from('sb_site_pages').select('*').eq('slug',s).single();if(r.error)throw r.error;page=r.data;let blocks=Array.isArray(page.layout_json)?page.layout_json:[];formBlock=blocks.find(b=>String(b.type||'').includes('form'));if(!formBlock){$('formBox').innerHTML='<p>No form block found on this page.</p>';return}renderForm();$('status').textContent='Loaded form from '+page.slug}catch(e){$('status').textContent='Load failed: '+(e.message||e)}}function field(q,i){let name='q'+i,kind=String(q.kind||'short').toLowerCase(),opts=String(q.options||'').split(/\n|,/).map(x=>x.trim()).filter(Boolean);if(kind.includes('multiple'))return opts.map(o=>'<label class="choice"><input type="radio" name="'+name+'" value="'+esc(o)+'"> '+esc(o)+'</label>').join('');if(kind.includes('yes'))return '<label class="choice"><input type="radio" name="'+name+'" value="Yes"> Yes</label><label class="choice"><input type="radio" name="'+name+'" value="No"> No</label>';if(kind.includes('long'))return '<textarea name="'+name+'" placeholder="Your answer"></textarea>';let type=kind.includes('email')?'email':kind.includes('phone')?'tel':'text';return '<input name="'+name+'" type="'+type+'" placeholder="Your answer">'}function renderForm(){let qs=Array.isArray(formBlock.items)?formBlock.items:[];$('formBox').innerHTML='<h2>'+esc(formBlock.title||'Form')+'</h2><p>'+esc(formBlock.text||'')+'</p><form id="f">'+qs.map((q,i)=>'<div class="q"><b>'+esc(q.label||('Question '+(i+1)))+'</b>'+(q.required?' <span class="pill">required</span>':'')+'<p>'+esc(q.kind||'short')+'</p>'+field(q,i)+'</div>').join('')+'<button class="btn" type="button" id="submitForm">Submit Form</button></form>';document.getElementById('submitForm').onclick=submitForm}function submitForm(){let qs=Array.isArray(formBlock.items)?formBlock.items:[], data=[],missing=[];qs.forEach((q,i)=>{let els=[...document.querySelectorAll('[name=q'+i+']')],val='';if(els[0]&&els[0].type==='radio'){let c=els.find(x=>x.checked);val=c?c.value:''}else val=els[0]?els[0].value.trim():'';if(q.required&&!val)missing.push(q.label||('Question '+(i+1)));data.push((q.label||('Question '+(i+1)))+': '+val)});if(missing.length){$('answers').textContent='Please complete required question(s):\n'+missing.join('\n');$('status').textContent='Submit blocked: required answers missing';return}$('answers').innerHTML='<div class="ok">Submitted successfully for '+esc(page.slug)+'.</div><pre>'+esc(data.join('\n'))+'</pre>';$('status').textContent='Form submitted locally. Supabase submission save comes next.'}document.getElementById('load').onclick=loadForm;let start=new URL(location.href).searchParams.get('page')||'';$('slug').value=start;if(start)loadForm();</script></body></html>
