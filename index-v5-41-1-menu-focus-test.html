<script>
(function(){
'use strict';
var VERSION='V5.41.1 Menu Focus TEST';
var lastSideScroll=0;
function side(){return document.querySelector('.side')||document.querySelector('aside')}
function main(){return document.querySelector('.main')||document.querySelector('main')}
function note(){
  if(document.getElementById('sb5411Note'))return;
  var m=main(); if(!m)return;
  var d=document.createElement('div');
  d.id='sb5411Note';
  d.textContent=VERSION+' active — menu clicks refocus the opened page content.';
  d.style.cssText='margin:8px 0 12px;padding:9px 12px;border-radius:14px;background:rgba(34,211,166,.12);border:1px solid rgba(34,211,166,.3);color:#baf7df;font-weight:850;font-size:13px';
  var top=m.querySelector('.top')||m.firstElementChild;
  if(top&&top.parentNode)top.parentNode.insertBefore(d,top.nextSibling);
}
function restoreSide(){var s=side(); if(s){try{s.scrollTop=lastSideScroll}catch(e){}}}
function focusMain(){
  var m=main(); if(!m)return;
  note();
  restoreSide();
  try{m.setAttribute('tabindex','-1');m.focus({preventScroll:true})}catch(e){}
  var y=Math.max(0,m.getBoundingClientRect().top+window.scrollY-10);
  try{window.scrollTo({top:y,behavior:'smooth'})}catch(e){window.scrollTo(0,y)}
}
function scheduleFocus(){setTimeout(focusMain,180);setTimeout(focusMain,520);setTimeout(focusMain,950)}
document.addEventListener('pointerdown',function(e){var s=side();if(s)lastSideScroll=s.scrollTop||0;var btn=e.target&&e.target.closest?e.target.closest('.side button[data-view],.side button,aside button[data-view],aside button'):null;if(btn)scheduleFocus();},true);
document.addEventListener('click',function(e){var btn=e.target&&e.target.closest?e.target.closest('.side button[data-view],.side button,aside button[data-view],aside button'):null;if(btn)scheduleFocus();},true);
new MutationObserver(function(){setTimeout(note,120)}).observe(document.documentElement,{childList:true,subtree:true});
setTimeout(note,1000);
console.log('[Stream Bandit]',VERSION+' loaded');
})();
</script>
