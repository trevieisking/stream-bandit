<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.7.1 Preview Block Focus TEST</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;background:#050711;color:white;font-family:system-ui,Arial;padding:22px}.wrap{max-width:1180px;margin:auto}.box,.block,.card{border:1px solid #ffffff22;border-radius:24px;background:linear-gradient(135deg,#101529,#17122d);padding:20px;margin:0 0 16px}.focus{outline:4px solid #22d3a688}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px;font-size:12px}.btn{border:0;border-radius:999px;padding:11px 15px;background:linear-gradient(135deg,#22d3a6,#7c3cff);color:#fff;font-weight:900;text-decoration:none;display:inline-block;margin:4px}.warn{background:linear-gradient(135deg,#ffb142,#7c3cff)}h1{font-size:clamp(38px,7vw,72px);line-height:.95;margin:8px 0}p,small{color:#b9c0d8;line-height:1.5}input{border:1px solid #ffffff24;border-radius:999px;background:#0006;color:white;padding:12px 15px;font:inherit;min-width:260px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}.card{background:#0004}.media{height:130px;border-radius:14px;background:#ffffff12;display:grid;place-items:center;margin:10px 0;overflow:hidden}.media img{width:100%;height:100%;object-fit:cover}.link{word-break:break-all;background:#0006;color:#dfffee;border-radius:12px;padding:10px;margin-top:8px;font-size:12px}.note{background:#ffb1421f;border:1px solid #ffb14252;color:#ffe7ad;border-radius:16px;padding:12px;font-weight:800}.src{white-space:pre-wrap;background:#0006;border-radius:14px;padding:12px;color:#dfffee;max-height:220px;overflow:auto}</style></head><body><div class="wrap"><section class="box"><span class="pill">V7.7.1 Preview Block Focus TEST</span><h1>🏗️ Published Preview</h1><p>Normal block buttons stay on the same saved page and focus the block. Form blocks open the real form save page.</p><input id="slug" value="test-page" placeholder="page slug"><a id="load" class="btn">Load Page</a><a class="btn warn" href="web-builder-workflow-tabs-v7-6-9-test.html">Workflow Tabs</a><p id="status" class="note">Ready.</p></section><main id="main" class="box"><h2>No page loaded</h2><p>Load a published builder page.</p></main><section class="box"><h2>Debug</h2><div id="debug" class="src">Waiting...</div></section></div><script src="stream-bandit-shell-v6-24.js"></script><script>let sb,page,focusBlock='';const $=i=>document.getElementById(i);function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function sl(s){return String(s||'block').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'block'}async function init(){if(sb)return;let t=await fetch('stream-bandit-shell-v6-24.js',{cache:'no-store'}).then(r=>r.text());sb=supabase.createClient((t.match(/SUPABASE_URL\s*=\s*'([^']+)'/)||[])[1],(t.match(/SUPABASE_KEY\s*=\s*'([^']+)'/)||[])[1])}function isForm(b){return String(b.type||'').toLowerCase().includes('form')||String(b.title||'').toLowerCase().includes('form')}function goodRaw(raw){raw=String(raw||'').trim();return raw&&raw!=='#'&&raw!=='/'&&!raw.startsWith('/')}function actionFor(b){let cur=page&&page.slug||$('slug').value.trim(),raw=String(b.buttonLink||b.button_link||'').trim(),bs=sl(b.title||b.type);if(isForm(b))return 'web-builder-form-save-v7-6-5-test.html?page='+encodeURIComponent(cur);if(goodRaw(raw))return raw;return 'web-builder-preview-block-focus-v7-7-1-test.html?page='+encodeURIComponent(cur)+'&block='+encodeURIComponent(bs)}function cards(a,fn){return '<div class="grid">'+(Array.isArray(a)?a:[]).map(x=>'<div class="card">'+fn(x)+'</div>').join('')+'</div>'}function media(b){if(b.imageUrl)return '<div class="media"><img src="'+esc(b.imageUrl)+'"></div>';return ['image_gallery','image_hero','blog','video'].includes(String(b.type||''))?'<div class="media">'+esc(b.icon||'🖼️')+' Media preview</div>':''}function inner(b){let a=b.items||[],t=String(b.type||'');if(t==='form')return cards(a,x=>'<b>'+esc(x.label)+'</b><p>'+esc(x.kind)+(x.required?' · Required':'')+'</p>'+(x.options?'<p><b>Choices:</b><br>'+esc(x.options)+'</p>':''));if(t==='faq')return cards(a,x=>'<b>Q: '+esc(x.q)+'</b><p>A: '+esc(x.a)+'</p>');if(t==='pricing')return cards(a,x=>'<b>'+esc(x.name)+'</b><p>'+esc(x.price)+'</p><p>'+esc(x.features)+'</p>');if(t==='rating')return cards(a,x=>'<b>'+esc(x.name)+'</b><p>⭐ '+esc(x.rating)+'</p><p>'+esc(x.review)+'</p>');if(t==='features')return cards(a,x=>'<b>'+esc(x.icon)+' '+esc(x.title)+'</b><p>'+esc(x.text)+'</p>');if(t==='page_feed'||t==='blog')return cards(a,x=>'<b>'+esc(x.title)+'</b><p>'+esc(x.body)+'</p>');if(t==='image_gallery')return cards(a,x=>(x.url?'<div class="media"><img src="'+esc(x.url)+'"></div>':'')+'<b>'+esc(x.title)+'</b><p>'+esc(x.caption)+'</p>');return ''}function block(b){let bs=sl(b.title||b.type),link=actionFor(b),f=focusBlock&&focusBlock===bs;return '<section id="block-'+bs+'" class="block '+(f?'focus':'')+'"><span class="pill">'+esc(b.icon||'🧱')+' '+esc(b.type||'block')+'</span>'+(f?'<span class="pill">focused</span>':'')+'<h2>'+esc(b.title||'Block')+'</h2>'+media(b)+'<p>'+esc(b.text||'')+'</p>'+inner(b)+'<a class="btn" href="'+esc(link)+'">'+esc(isForm(b)?'Open Form':(b.buttonText||'Open'))+'</a><div class="link">'+esc(link)+'</div></section>'}async function load(){try{await init();let params=new URL(location.href).searchParams;let s=$('slug').value.trim()||params.get('page')||'test-page';focusBlock=params.get('block')||'';let r=await sb.from('sb_site_pages').select('*').eq('status','published').eq('slug',s).maybeSingle();if(r.error)throw r.error;if(!r.data){$('status').textContent='No published page found for '+s;$('main').innerHTML='<h2>No page found</h2><p>No sb_site_pages row for '+esc(s)+'.</p>';return}page=r.data;$('slug').value=page.slug;let layout=Array.isArray(page.layout_json)?page.layout_json:[];$('main').innerHTML='<h2>'+esc(page.title||page.slug)+'</h2><p>'+esc([page.slug,page.page_type,page.status].filter(Boolean).join(' · '))+'</p>'+layout.map(block).join('');$('debug').textContent=JSON.stringify({page:page.slug,blocks:layout.length,focus:focusBlock},null,2);$('status').textContent='Loaded '+page.slug+(focusBlock?' and focused '+focusBlock:'.');setTimeout(()=>{let el=focusBlock&&document.getElementById('block-'+focusBlock);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},250)}catch(e){$('status').textContent='Load failed: '+(e.message||e);$('debug').textContent=JSON.stringify(e,null,2)}}$('load').onclick=()=>{location.href='web-builder-preview-block-focus-v7-7-1-test.html?page='+encodeURIComponent($('slug').value.trim()||'test-page')};let start=new URL(location.href).searchParams.get('page')||'test-page';$('slug').value=start;load();</script></body></html>
