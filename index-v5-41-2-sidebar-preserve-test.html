<script>
(function(){
'use strict';
var VERSION='V5.41.2 Sidebar Preserve TEST';
var savedY=0;
function side(){return document.querySelector('.side')||document.querySelector('aside')}
function main(){return document.querySelector('.main')||document.querySelector('main')}
function save(){var s=side(); if(s){savedY=s.scrollTop||0; try{sessionStorage.setItem('sb5412_side_y',String(savedY))}catch(e){}}}
function load(){try{savedY=Number(sessionStorage.getItem('sb5412_side_y')||savedY||0)}catch(e){}}
function restore(){load();var s=side();if(!s)return;if(savedY>0){try{s.scrollTop=savedY}catch(e){}}}
function note(){if(document.getElementById('sb5412Note'))return;var m=main();if(!m)return;var d=document.createElement('div');d.id='sb5412Note';d.textContent=VERSION+' active — preserving sidebar menu scroll only.';d.style.cssText='margin:8px 0 12px;padding:9px 12px;border-radius:14px;background:rgba(34,211,166,.12);border:1px solid rgba(34,211,166,.3);color:#baf7df;font-weight:850;font-size:13px';var top=m.querySelector('.top')||m.firstElementChild;if(top&&top.parentNode)top.parentNode.insertBefore(d,top.nextSibling)}
function restoreMany(){setTimeout(restore,60);setTimeout(restore,180);setTimeout(restore,420);setTimeout(restore,900);setTimeout(note,350)}
document.addEventListener('scroll',function(e){if(e.target===side())save()},true);
document.addEventListener('pointerdown',function(e){if(e.target&&e.target.closest&&e.target.closest('.side,aside')){save();restoreMany()}},true);
document.addEventListener('click',function(e){if(e.target&&e.target.closest&&e.target.closest('.side,aside')){save();restoreMany()}},true);
new MutationObserver(function(){restoreMany()}).observe(document.documentElement,{childList:true,subtree:true});
setInterval(function(){restore();note()},1200);
setTimeout(function(){restore();note()},1000);
console.log('[Stream Bandit]',VERSION+' loaded');
})();
