<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.6.6 Form Viewer TEST</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;background:#050711;color:white;font-family:system-ui,Arial;padding:24px}.wrap{max-width:1100px;margin:auto}.box,.card{border:1px solid #ffffff22;border-radius:24px;background:linear-gradient(135deg,#101529,#17122d);padding:20px;margin:0 0 16px}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px;font-size:12px}.btn{border:0;border-radius:999px;padding:11px 15px;background:linear-gradient(135deg,#22d3a6,#7c3cff);color:#fff;font-weight:900;text-decoration:none;cursor:pointer;margin:4px}input{border:1px solid #ffffff24;border-radius:999px;background:#0006;color:white;padding:12px 15px;font:inherit;min-width:260px}h1{font-size:clamp(36px,7vw,68px);line-height:.95;margin:8px 0}p,small{color:#b9c0d8;line-height:1.5}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.answer{border:1px solid #ffffff1a;border-radius:16px;background:#0005;padding:12px;margin-top:8px}.answer b{color:#baf7df}.note{background:#ffb1421f;border:1px solid #ffb14252;color:#ffe7ad;border-radius:16px;padding:12px;font-weight:800}.src{white-space:pre-wrap;word-break:break-word;background:#0006;border-radius:14px;padding:12px;color:#dfffee;max-height:220px;overflow:auto}</style></head><body><div class="wrap"><section class="box"><span class="pill">V7.6.6 Form Viewer TEST</span><h1>🧾 Form Answers</h1><p>Read-only viewer for Web Builder form answers saved in <b>sb_form_submissions</b>.</p><input id="filter" placeholder="page slug, blank = all"><button id="load" class="btn">Load Answers</button><a class="btn" href="web-builder-form-save-v7-6-5-test.html?page=test-page">Open Form Save</a><p id="status" class="note">Ready.</p></section><section class="box"><h2>Saved form submissions</h2><div id="list"><p>No rows loaded yet.</p></div></section><section class="box"><h2>Debug</h2><div id="debug" class="src">Waiting...</div></section></div><script src="stream-bandit-shell-v6-24.js"></script><script>let sb;const $=i=>document.getElementById(i);function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}async function init(){if(sb)return;let t=await fetch('stream-bandit-shell-v6-24.js',{cache:'no-store'}).then(r=>r.text());let u=(t.match(/SUPABASE_URL\s*=\s*'([^']+)'/)||[])[1],k=(t.match(/SUPABASE_KEY\s*=\s*'([^']+)'/)||[])[1];sb=supabase.createClient(u,k)}function answerList(o){if(!o||typeof o!=='object')return '<div class="answer">No answers.</div>';return Object.keys(o).map(k=>{let v=o[k],a=(v&&typeof v==='object')?v.answer:v,t=(v&&typeof v==='object')?v.type:'';return '<div class="answer"><b>'+esc(k)+'</b><p>'+esc(a||'')+'</p>'+(t?'<small>Type: '+esc(t)+'</small>':'')+'</div>'}).join('')}function card(r){return '<article class="card"><span class="pill">'+esc(r.page_slug)+'</span> <span class="pill">'+esc(r.status||'new')+'</span><h2>'+esc(r.form_title||'Form submission')+'</h2><p><b>ID:</b> '+esc(r.id)+'</p><p><b>Created:</b> '+esc(r.created_at||'')+'</p>'+answerList(r.answers_json)+'</article>'}async function loadRows(){try{await init();let f=$('filter').value.trim();let q=sb.from('sb_form_submissions').select('*').order('created_at',{ascending:false}).limit(50);if(f)q=q.eq('page_slug',f);let r=await q;if(r.error)throw r.error;let rows=r.data||[];$('list').innerHTML=rows.length?'<div class="grid">'+rows.map(card).join('')+'</div>':'<p>No form submissions found.</p>';$('debug').textContent=JSON.stringify({count:rows.length},null,2);$('status').textContent='Loaded '+rows.length+' form submission(s).'}catch(e){$('status').textContent='Load failed: '+(e.message||e);$('debug').textContent=JSON.stringify(e,null,2)}}$('load').onclick=loadRows;$('filter').value=new URL(location.href).searchParams.get('page')||'';loadRows();</script></body></html>
