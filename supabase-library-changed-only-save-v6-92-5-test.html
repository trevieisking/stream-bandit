<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V6.92.5 Supabase Library Changed Only Save TEST</title><style>body{margin:0;background:#050711;color:#fff;font-family:Inter,system-ui,Arial,sans-serif;padding:24px}.box{max-width:900px;margin:auto;border:1px solid #ffffff24;border-radius:24px;background:#11162d;padding:24px}.ok{color:#baf7df}.warn{color:#ffe7ad}</style></head><body><div class="box"><h1>Loading V6.92.5 Supabase Library Changed Only Save TEST...</h1><p class="ok">Safe wrapper: pulls V6.91.9 and replaces only Save Video with changed-fields-only save.</p><p class="warn">Protected: no index.html, registry, details, Player 1, or Player 2 changes.</p></div><script>(async function(){try{let html=await fetch('supabase-library-rpc-manager-v6-91-9-test.html',{cache:'no-store'}).then(function(r){if(!r.ok)throw new Error('Could not load V6.91.9 source page');return r.text();});html=html.replaceAll('V6.91.9 Supabase Library RPC Manager TEST','V6.92.5 Supabase Library Changed Only Save TEST');html=html.replaceAll('V6.91.9','V6.92.5');html=html.replace('RPC Manager TEST. Save/Hide use Supabase admin RPC helpers.','Changed Only Save TEST. Edit Save updates only changed fields and verifies by re-reading. Hide still uses the same helper.');html=html.replace('This page uses the new Supabase functions for existing video edits and hide/delete-from-library, avoiding the update path that timed out.','This page keeps the V6.91.9 library UI and protected routes, but avoids timeout risk by saving only fields that actually changed.');html=html.replace('<div class="card"><b>Save Video</b><p>Uses sb_admin_update_movie RPC.</p></div>','<div class="card"><b>Save Video</b><p>Only changed fields are saved, then Supabase is re-read to verify.</p></div>');html=html.replace('function collect(){syncSource();return{id:$(\'editId\').textContent.trim(),title:$(\'f_title\').value.trim(),description:$(\'f_description\').value.trim(),mux_playback_url:$(\'f_mux_playback_url\').value.trim(),video_url:$(\'f_video_url\').value.trim(),thumbnail_url:$(\'f_thumbnail_url\').value.trim(),trailer_url:$(\'f_trailer_url\').value.trim(),year:$(\'f_year\').value.trim(),rating:$(\'f_rating\').value.trim(),runtime_text:$(\'f_runtime_text\').value.trim(),age_rating:$(\'f_age_rating\').value.trim(),director:$(\'f_director\').value.trim(),cast_text:cleanCast($(\'f_cast_text\').value),genres:listToArray($(\'f_genres\').value),tags:listToArray($(\'f_tags\').value),channel_id:$(\'f_channel_id\').value.trim(),owner_id:$(\'f_owner_id\').value.trim(),featured:$(\'f_featured\').value===\'true\',duration_seconds:Number($(\'f_duration_seconds\').value||0),source_type:$(\'f_source_type\').value,status:$(\'f_status\').value}}','function nullableInput(id){const v=$(id).value.trim();return v?v:null}\nfunction nullableText(id){const v=$(id).value.trim();return v?v:null}\nfunction norm(v){if(v===undefined||v===null)return null;if(Array.isArray(v))return JSON.stringify(v);return String(v)}\nfunction sameValue(a,b){if(Array.isArray(a)||Array.isArray(b))return JSON.stringify(a||[])===JSON.stringify(b||[]);return norm(a)===norm(b)}\nfunction collect(){syncSource();const cast=cleanCast($(\'f_cast_text\').value);const data={id:$(\'editId\').textContent.trim(),title:$(\'f_title\').value.trim(),description:$(\'f_description\').value.trim(),mux_playback_url:$(\'f_mux_playback_url\').value.trim(),video_url:$(\'f_video_url\').value.trim(),thumbnail_url:$(\'f_thumbnail_url\').value.trim(),trailer_url:$(\'f_trailer_url\').value.trim(),year:$(\'f_year\').value.trim(),rating:$(\'f_rating\').value.trim(),runtime_text:$(\'f_runtime_text\').value.trim(),age_rating:$(\'f_age_rating\').value.trim(),director:nullableText(\'f_director\'),cast_text:cast||null,genres:listToArray($(\'f_genres\').value),tags:listToArray($(\'f_tags\').value),channel_id:nullableInput(\'f_channel_id\'),owner_id:nullableInput(\'f_owner_id\'),featured:$(\'f_featured\').value===\'true\',duration_seconds:Number($(\'f_duration_seconds\').value||0),source_type:$(\'f_source_type\').value,status:$(\'f_status\').value};dbg(\'V6.92.5 changed-only payload ready\',{id:data.id,title:data.title,description:data.description,channel_id:data.channel_id,owner_id:data.owner_id,status:data.status,source_type:data.source_type,cast_length:data.cast_text?data.cast_text.length:0,genres:data.genres,tags:data.tags});return data}\nasync function withTimeout(promise,label,ms){let timer;const timeout=new Promise((_,reject)=>{timer=setTimeout(()=>reject(new Error(label+\' timed out after \'+ms+\'ms\')),ms)});try{return await Promise.race([promise,timeout])}finally{clearTimeout(timer)}}');html=html.replace('async function saveVideo(){if(busy)return;busy=true;$(\'saveVideo\').disabled=true;try{const data=collect();if(!data.id)throw Error(\'No video ID\');if(!data.title)throw Error(\'Title is required\');dbg(\'RPC save start\',{id:data.id,title:data.title,status:data.status});const r=await sb.rpc(\'sb_admin_update_movie\',{p_movie:data});if(r.error)throw r.error;dbg(\'RPC save ok\',r.data||data);setStatus(\'Video saved with RPC helper: \'+data.title+\'. Reloading...\');closeModal(\'editModal\');setTimeout(()=>load(true),500)}catch(e){dbg(\'RPC save error\',{message:e.message||String(e)});setStatus(\'RPC Save Video failed: \'+(e.message||e),true)}finally{busy=false;$(\'saveVideo\').disabled=false}}','async function saveVideo(){if(busy)return;busy=true;$(\'saveVideo\').disabled=true;try{const data=collect();if(!data.id)throw Error(\'No video ID\');if(!data.title)throw Error(\'Title is required\');const id=data.id;const current=editing||movies.find(m=>String(m.id)===String(id))||{};const fields=[\'title\',\'description\',\'mux_playback_url\',\'video_url\',\'thumbnail_url\',\'trailer_url\',\'year\',\'rating\',\'runtime_text\',\'age_rating\',\'director\',\'channel_id\',\'owner_id\',\'featured\',\'duration_seconds\',\'source_type\',\'status\',\'genres\',\'tags\',\'cast_text\'];const patch={};const changed=[];for(const field of fields){if(!sameValue(data[field],current[field])){patch[field]=data[field];changed.push(field)}}if(!changed.length){dbg(\'changed-only save skipped\',{reason:\'No changed fields detected\',id:id});setStatus(\'No changes detected for \'+data.title+\'.\');closeModal(\'editModal\');return}patch.updated_at=new Date().toISOString();dbg(\'changed-only save start\',{id:id,changed:changed,patchPreview:Object.fromEntries(Object.entries(patch).map(([k,v])=>[k,k===\'cast_text\'&&v?String(v).slice(0,240)+\'... length=\'+String(v).length:v]))});const r=await withTimeout(sb.from(\'sb_movies\').update(patch).eq(\'id\',id).select(\'id,title,description,updated_at\').maybeSingle(),\'Changed-only save\',20000);if(r.error)throw r.error;if(!r.data)throw Error(\'Changed-only save returned no row. Check login/RLS permissions.\');dbg(\'changed-only save returned\',r.data);const verify=await withTimeout(sb.from(\'sb_movies\').select(\'*\').eq(\'id\',id).maybeSingle(),\'Verify re-read\',20000);if(verify.error)throw verify.error;if(!verify.data)throw Error(\'Verify re-read returned no row.\');movies=movies.map(m=>String(m.id)===String(id)?verify.data:m);editing=verify.data;dbg(\'changed-only save verified from Supabase\',{changed:changed,id:verify.data.id,title:verify.data.title,description:verify.data.description,rating:verify.data.rating,runtime_text:verify.data.runtime_text,age_rating:verify.data.age_rating,director:verify.data.director,featured:verify.data.featured,genres:verify.data.genres,tags:verify.data.tags,cast_length:verify.data.cast_text?String(verify.data.cast_text).length:0,updated_at:verify.data.updated_at});setStatus(\'Changed fields saved and verified from Supabase: \'+changed.join(\', \')+\'.\');closeModal(\'editModal\');render()}catch(e){dbg(\'changed-only save error\',{message:e.message||String(e)});setStatus(\'Changed Only Save failed: \'+(e.message||e),true)}finally{busy=false;$(\'saveVideo\').disabled=false}}');html=html.replace('V6.92.5 Supabase Library RPC Manager TEST — no live/index promotion.','V6.92.5 Supabase Library Changed Only Save TEST — no live/index promotion.');document.open();document.write(html);document.close();}catch(e){document.body.innerHTML='<div class="box"><h1>V6.92.5 load failed</h1><p>'+String(e.message||e)+'</p><p>This wrapper did not change any live files.</p></div>';}})();</script></body></html>
