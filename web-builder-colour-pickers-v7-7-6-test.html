<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.7.6 Colour Pickers TEST</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;background:#050711;color:white;font-family:system-ui,Arial;padding:22px}.wrap{max-width:1100px;margin:auto}.box,.card{border:1px solid #ffffff22;border-radius:24px;background:linear-gradient(135deg,#101529,#17122d);padding:20px;margin:0 0 16px}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px;font-size:12px}.btn{border:0;border-radius:999px;padding:11px 15px;background:linear-gradient(135deg,#22d3a6,#7c3cff);color:white;font-weight:900;text-decoration:none;display:inline-block;margin:4px;cursor:pointer}.warn{background:linear-gradient(135deg,#ffb142,#7c3cff)}.hot{background:linear-gradient(135deg,#ff2d85,#7c3cff)}h1{font-size:clamp(38px,7vw,72px);line-height:.95;margin:8px 0}p,label{color:#b9c0d8;line-height:1.5}input,select{border:1px solid #ffffff24;border-radius:14px;background:#0006;color:white;padding:11px;font:inherit;width:100%;margin:5px 0}input[type=color]{height:52px;padding:4px;cursor:pointer}.row{display:flex;gap:8px;flex-wrap:wrap}.row input{max-width:330px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.note{background:#ffb1421f;border:1px solid #ffb14252;color:#ffe7ad;border-radius:16px;padding:12px;font-weight:800}.previewBox{border-radius:22px;padding:20px;margin-top:10px;background:#050711}.previewBtn{display:inline-block;border-radius:999px;padding:11px 15px;font-weight:900;text-decoration:none}.src{white-space:pre-wrap;word-break:break-word;background:#0006;border-radius:14px;padding:12px;color:#dfffee;max-height:220px;overflow:auto}</style></head><body><div class="wrap"><section class="box"><span class="pill">V7.7.6 Web Builder Colour Pickers TEST</span><h1>Colour Pickers</h1><p>Proper colour picker controls for Web Builder page style settings.</p><div class="row"><input id="slug" value="test-page" placeholder="page slug"><button id="load" class="btn">Load</button><button id="save" class="btn hot">Save Colours</button><a id="builder" class="btn warn" href="web-builder-unified-shell-v7-7-5-test.html?page=test-page">Open Builder</a></div><p id="status" class="note">Ready.</p></section><section class="box"><h2>Pick colours</h2><div class="grid"><label>Accent colour<input id="accent" type="color" value="#22d3a6"></label><label>Background colour<input id="bg" type="color" value="#050711"></label><label>Title colour<input id="titleColor" type="color" value="#ffffff"></label><label>Text colour<input id="textColor" type="color" value="#b9c0d8"></label><label>Button text colour<input id="buttonText" type="color" value="#ffffff"></label><label>Font<select id="font"><option>system-ui</option><option>Arial</option><option>Georgia</option><option>Verdana</option></select></label></div><div id="preview" class="previewBox"><h2>Style Preview</h2><p>This preview should change instantly when you pick colours.</p><a id="previewBtn" class="previewBtn">Example button</a></div></section><section class="box"><h2>Debug</h2><div id="debug" class="src">Waiting...</div></section></div><script src="stream-bandit-shell-v6-24.js"></script><script>let sb;const $=i=>document.getElementById(i);function styleJson(){return{version:'V7.7.6',builder:'colour-pickers',accent:$('accent').value,bg:$('bg').value,titleColor:$('titleColor').value,textColor:$('textColor').value,buttonText:$('buttonText').value,font:$('font').value}}async function init(){if(sb)return;let t=await fetch('stream-bandit-shell-v6-24.js',{cache:'no-store'}).then(r=>r.text());sb=supabase.createClient((t.match(/SUPABASE_URL\s*=\s*'([^']+)'/)||[])[1],(t.match(/SUPABASE_KEY\s*=\s*'([^']+)'/)||[])[1])}function render(){let s=styleJson();$('preview').style.background=s.bg;$('preview').style.fontFamily=s.font;$('preview').querySelector('h2').style.color=s.titleColor;$('preview').querySelector('p').style.color=s.textColor;$('previewBtn').style.background='linear-gradient(135deg,'+s.accent+',#7c3cff)';$('previewBtn').style.color=s.buttonText;$('builder').href='web-builder-unified-shell-v7-7-5-test.html?page='+encodeURIComponent($('slug').value.trim()||'test-page');$('debug').textContent=JSON.stringify(s,null,2)}async function load(){try{await init();let s=$('slug').value.trim()||'test-page';let r=await sb.from('sb_site_pages').select('settings_json').eq('slug',s).maybeSingle();if(r.error)throw r.error;let st=r.data&&r.data.settings_json||{};$('accent').value=st.accent||'#22d3a6';$('bg').value=st.bg||'#050711';$('titleColor').value=st.titleColor||'#ffffff';$('textColor').value=st.textColor||'#b9c0d8';$('buttonText').value=st.buttonText||'#ffffff';$('font').value=st.font||'system-ui';render();$('status').textContent=r.data?'Loaded colours for '+s:'No saved colours yet for '+s}catch(e){$('status').textContent='Load failed: '+(e.message||e)}}async function save(){try{await init();let slug=($('slug').value.trim()||'test-page').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'test-page';$('slug').value=slug;let current=await sb.from('sb_site_pages').select('*').eq('slug',slug).maybeSingle();if(current.error)throw current.error;let old=current.data||{};let payload={slug,title:old.title||slug,page_type:old.page_type||'custom',status:old.status||'published',layout_json:Array.isArray(old.layout_json)?old.layout_json:[],settings_json:{...(old.settings_json||{}),...styleJson()},updated_at:new Date().toISOString()};let r=await sb.from('sb_site_pages').upsert(payload,{onConflict:'slug'}).select('settings_json').single();if(r.error)throw r.error;render();$('status').textContent='Saved colour settings for '+slug}catch(e){$('status').textContent='Save failed: '+(e.message||e)}}['accent','bg','titleColor','textColor','buttonText','font','slug'].forEach(id=>$(id).oninput=render);$('load').onclick=load;$('save').onclick=save;let start=new URL(location.href).searchParams.get('page')||'test-page';$('slug').value=start;load();</script></body></html>
