<script>
(function(){

var MAX=4200000,W=960,H=540,Q=.72;
function byId(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function clone(x){return JSON.parse(JSON.stringify(x))}
var seed={version:'StreamBanditPrototype3.0',exportedAt:new Date().toISOString(),settings:{appName:'Stream Bandit',tagline:'Chatterfriends Movies',loginText:'Login to your movie app prototype.',heroTitle:'Welcome back',heroText:'Your private front-end streaming library prototype.',homeShowHero:true,homeShowContinue:true,homeShowFeaturedPlaylist:true,homeShowNewUploads:true,homeShowAdminPicks:true,homeShowGenrePicks:true,homeFeaturedPlaylist:'',homeSpotlightVideo:'',logo:'',accentA:'#ff2d55',accentB:'#7c3cff'},users:[{username:'admin',password:'admin',role:'admin'},{username:'user',password:'user',role:'user'}],videos:[{title:'Stream Bandit Sample',desc:'Replace this with your own video.',tags:['Demo','Featured'],genre:'Demo',channel:'Stream Bandit',thumb:'',url:'',featured:true,duration:0}],channels:[{name:'Chatterfriends',desc:'Main Stream Bandit channel',owner:'admin',image:''},{name:'Stream Bandit',desc:'Selected videos from our database for you to watch. Join our channel now free.',owner:'admin',image:''}],playlists:[{name:'Me',videos:[],image:''}],progress:{admin:{},user:{}},favourites:{admin:[],user:[]},likes:{admin:[],user:[]},storageWarning:''};
var GENRES=['Action','Adventure','Animation','Biography','Comedy','Crime','Documentary','Drama','Family','Fantasy','History','Horror','Kids','Music','Musical','Mystery','Reality-TV','Romance','Sci-Fi','Sport','Superhero','Thriller','War','Western','Other'];

var pendingVideoInfo='';

var pendingChannelImage='';
var pendingPlaylistImage='';
var editVideoIndex=null;
var editChannelIndex=null;
var editPlaylistIndex=null;

function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},3000)}
function fatal(err){byId('app').innerHTML='<div class="fatal"><h1>Stream Bandit could not load</h1><p>'+esc(err&&err.message?err.message:err)+'</p><button id="panic" class="danger">Reset local data</button></div>';byId('panic').onclick=function(){localStorage.removeItem(KEY);localStorage.removeItem(SESSION);location.reload()}}
function normalise(d){if(!d||typeof d!=='object')return null;d.version='StreamBanditPrototype3.0';d.videos=Array.isArray(d.videos)?d.videos:[];d.channels=Array.isArray(d.channels)?d.channels:[];d.playlists=Array.isArray(d.playlists)?d.playlists:[];d.users=Array.isArray(d.users)?d.users:clone(seed.users);d.progress=d.progress||{};d.favourites=d.favourites||{};d.likes=d.likes||{};d.storageWarning=d.storageWarning||'';d.settings=d.settings||{};var def=seed.settings;Object.keys(def).forEach(function(k){if(d.settings[k]==null||d.settings[k]==='')d.settings[k]=def[k]});d.videos.forEach(function(v){v.thumb=v.thumb||'';v.url=v.url||'';v.year=v.year||'';v.rating=v.rating||'';v.runtimeText=v.runtimeText||'';v.ageRating=v.ageRating||'';v.cast=v.cast||'';v.director=v.director||'';v.trailerUrl=v.trailerUrl||'';v.localVideoId=v.localVideoId||'';v.localVideoName=v.localVideoName||'';v.localVideoSize=Number(v.localVideoSize)||0;v.tags=Array.isArray(v.tags)?v.tags:[];v.duration=Number(v.duration)||0;v.genres=Array.isArray(v.genres)?v.genres:(v.genre?[v.genre]:[]);if(!v.genres.length&&v.tags&&v.tags.length)v.genres=[v.tags[0]];if(!v.genres.length)v.genres=['General'];v.genre=v.genres[0]||'General'});d.channels.forEach(function(c){c.image=c.image||'';c.desc=c.desc||'';c.owner=c.owner||'admin'});d.playlists.forEach(function(p){p.image=p.image||'';p.videos=Array.isArray(p.videos)?p.videos:[]});d.users.forEach(function(u){d.progress[u.username]=d.progress[u.username]||{};d.favourites[u.username]=Array.isArray(d.favourites[u.username])?d.favourites[u.username]:[];d.likes[u.username]=Array.isArray(d.likes[u.username])?d.likes[u.username]:[]});return d}
function loadData(){try{return normalise(JSON.parse(localStorage.getItem(KEY)))||clone(seed)}catch(e){return clone(seed)}}
function loadSession(){try{var u=JSON.parse(localStorage.getItem(SESSION));return u&&u.username?u:null}catch(e){return null}}
function saveSession(){if(currentUser)localStorage.setItem(SESSION,JSON.stringify(currentUser));else localStorage.removeItem(SESSION)}
function dataSize(d){try{return JSON.stringify(d||data).length}catch(e){return 0}}
function kb(n){return Math.round(n/1024)}
function isQuota(e){return e&&(e.name==='QuotaExceededError'||e.code===22||String(e.message||'').toLowerCase().indexOf('quota')>-1)}
function saveData(force){data.exportedAt=new Date().toISOString();var j=JSON.stringify(data);if(j.length>MAX&&!force){dirty=true;data.storageWarning='Browser storage nearly full. Export backup JSON now.';toast('Storage nearly full. Export backup.');return false}try{localStorage.setItem(KEY,j);dirty=false;return true}catch(e){if(isQuota(e)){dirty=true;data.storageWarning='Browser storage full. Export or copy backup JSON now.';toast('Storage full. Export/copy backup now.');return false}throw e}}
function me(){return currentUser?data.users.find(function(u){return u.username===currentUser.username}):null}
function isAdmin(){var u=me();return !!(u&&u.role==='admin')}
function fmtTime(sec){sec=Number(sec)||0;var h=Math.floor(sec/3600);var m=Math.floor(sec%3600/60);var s=Math.floor(sec%60);return h?h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'):m+':'+String(s).padStart(2,'0')}
function progressEntry(i){if(!currentUser)return {time:0,lastWatched:null,finished:false};var p=(data.progress[currentUser.username]||{})[i];if(typeof p==='number')return {time:p,lastWatched:null,finished:false};if(p&&typeof p==='object')return {time:Number(p.time)||0,lastWatched:p.lastWatched||null,finished:!!p.finished};return {time:0,lastWatched:null,finished:false}}
function progressFor(i){return progressEntry(i).time}
function percentFor(i){var v=data.videos[i];return v&&v.duration?Math.min(100,progressFor(i)/v.duration*100):0}
function allVideos(){return data.videos.map(function(v,i){var o=clone(v);o.i=i;return o})}
function videoGenres(v){if(v&&Array.isArray(v.genres)&&v.genres.length)return v.genres;if(v&&v.genre)return [v.genre];return ['General']}
function uniqueGenres(){var found={};data.videos.forEach(function(v){videoGenres(v).forEach(function(g){if(g)found[g]=true})});return Object.keys(found).sort()}
function filteredVideos(){var q=searchTerm.trim().toLowerCase();var arr=allVideos().filter(function(v){var gs=videoGenres(v);var text=[v.title,v.desc,v.channel,v.year,v.rating,v.runtimeText,v.ageRating,v.cast,v.director,gs.join(' '),(v.tags||[]).join(' ')].join(' ').toLowerCase();var sourceOk=sourceFilter==='all'||(sourceFilter==='local'&&!!v.localVideoId)||(sourceFilter==='url'&&!!v.url&&!v.localVideoId)||(sourceFilter==='missing'&&!v.url&&!v.localVideoId);return (!q||text.indexOf(q)>-1)&&(!genreFilter||gs.indexOf(genreFilter)>-1)&&(!channelFilter||v.channel===channelFilter)&&sourceOk});return sortVideos(arr)}
function sortVideos(arr){arr=arr.slice();if(librarySort==='title')return arr.sort(function(a,b){return String(a.title||'').localeCompare(String(b.title||''))});if(librarySort==='genre')return arr.sort(function(a,b){return String(videoGenres(a)[0]||'').localeCompare(String(videoGenres(b)[0]||''))||String(a.title||'').localeCompare(String(b.title||''))});if(librarySort==='channel')return arr.sort(function(a,b){return String(a.channel||'').localeCompare(String(b.channel||''))||String(a.title||'').localeCompare(String(b.title||''))});return arr.sort(function(a,b){return b.i-a.i})}
function uniqueChannels(){var found={};data.videos.forEach(function(v){if(v.channel)found[v.channel]=true});return Object.keys(found).sort()}
function sourceFilterLabel(){if(sourceFilter==='local')return 'Uploaded local videos';if(sourceFilter==='url')return 'URL videos';if(sourceFilter==='missing')return 'No source added';return 'All sources'}
function continueList(){var p=data.progress[currentUser.username]||{};return Object.keys(p).map(function(k){var i=Number(k),v=data.videos[i],pr=progressEntry(i);return v?Object.assign({},v,{i:i,saved:pr.time,lastWatched:pr.lastWatched,finished:pr.finished}):null}).filter(function(v){return v&&v.saved>5&&!v.finished}).sort(function(a,b){return String(b.lastWatched||'').localeCompare(String(a.lastWatched||''))})}
function startQueue(ids){ids=(ids||[]).map(function(x){return Number(x)}).filter(function(i){return data.videos[i]});if(!ids.length)return toast('No videos to play');playQueue=ids;queuePos=0;selected=playQueue[0];view='watch';render();toast('Play All started: '+ids.length+' video(s)')}
function queueNext(){if(playQueue.length&&queuePos<playQueue.length-1){queuePos++;selected=playQueue[queuePos];view='watch';render();return true}return false}
function queuePrev(){if(playQueue.length&&queuePos>0){queuePos--;selected=playQueue[queuePos];view='watch';render();return true}return false}
function homeRow(title,arr,empty){return '<div class="sectionTitle"><h3>'+esc(title)+'</h3>'+(arr.length?'<button class="secondary small playRow" data-ids="'+esc(arr.map(function(v){return v.i}).join(','))+'">Play All</button>':'')+'</div>'+(arr.length?'<div class="miniRow">'+arr.slice(0,8).map(function(v){return cardOne(v)}).join('')+'</div>':'<div class="empty">'+esc(empty||'Nothing here yet.')+'</div>')}

function trailerEmbedUrl(url){url=String(url||'').trim();if(!url)return '';try{var u=new URL(url);var host=u.hostname.replace(/^www\./,'');if(host==='youtu.be'){var id=u.pathname.split('/').filter(Boolean)[0]||'';return id?'https://www.youtube.com/embed/'+encodeURIComponent(id):''}if(host.indexOf('youtube.com')>-1){var id=u.searchParams.get('v')||'';if(!id&&u.pathname.indexOf('/shorts/')===0)id=u.pathname.split('/')[2]||'';if(!id&&u.pathname.indexOf('/embed/')===0)return url;return id?'https://www.youtube.com/embed/'+encodeURIComponent(id):''}if(host.indexOf('vimeo.com')>-1){var vid=u.pathname.split('/').filter(Boolean).pop()||'';return vid?'https://player.vimeo.com/video/'+encodeURIComponent(vid):''}return url}catch(e){return url}}
function metaTile(label,value){return value?'<div class="infoTile"><b>'+esc(label)+'</b><span>'+esc(value)+'</span></div>':''}
function isLikelyCastCaption(line){line=String(line||'').toLowerCase();return line.indexOf(' at an event')>-1||line.indexOf(' red carpet')>-1||(line.indexOf(' in ')>-1&&/\(\d{4}\)/.test(line))||line.indexOf('rest of cast')>-1}
function cleanCastText(raw){var lines=String(raw||'').split(/\r?\n|,/).map(function(x){return x.trim()}).filter(Boolean);var out=[];lines.forEach(function(line){if(isLikelyCastCaption(line))return;if(out.length&&out[out.length-1].toLowerCase()===line.toLowerCase())return;out.push(line)});var pairs=[];for(var i=0;i<out.length;i++){var line=out[i];if(line.indexOf(' — ')>-1||line.indexOf(' - ')>-1){pairs.push(line.replace(/\s+-\s+/,' — '));continue}var next=out[i+1]||'';if(next&&next.indexOf(' — ')<0&&next.indexOf(' - ')<0){pairs.push(line+' — '+next);i++}else pairs.push(line)}return pairs.join('\n')}
function castEntries(raw){return cleanCastText(raw).split(/\r?\n/).map(function(line){line=line.trim();if(!line)return null;var bits=line.split(/\s+—\s+|\s+-\s+/);return {actor:bits[0]||line,role:bits.slice(1).join(' — ')}}).filter(Boolean)}
function castMarkup(raw){var entries=castEntries(raw);if(!entries.length)return '';return '<div class="castGrid">'+entries.map(function(c){return '<div class="castMember"><b>'+esc(c.actor)+'</b>'+(c.role?'<span>'+esc(c.role)+'</span>':'')+'</div>'}).join('')+'</div>'}
