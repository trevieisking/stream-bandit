/* V3.4.1 homepage readability patch: keeps upload/storage untouched */
.main{max-width:1480px;width:100%;margin:0 auto;}
.hero{grid-template-columns:minmax(0,1fr);gap:16px;}

.miniRow .card .body h3{font-size:18px;line-height:1.2;}
.miniRow .card .body{padding:13px;}
.homeCollectionCard .body p.muted{-webkit-line-clamp:2;}
.sourcePanel{margin-bottom:10px;}
.sectionTitle{position:relative;}

var seed={version:APP_VERSION,exportedAt:new Date().toISOString(),settings:{appName:'Stream Bandit',tagline:'Chatterfriends Movies',loginText:'Login to your movie app prototype.',heroTitle:'Welcome back',heroText:'Your private front-end streaming library prototype.',homeShowHero:true,homeShowContinue:true,homeShowFeaturedPlaylist:true,homeShowNewUploads:true,homeShowCollections:true,homeShowLocalVideos:true,homeShowUrlVideos:true,homeShowAdminPicks:true,homeShowGenrePicks:true,homeFeaturedPlaylist:'',homeSpotlightVideo:'',lastBackupAt:'',lastBackupSize:0,logo:'',accentA:'#ff2d55',accentB:'#7c3cff'},users:[{username:'admin',password:'admin',role:'admin'},{username:'user',password:'user',role:'user'}],videos:[{title:'Stream Bandit Sample',desc:'Replace this with your own video.',tags:['Demo','Featured'],genre:'Demo',channel:'Stream Bandit',thumb:'',url:'',featured:true,duration:0}],channels:[{name:'Chatterfriends',desc:'Main Stream Bandit channel',owner:'admin',image:''},{name:'Stream Bandit',desc:'Selected videos from our database for you to watch. Join our channel now free.',owner:'admin',image:''}],playlists:[{name:'Me',videos:[],image:''}],collections:[],progress:{admin:{},user:{}},favourites:{admin:[],user:[]},likes:{admin:[],user:[]},storageWarning:'',submissions:[]};

function normalise(d){if(!d||typeof d!=='object')return null;d.version=APP_VERSION;d.videos=Array.isArray(d.videos)?d.videos:[];d.channels=Array.isArray(d.channels)?d.channels:[];d.playlists=Array.isArray(d.playlists)?d.playlists:[];d.collections=Array.isArray(d.collections)?d.collections:[];d.users=Array.isArray(d.users)?d.users:clone(seed.users);d.progress=d.progress||{};d.favourites=d.favourites||{};d.likes=d.likes||{};d.storageWarning=d.storageWarning||'';d.settings=d.settings||{};var def=seed.settings;Object.keys(def).forEach(function(k){if(d.settings[k]==null||d.settings[k]==='')d.settings[k]=def[k]});d.videos.forEach(function(v){v.thumb=v.thumb||'';v.url=v.url||'';v.year=v.year||'';v.rating=v.rating||'';v.runtimeText=v.runtimeText||'';v.ageRating=v.ageRating||'';v.cast=v.cast||'';v.director=v.director||'';v.trailerUrl=v.trailerUrl||'';v.localVideoId=v.localVideoId||'';v.localVideoName=v.localVideoName||'';v.localVideoSize=Number(v.localVideoSize)||0;v.tags=Array.isArray(v.tags)?v.tags:[];v.duration=Number(v.duration)||0;v.genres=Array.isArray(v.genres)?v.genres:(v.genre?[v.genre]:[]);if(!v.genres.length&&v.tags&&v.tags.length)v.genres=[v.tags[0]];if(!v.genres.length)v.genres=['General'];v.genre=v.genres[0]||'General'});d.channels.forEach(function(c){c.image=c.image||'';c.desc=c.desc||'';c.owner=c.owner||'admin'});d.playlists.forEach(function(p){p.image=p.image||'';p.videos=Array.isArray(p.videos)?p.videos:[]});d.collections.forEach(function(c){c.name=c.name||'Untitled Collection';c.desc=c.desc||'';c.image=c.image||'';c.videos=Array.isArray(c.videos)?c.videos:[]});d.users.forEach(function(u){d.progress[u.username]=d.progress[u.username]||{};d.favourites[u.username]=Array.isArray(d.favourites[u.username])?d.favourites[u.username]:[];d.likes[u.username]=Array.isArray(d.likes[u.username])?d.likes[u.username]:[]});return d}

function me(){return currentUser?data.users.find(function(u){return u.username===currentUser.username}):null}
function isAdmin(){var u=me();return !!(u&&u.role==='admin')}
function fmtTime(sec){sec=Number(sec)||0;var h=Math.floor(sec/3600);var m=Math.floor(sec%3600/60);var s=Math.floor(sec%60);return h?h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'):m+':'+String(s).padStart(2,'0')}
function progressEntry(i){if(!currentUser)return {time:0,lastWatched:null,finished:false};var p=(data.progress[currentUser.username]||{})[i];if(typeof p==='number')return {time:p,lastWatched:null,finished:false};if(p&&typeof p==='object')return {time:Number(p.time)||0,lastWatched:p.lastWatched||null,finished:!!p.finished};return {time:0,lastWatched:null,finished:false}}
function progressFor(i){return progressEntry(i).time}
function percentFor(i){var v=data.videos[i];return v&&v.duration?Math.min(100,progressFor(i)/v.duration*100):0}
function allVideos(){return data.videos.map(function(v,i){var o=clone(v);o.i=i;return o})}
function videoGenres(v){if(v&&Array.isArray(v.genres)&&v.genres.length)return v.genres;if(v&&v.genre)return [v.genre];return ['General']}
function uniqueGenres(){var found={};data.videos.forEach(function(v){videoGenres(v).forEach(function(g){if(g)found[g]=true})});return Object.keys(found).sort()}
function filteredVideos(){var q=searchTerm.trim().toLowerCase();var arr=allVideos().filter(function(v){var gs=videoGenres(v);var text=[v.title,v.desc,v.channel,v.year,v.rating,v.runtimeText,v.ageRating,v.cast,v.director,gs.join(' '),(v.tags||[]).join(' ')].join(' ').toLowerCase();var sourceOk=sourceFilter==='all'||(sourceFilter==='local'&&!!v.localVideoId)||(sourceFilter==='url'&&!!v.url&&!v.localVideoId)||(sourceFilter==='missing'&&!v.url&&!v.localVideoId);return (!q||text.indexOf(q)>-1)&&(!genreFilter||gs.indexOf(genreFilter)>-1)&&(!channelFilter||v.channel===channelFilter)&&sourceOk});return sortVideos(arr)}
function sortVideos(arr){arr=arr.slice();if(librarySort==='title')return arr.sort(function(a,b){return String(a.title||'').localeCompare(String(b.title||''))});if(librarySort==='genre')return arr.sort(function(a,b){return String(videoGenres(a)[0]||'').localeCompare(String(videoGenres(b)[0]||''))||String(a.title||'').localeCompare(String(b.title||''))});if(librarySort==='channel')return arr.sort(function(a,b){return String(a.channel||'').localeCompare(String(b.channel||''))||String(a.title||'').localeCompare(String(b.title||''))});return arr.sort(function(a,b){return b.i-a.i})}
function uniqueChannels(){var found={};data.videos.forEach(function(v){if(v.channel)found[v.channel]=true});return Object.keys(found).sort()}
function sourceFilterLabel(){if(sourceFilter==='local')return 'Uploaded local videos';if(sourceFilter==='url')return 'URL videos';if(sourceFilter==='missing')return 'No source added';return 'All sources'}
function continueList(){var p=data.progress[currentUser.username]||{};return Object.keys(p).map(function(k){var i=Number(k),v=data.videos[i],pr=progressEntry(i);return v?Object.assign({},v,{i:i,saved:pr.time,lastWatched:pr.lastWatched,finished:pr.finished}):null}).filter(function(v){return v&&v.saved>5&&!v.finished}).sort(function(a,b){return String(b.lastWatched||'').localeCompare(String(a.lastWatched||''))})}
function historyList(){var p=data.progress[currentUser.username]||{};return Object.keys(p).map(function(k){var i=Number(k),v=data.videos[i],pr=progressEntry(i);return v&&pr.lastWatched?Object.assign({},v,{i:i,saved:pr.time,lastWatched:pr.lastWatched,finished:pr.finished}):null}).filter(Boolean).sort(function(a,b){return String(b.lastWatched||'').localeCompare(String(a.lastWatched||''))})}
function progressStats(){var hist=historyList();var cont=hist.filter(function(v){return v.saved>5&&!v.finished});var finished=hist.filter(function(v){return v.finished});var mins=hist.reduce(function(n,v){return n+(Number(progressEntry(v.i).time)||0)},0);return {history:hist.length,continueCount:cont.length,finished:finished.length,minutes:Math.round(mins/60)}}
function progressDashboard(){var s=progressStats();return '<div class="progressDash">'+progressStat('Continue watching',s.continueCount)+progressStat('Watch history',s.history)+progressStat('Finished',s.finished)+progressStat('Watched time',s.minutes+' min')+'</div>'}
function progressStat(label,value){return '<div class="progressStat"><b>'+esc(label)+'</b><span>'+esc(value)+'</span></div>'}
function markProgressFinished(i){var v=data.videos[i];if(!v)return;data.progress[currentUser.username]=data.progress[currentUser.username]||{};var pr=progressEntry(i);pr.time=v.duration?Math.max(0,Math.floor(v.duration-1)):Math.max(pr.time,10);pr.lastWatched=new Date().toISOString();pr.finished=true;data.progress[currentUser.username][i]=pr;saveData();render();toast('Marked finished')}

function clearFinishedProgress(){var p=data.progress[currentUser.username]||{};Object.keys(p).forEach(function(k){if(progressEntry(Number(k)).finished)delete p[k]});saveData();render();toast('Finished items cleared from history')}
function startQueue(ids){ids=(ids||[]).map(function(x){return Number(x)}).filter(function(i){return data.videos[i]});if(!ids.length)return toast('No videos to play');playQueue=ids;queuePos=0;selected=playQueue[0];view='watch';render();toast('Play All started: '+ids.length+' video(s)')}

function homeRow(title,arr,empty,targetView){return '<div class="sectionTitle"><h3>'+esc(title)+'</h3><div class="rowActions">'+(targetView?'<button class="secondary small" data-view="'+esc(targetView)+'">Open</button>':'')+(arr.length?'<button class="secondary small playRow" data-ids="'+esc(arr.map(function(v){return v.i}).join(','))+'">Play All</button>':'')+'</div></div>'+(arr.length?'<div class="miniRow">'+arr.slice(0,8).map(function(v){return cardOne(v)}).join('')+'</div>':'<div class="empty">'+esc(empty||'Nothing here yet.')+'</div>')}

function trailerEmbedUrl(url){url=String(url||'').trim();if(!url)return '';try{var u=new URL(url);var host=u.hostname.replace(/^www\./,'');if(host==='youtu.be'){var id=u.pathname.split('/').filter(Boolean)[0]||'';return id?'https://www.youtube.com/embed/'+encodeURIComponent(id):''}if(host.indexOf('youtube.com')>-1){var id=u.searchParams.get('v')||'';if(!id&&u.pathname.indexOf('/shorts/')===0)id=u.pathname.split('/')[2]||'';if(!id&&u.pathname.indexOf('/embed/')===0)return url;return id?'https://www.youtube.com/embed/'+encodeURIComponent(id):''}if(host.indexOf('vimeo.com')>-1){var vid=u.pathname.split('/').filter(Boolean).pop()||'';return vid?'https://player.vimeo.com/video/'+encodeURIComponent(vid):''}return url}catch(e){return url}}
function metaTile(label,value){return value?'<div class="infoTile"><b>'+esc(label)+'</b><span>'+esc(value)+'</span></div>':''}
function isLikelyCastCaption(line){line=String(line||'').toLowerCase();return line.indexOf(' at an event')>-1||line.indexOf(' red carpet')>-1||(line.indexOf(' in ')>-1&&/\(\d{4}\)/.test(line))||line.indexOf('rest of cast')>-1}
function cleanCastText(raw){var lines=String(raw||'').split(/\r?\n|,/).map(function(x){return x.trim()}).filter(Boolean);var out=[];lines.forEach(function(line){if(isLikelyCastCaption(line))return;if(out.length&&out[out.length-1].toLowerCase()===line.toLowerCase())return;out.push(line)});var pairs=[];for(var i=0;i<out.length;i++){var line=out[i];if(line.indexOf(' — ')>-1||line.indexOf(' - ')>-1){pairs.push(line.replace(/\s+-\s+/,' — '));continue}var next=out[i+1]||'';if(next&&next.indexOf(' — ')<0&&next.indexOf(' - ')<0){pairs.push(line+' — '+next);i++}else pairs.push(line)}return pairs.join('\n')}
function castEntries(raw){return cleanCastText(raw).split(/\r?\n/).map(function(line){line=line.trim();if(!line)return null;var bits=line.split(/\s+—\s+|\s+-\s+/);return {actor:bits[0]||line,role:bits.slice(1).join(' — ')}}).filter(Boolean)}
function castMarkup(raw){var entries=castEntries(raw);if(!entries.length)return '';return '<div class="castGrid">'+entries.map(function(c){return '<div class="castMember"><b>'+esc(c.actor)+'</b>'+(c.role?'<span>'+esc(c.role)+'</span>':'')+'</div>'}).join('')+'</div>'}
function spotlightVideo(){var st=data.settings||seed.settings;var i=Number(st.homeSpotlightVideo);if(data.videos[i])return Object.assign({},data.videos[i],{i:i});var f=allVideos().find(function(v){return v.featured});return f||allVideos().slice().reverse()[0]||null}
function trailerButton(v){return v&&v.trailerUrl?'<button class="secondary small trailerOpen" data-url="'+esc(v.trailerUrl)+'">Watch Trailer</button>':''}
function cardOne(v){return '<div class="card"><div class="thumb">'+(v.thumb?'<img src="'+esc(v.thumb)+'">':'<span>No thumbnail</span>')+(v.featured?'<span class="badge">Featured</span>':'')+(v.duration?'<span class="duration">'+fmtTime(v.duration)+'</span>':'')+'</div><div class="body"><h3>'+esc(v.title)+'</h3><p class="muted">'+esc(v.desc||'')+'</p><div class="row">'+sourcePill(v)+videoGenres(v).slice(0,3).map(function(g){return '<span class="pill">'+esc(g)+'</span>'}).join('')+'</div><div class="bar"><div class="fill" style="width:'+percentFor(v.i)+'%"></div></div><div class="row"><button class="small details" data-i="'+v.i+'">Details</button><button class="small play" data-i="'+v.i+'">Play</button></div></div></div>'}
function problem(txt){var s=String(txt||'').trim();var l=s.toLowerCase();if(!s)return 'empty';if(l.indexOf('<!doctype html')===0||l.indexOf('<html')===0||l.indexOf('<script')>-1||l.indexOf('<div id="app"')>-1)return 'html';if(s.charAt(0)!=='{'&&s.charAt(0)!=='[')return 'not-json';return null}
function openMediaDB(){return new Promise(function(resolve,reject){if(!window.indexedDB)return reject(new Error('IndexedDB is not available in this browser'));var r=indexedDB.open(MEDIA_DB,1);r.onupgradeneeded=function(){var db=r.result;if(!db.objectStoreNames.contains('videos'))db.createObjectStore('videos',{keyPath:'id'})};r.onsuccess=function(){resolve(r.result)};r.onerror=function(){reject(r.error||new Error('Could not open local video storage'))}})}
function saveLocalVideo(file){return openMediaDB().then(function(db){return new Promise(function(resolve,reject){var id='local_'+Date.now()+'_'+Math.random().toString(36).slice(2);var tx=db.transaction('videos','readwrite');tx.objectStore('videos').put({id:id,name:file.name,type:file.type||'video/mp4',size:file.size,createdAt:new Date().toISOString(),blob:file});tx.oncomplete=function(){db.close();resolve({id:id,name:file.name,size:file.size,type:file.type})};tx.onerror=function(){db.close();reject(tx.error||new Error('Could not save video file'))}})})}
function getLocalVideo(id){return openMediaDB().then(function(db){return new Promise(function(resolve,reject){var tx=db.transaction('videos','readonly');var req=tx.objectStore('videos').get(id);req.onsuccess=function(){db.close();resolve(req.result||null)};req.onerror=function(){db.close();reject(req.error||new Error('Could not load local video'))}})})}
function deleteLocalVideo(id){if(!id)return Promise.resolve();return openMediaDB().then(function(db){return new Promise(function(resolve){var tx=db.transaction('videos','readwrite');tx.objectStore('videos').delete(id);tx.oncomplete=function(){db.close();resolve()};tx.onerror=function(){db.close();resolve()}})})}
function listLocalVideos(){return openMediaDB().then(function(db){return new Promise(function(resolve,reject){var tx=db.transaction('videos','readonly');var req=tx.objectStore('videos').getAll();req.onsuccess=function(){db.close();resolve(req.result||[])};req.onerror=function(){db.close();reject(req.error||new Error('Could not scan local video storage'))}})})}
function scanLocalVideos(){return listLocalVideos().then(function(files){var linked={};data.videos.forEach(function(v,i){if(v.localVideoId)linked[v.localVideoId]={i:i,title:v.title,size:v.localVideoSize||0,name:v.localVideoName||''}});var fileMap={};files.forEach(function(f){fileMap[f.id]=f});var linkedRows=Object.keys(linked).map(function(id){var f=fileMap[id];return {id:id,i:linked[id].i,title:linked[id].title,name:(f&&f.name)||linked[id].name||'Stored video',size:(f&&f.size)||linked[id].size||0,ok:!!f,orphan:false}});var orphanRows=files.filter(function(f){return !linked[f.id]}).map(function(f){return {id:f.id,i:null,title:'Not linked to a library video',name:f.name||'Stored video',size:f.size||0,ok:true,orphan:true}});mediaScan={ranAt:new Date().toLocaleString(),files:files,linked:linkedRows,orphans:orphanRows,totalSize:files.reduce(function(a,f){return a+(Number(f.size)||0)},0),missing:linkedRows.filter(function(r){return !r.ok})};return mediaScan})}
function deleteOrphanLocalVideos(){return scanLocalVideos().then(function(scan){return Promise.all(scan.orphans.map(function(r){return deleteLocalVideo(r.id)}))}).then(scanLocalVideos)}
function sizeMB(n){return ((Number(n)||0)/1024/1024).toFixed(1)+' MB'}

function genreHomeRows(all){var counts={};all.forEach(function(v){videoGenres(v).forEach(function(g){counts[g]=(counts[g]||0)+1})});return Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]||a.localeCompare(b)}).slice(0,3).map(function(g){return {name:g,videos:all.filter(function(v){return videoGenres(v).indexOf(g)>-1})}})}
function homeSourceRows(local,urls){var html='<div class="sectionTitle"><h3>Video Sources</h3><div class="rowActions">'+(isAdmin()?'<button class="secondary small" data-view="storage">Storage</button><button class="secondary small" data-view="admin">Add Video</button>':'')+'</div></div><div class="sourceSplit">';if(boolSetting('homeShowLocalVideos'))html+='<div class="sourcePanel"><div class="sectionTitle"><h3>📁 Local Videos</h3>'+(local.length?'<button class="secondary small playRow" data-ids="'+esc(local.map(function(v){return v.i}).join(','))+'">Play All</button>':'')+'</div>'+(local.length?'<div class="miniRow">'+local.slice(0,6).map(function(v){return cardOne(v)}).join('')+'</div>':'<div class="homeEmptySmall">Uploaded browser videos will show here.</div>')+'</div>';if(boolSetting('homeShowUrlVideos'))html+='<div class="sourcePanel"><div class="sectionTitle"><h3>🔗 URL / Stream Links</h3>'+(urls.length?'<button class="secondary small playRow" data-ids="'+esc(urls.map(function(v){return v.i}).join(','))+'">Play All</button>':'')+'</div>'+(urls.length?'<div class="miniRow">'+urls.slice(0,6).map(function(v){return cardOne(v)}).join('')+'</div>':'<div class="homeEmptySmall">URL videos and stream links will show here.</div>')+'</div>';return html+'</div>'}

function libraryPage(){var arr=filteredVideos();var channelOptions='<option value="">All channels</option>'+uniqueChannels().map(function(c){return '<option value="'+esc(c)+'" '+(channelFilter===c?'selected':'')+'>'+esc(c)+'</option>'}).join('');var sortOptions='<option value="newest" '+(librarySort==='newest'?'selected':'')+'>Newest added</option><option value="title" '+(librarySort==='title'?'selected':'')+'>Title A-Z</option><option value="genre" '+(librarySort==='genre'?'selected':'')+'>Genre</option><option value="channel" '+(librarySort==='channel'?'selected':'')+'>Channel</option>';var sourceOptions='<option value="all" '+(sourceFilter==='all'?'selected':'')+'>All video sources</option><option value="local" '+(sourceFilter==='local'?'selected':'')+'>Uploaded local videos</option><option value="url" '+(sourceFilter==='url'?'selected':'')+'>URL videos</option><option value="missing" '+(sourceFilter==='missing'?'selected':'')+'>No source added</option>';var html=topBar('Library')+'<div class="libraryToolbar"><div class="toolbarGroup"><label>Sort library</label><select id="libSort">'+sortOptions+'</select></div><div class="toolbarGroup"><label>Filter channel</label><select id="libChannel">'+channelOptions+'</select></div><div class="toolbarGroup"><label>Filter video source</label><select id="libSource">'+sourceOptions+'</select></div><div class="toolbarActions"><span class="pill">'+arr.length+' result(s)</span>'+(arr.length?'<button class="secondary small playRow" data-ids="'+esc(arr.map(function(v){return v.i}).join(','))+'">Play All Results</button>':'')+'<button class="secondary small" id="clear">Clear all</button></div></div><div class="row" style="margin-bottom:14px">'+uniqueGenres().map(function(g){return '<button class="secondary small genrePick" data-genre="'+esc(g)+'">'+esc(g)+'</button>'}).join('')+'</div>';return html+(arr.length?cards(arr):noResultsBox())}
function noResultsBox(){var bits=[];if(searchTerm.trim())bits.push('search: "'+searchTerm.trim()+'"');if(genreFilter)bits.push('genre: '+genreFilter);if(channelFilter)bits.push('channel: '+channelFilter);if(sourceFilter&&sourceFilter!=='all')bits.push('source: '+sourceFilterLabel());return '<div class="noResults"><h3>No results found</h3><p>Nothing matched '+(bits.length?esc(bits.join(' + ')):'your current filters')+'.</p><p class="note">Try Clear all, choose All video sources, or add more videos in Admin.</p></div>'}
function genresPage(){var g=uniqueGenres();return topBar('Genres')+'<div class="grid">'+(g.map(function(name){var count=data.videos.filter(function(v){return videoGenres(v).indexOf(name)>-1}).length;var ids=data.videos.map(function(v,i){return videoGenres(v).indexOf(name)>-1?i:null}).filter(function(x){return x!==null});return '<div class="card"><div class="body"><h3>🏷 '+esc(name)+'</h3><p class="muted">'+count+' video(s)</p><div class="row"><button class="small genreOpen" data-genre="'+esc(name)+'">Open genre</button><button class="secondary small playRow" data-ids="'+esc(ids.join(','))+'">Play All</button></div></div></div>'}).join('')||'<div class="empty">No genres yet. Add a genre in Admin.</div>')+'</div>'}
function continuePage(){var arr=continueList();return topBar('Continue Watching')+'<div class="panel"><h3>Pick up where you left off</h3><p class="note">V3.3 makes this page clearer: part-watched videos stay here, finished films move out of the way, and you can reset progress on test items.</p>'+progressDashboard()+'<div class="row">'+(arr.length?'<button class="good small playRow" data-ids="'+esc(arr.map(function(v){return v.i}).join(','))+'">Play All Continue Watching</button>':'')+'<button class="secondary small" data-view="history">Open Watch History</button></div></div>'+cards(arr)}
function formatDate(iso){if(!iso)return 'Not recorded yet';try{return new Date(iso).toLocaleString()}catch(e){return iso}}
function historyPage(){var arr=historyList();return topBar('Watch History')+'<div class="panel"><h3>Recently watched</h3><p class="note">This is saved per user. Use the buttons on each card to mark a film finished or remove progress for testing.</p>'+progressDashboard()+'<div class="row"><button class="secondary small" data-view="continue">Back to Continue Watching</button>'+(arr.some(function(v){return v.finished})?'<button class="secondary small clearFinished">Clear finished from history</button>':'')+'</div></div>'+historyCards(arr)}
function historyCards(arr){if(!arr.length)return '<div class="empty">No watch history yet. Play a video for a few seconds, then come back.</div>';return '<div class="grid">'+arr.map(function(v){var pr=progressEntry(v.i);var status=pr.finished?'<span class="finishedPill">Finished</span>':'<span class="watchingPill">Part-watched</span>';var percent=v.duration?Math.min(100,Math.round((pr.time/v.duration)*100)):0;return '<div class="card"><div class="thumb">'+(v.thumb?'<img src="'+esc(v.thumb)+'">':'<span>No thumbnail</span>')+'</div><div class="body"><h3>'+esc(v.title)+'</h3><div class="row">'+status+'<span class="pill">'+esc(v.channel||'No channel')+'</span></div><div class="bar"><div class="fill" style="width:'+percentFor(v.i)+'%"></div></div><p class="historyMeta">Last watched: '+esc(formatDate(pr.lastWatched))+'<br>Stopped at: '+fmtTime(pr.time)+(v.duration?' of '+fmtTime(v.duration):'')+'<br>Watched: '+percent+'%</p><div class="row"><button class="small details" data-i="'+v.i+'">Details</button><button class="small play" data-i="'+v.i+'">Play / Resume</button><button class="secondary small markFinished" data-i="'+v.i+'">Mark finished</button><button class="secondary small resetProgress" data-i="'+v.i+'">Reset progress</button></div></div></div>'}).join('')+'</div>'}
function channelsPage(){return topBar('Channels')+'<div class="grid">'+(data.channels.map(function(c){return '<div class="card"><div class="thumb">'+(c.image?'<img src="'+esc(c.image)+'">':'<span>No channel image</span>')+'</div><div class="body"><h3>📺 '+esc(c.name)+'</h3><p class="muted">'+esc(c.desc)+'</p><span class="pill">Owner: '+esc(c.owner)+'</span><br><br><button class="small channel" data-channel="'+esc(c.name)+'">View videos</button></div></div>'}).join('')||'<div class="empty">No channels yet.</div>')+'</div>'}
function playlistsPage(){return topBar('Playlists')+(data.playlists.map(function(p){var vids=(p.videos||[]).map(function(i){return data.videos[i]?Object.assign({},data.videos[i],{i:i}):null}).filter(Boolean);return '<div class="panel"><div class="sectionTitle"><h3>🧩 '+esc(p.name)+'</h3>'+(vids.length?'<button class="secondary small playRow" data-ids="'+esc(vids.map(function(v){return v.i}).join(','))+'">Play All</button>':'')+'</div>'+(p.image?'<div class="thumb" style="border-radius:18px;margin-bottom:12px"><img src="'+esc(p.image)+'"></div>':'')+'<p class="muted">'+vids.length+' video(s)</p>'+cards(vids)+'</div>'}).join('')||'<div class="empty">No playlists yet.</div>')}

function collectionsPage(){var cols=data.collections||[];return topBar('Collections')+'<div class="panel"><h3>Movie Collections / Franchises</h3><p class="note">Group films together like Scream Collection, Marvel Collection, Horror Classics, Christmas Movies or Kids Movies. Admin can build these from the Admin tab.</p></div><div class="grid">'+(cols.map(function(c,ci){var vids=collectionVideos(c);return '<div class="card"><div class="thumb">'+(c.image?'<img src="'+esc(c.image)+'">':'<span>No collection image</span>')+'</div><div class="body"><h3>🎞 '+esc(c.name)+'</h3><p class="muted">'+esc(c.desc||'Movie collection')+'</p><div class="row"><span class="pill">'+vids.length+' movie(s)</span></div><br><div class="row"><button class="small collectionOpen" data-ci="'+ci+'">Open Collection</button>'+(vids.length?'<button class="secondary small playRow" data-ids="'+esc(vids.map(function(v){return v.i}).join(','))+'">Play All</button>':'')+'</div></div></div>'}).join('')||'<div class="empty">No collections yet. Admin can create collections for franchises and movie rows.</div>')+'</div>'}

function favouritesPage(){return topBar('Favourites')+cards((data.favourites[currentUser.username]||[]).map(function(i){return data.videos[i]?Object.assign({},data.videos[i],{i:i}):null}).filter(Boolean))}

function detailPage(){var v=data.videos[selected];if(!v)return topBar('Movie Details')+'<div class="empty">No video selected.</div>';var fav=(data.favourites[currentUser.username]||[]).indexOf(selected)>=0;var like=(data.likes[currentUser.username]||[]).indexOf(selected)>=0;var embed=trailerEmbedUrl(v.trailerUrl);var cast=castMarkup(v.cast);var meta=metaTile('Year',v.year)+metaTile('Rating',v.rating)+metaTile('Runtime',v.runtimeText||fmtTime(v.duration))+metaTile('Age rating',v.ageRating)+metaTile('Director',v.director)+metaTile('Channel',v.channel||'No channel');return topBar('Movie Details')+'<div class="detailHero">'+(v.thumb?'<img class="bg" src="'+esc(v.thumb)+'">':'')+'<div class="inner"><div class="row">'+(v.thumb?'<img class="detailPoster" src="'+esc(v.thumb)+'">':'')+'<div>'+videoGenres(v).map(function(g){return '<span class="pill">'+esc(g)+'</span> '}).join('')+'<span class="pill">'+esc(v.channel||'No channel')+'</span> '+sourcePill(v)+(v.tags||[]).map(function(t){return '<span class="pill">'+esc(t)+'</span>'}).join('')+'</div></div><h1>'+esc(v.title)+'</h1><p>'+esc(v.desc||'No description yet.')+'</p><div class="movieInfoGrid">'+meta+'</div>'+collectionLinks(selected)+(cast?'<div class="castBox"><b>Cast</b>'+cast+'</div>':'')+'<p class="note">Resume: <b>'+fmtTime(progressFor(selected))+'</b>'+(v.duration?' / '+fmtTime(v.duration):'')+'</p><div class="row bigDetailActions"><button class="play" data-i="'+selected+'">Play / Resume</button>'+trailerButton(v)+'<button class="secondary fav" data-i="'+selected+'">'+(fav?'♥ Saved':'♡ Favourite')+'</button><button class="secondary like" data-i="'+selected+'">'+(like?'👍 Liked':'👍 Like')+'</button><button class="secondary" data-view="library">Back to Library</button></div></div></div>'+(embed?'<div class="panel trailerBox"><h3>Trailer / Extra</h3><iframe class="trailerFrame" src="'+esc(embed)+'" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>':(v.trailerUrl?'<div class="panel trailerBox"><h3>Trailer / Extra</h3><p class="muted">Trailer link added.</p><button class="secondary trailerOpen" data-url="'+esc(v.trailerUrl)+'">Open Trailer</button></div>':''))}
function watchPage(){var v=data.videos[selected];if(!v)return topBar('Watch')+'<div class="empty">No video selected.</div>';var pr=progressEntry(selected);return topBar('Watching')+'<div class="videoWrap"><video id="player" controls playsinline data-src="'+esc(v.url)+'" data-local="'+esc(v.localVideoId||'')+'" poster="'+esc(v.thumb)+'"></video></div><div class="panel"><h2>'+esc(v.title)+'</h2><p class="muted">'+esc(v.desc)+'</p><div class="progressNote">Resume saved at <b id="rt">'+fmtTime(progressFor(selected))+'</b>. '+(pr.finished?'This movie is marked finished.':'This movie is part-watched until it reaches the end or you mark it finished.')+'</div><div class="bar"><div id="watchFill" class="fill" style="width:'+percentFor(selected)+'%"></div></div><p id="playStatus" class="note">Player ready.</p><div class="row"><button id="restart" class="secondary">Restart</button><button id="prevQ" class="secondary">Previous</button><button id="nextQ" class="secondary">Next</button><button id="full">Fullscreen</button><button id="markFinishedNow" class="good">Mark finished</button><button id="resetThisProgress" class="secondary">Reset progress</button><button class="secondary" data-view="detail">Details</button></div><div class="queueBox"><b>Queue:</b> '+(playQueue.length?(queuePos+1)+' of '+playQueue.length:'Single video')+'</div></div>'}

function area(l,id){return '<label>'+l+'</label><textarea id="'+id+'"></textarea>'}
function genreChecklist(id,selectedGenres){var picked=Array.isArray(selectedGenres)?selectedGenres:[];if(!picked.length)picked=['Action'];return '<label>Genres</label><div class="genreBox" id="'+id+'">'+GENRES.map(function(g){var checked=picked.indexOf(g)>-1?'checked':'';return '<label class="genreChoice"><input type="checkbox" class="genreOption" value="'+esc(g)+'" '+checked+'> '+esc(g)+'</label>'}).join('')+'</div><p class="note">Tick more than one genre, for example Action + Sci-Fi + Thriller.</p>'}
function storagePage(){var html=topBar('Local Storage Manager')+'<div class="panel"><h3>Local video storage health</h3><p class="muted">This checks the big uploaded video files stored inside this browser. Your JSON backup saves titles, images, playlists, settings and video links. Big uploaded browser video files stay on this device only, so keep the original video files safe as well.</p><div class="row"><button id="scanMedia" class="good">Scan local videos</button><button id="deleteOrphans" class="danger">Delete orphan files</button><button id="openAdminFromStorage" class="secondary">Add / edit videos</button><input id="relinkFileInput" type="file" accept="video/mp4,video/webm,video/quicktime,.mov" style="display:none"></div><p class="note">New: if a restored backup says a local video is missing, press <b>Relink file</b> and choose the original MP4/WebM/MOV from your computer.</p></div>';if(!mediaScan){html+='<div class="empty">Press <b>Scan local videos</b> to check uploaded video files.</div>';return html}html+='<div class="cols"><div class="panel"><h3>Summary</h3><p class="muted">Last scan: '+esc(mediaScan.ranAt)+'<br>Stored files: '+mediaScan.files.length+'<br>Linked library files: '+mediaScan.linked.length+'<br>Missing linked files: '+mediaScan.missing.length+'<br>Orphan files: '+mediaScan.orphans.length+'<br>Total local video storage: '+sizeMB(mediaScan.totalSize)+'</p></div><div class="panel"><h3>What this means</h3><p class="muted"><b class="ok">OK</b> means the uploaded file is still in this browser. <b class="bad">Missing</b> means the library has a local-video record but the browser file is gone. <b>Orphan</b> means a file exists but is not attached to any library video.</p></div></div>';var rows=mediaScan.linked.concat(mediaScan.orphans);html+='<div class="panel"><h3>Stored video files</h3><div class="adminList">'+(rows.map(function(r){return '<div class="adminItem"><div style="width:80px;aspect-ratio:16/9;border-radius:12px;background:#07070b;display:gr function dataUrlKind(s){return /^data:image\//i.test(String(s||''));}
function imageToCompactDataUrl(src,maxW,maxH,q){
  return new Promise(function(resolve){
    if(!dataUrlKind(src)||String(src).length<25000)return resolve(src);
    var im=new Image();
    im.onload=function(){
      try{
        var ratio=Math.min(maxW/im.width,maxH/im.height,1);
        var w=Math.max(1,Math.round(im.width*ratio)),h=Math.max(1,Math.round(im.height*ratio));
        var cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(im,0,0,w,h);
        var out=cv.toDataURL('image/jpeg',q);
        resolve(out.length<src.length?out:src);
      }catch(e){resolve(src)}
    };
    im.onerror=function(){resolve(src)};
    im.src=src;
  });
}
function collectImageRefs(){
  var refs=[];
  function add(obj,key,w,h,q){if(obj&&dataUrlKind(obj[key]))refs.push({obj:obj,key:key,w:w,h:h,q:q,old:String(obj[key]||'').length})}
  (data.videos||[]).forEach(function(v){add(v,'thumb',640,360,.58)});
  (data.channels||[]).forEach(function(c){add(c,'image',640,360,.58)});
  (data.playlists||[]).forEach(function(p){add(p,'image',640,360,.58)});
  (data.collections||[]).forEach(function(c){add(c,'image',640,360,.58)});
  (data.submissions||[]).forEach(function(s){add(s,'thumbnail',640,360,.58)});
  if(data.settings)add(data.settings,'logo',160,160,.7);
  return refs;
}
function compactStoredImages(silent){
  var refs=collectImageRefs();
  if(!refs.length){if(!silent)toast('No large stored images found to compact');return Promise.resolve(false)}
  if(!silent)toast('Compacting stored thumbnails/logos. Please wait...');
  var before=dataSize();
  return refs.reduce(function(pr,r){return pr.then(function(){return imageToCompactDataUrl(r.obj[r.key],r.w,r.h,r.q).then(function(out){r.obj[r.key]=out})})},Promise.resolve()).then(function(){
    data.storageWarning='';
    var ok=saveData(true);
    var after=dataSize();
    if(!ok){data.storageWarning='Storage is still full after image compaction. Export backup, then remove some large thumbnails or reset test data.';saveData(true)}
    render();
    toast(ok?'Storage rescue complete: '+kb(before-after)+' KB reduced':'Compacted images, but storage is still too full');
    return ok;
  });
}

function sb44ListHas(list,id){return (list||[]).map(String).indexOf(String(id))>-1}

async function sb44LoadRemoteStates(repaint){
  try{
    var c=sbInit();
    if(!c){sb44StateStatus='Supabase SDK not loaded';if(repaint)render();return false}
    if(!sbSession||!sbSession.user){
      var ses=await c.auth.getSession();
      sbSession=ses&&ses.data?ses.data.session:null;
    }
    if(!sbSession||!sbSession.user){sb44StateLoaded=false;sb44StateStatus='Not logged into Supabase';if(repaint)render();return false}
    var uid=sbSession.user.id;
    var results=await Promise.all([
      c.from('sb_watchlist').select('movie_id').eq('user_id',uid),
      c.from('sb_favourites').select('movie_id').eq('user_id',uid),
      c.from('sb_likes').select('movie_id').eq('user_id',uid)
    ]);
    for(var i=0;i<results.length;i++){if(results[i].error)throw results[i].error}
    sb44WatchlistIds=(results[0].data||[]).map(function(r){return r.movie_id});
    sb44FavouriteIds=(results[1].data||[]).map(function(r){return r.movie_id});
    sb44LikeIds=(results[2].data||[]).map(function(r){return r.movie_id});
    sb44StateLoaded=true;
    sb44StateStatus='Loaded Supabase saves: Watchlist '+sb44WatchlistIds.length+', favourites '+sb44FavouriteIds.length+', likes '+sb44LikeIds.length;
    if(repaint)render();
    return true;
  }catch(e){sb44StateLoaded=false;sb44StateStatus='Could not load Supabase saves: '+(e.message||e);if(repaint)render();return false}
}
async function sb44ToggleRemote(kind,id){
  var c=sbInit();
  if(!c)return toast('Supabase SDK not loaded');
  if(!sbSession||!sbSession.user){await sb44LoadRemoteStates(false)}
  if(!sbSession||!sbSession.user)return toast('Log into Supabase first');
  var cfg={watchlist:{table:'sb_watchlist',list:'sb44WatchlistIds',on:'✓ In Watchlist',off:'+ Watch Later'},favourite:{table:'sb_favourites',list:'sb44FavouriteIds',on:'♥ Favourite Saved',off:'♡ Favourite'},like:{table:'sb_likes',list:'sb44LikeIds',on:'👍 Liked',off:'👍 Like'}}[kind];
  if(!cfg||!id)return;
  var uid=sbSession.user.id;
  var arr=kind==='watchlist'?sb44WatchlistIds:(kind==='favourite'?sb44FavouriteIds:sb44LikeIds);
  var exists=sb44ListHas(arr,id);
  var res=exists?await c.from(cfg.table).delete().eq('user_id',uid).eq('movie_id',id):await c.from(cfg.table).upsert({user_id:uid,movie_id:id});
  if(res.error)return toast('Supabase save failed: '+res.error.message);
  await sb44LoadRemoteStates(false);
  sb44StateLoaded=true;
  sb44StateStatus='Updated Supabase saves. Open Watchlist/Favourites/Liked or press refresh to confirm.';
  toast(exists?'Removed from Supabase '+kind:'Saved to Supabase '+kind);
  render();
}
