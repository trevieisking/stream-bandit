<script>
(function(){
'use strict';

const VERSION='V7.12.263.14 Web Builder Form Designer Owner Workspace Lock';
const URL='https://xzxqfrvqdgkzwujbkdbk.supabase.co';
const KEY='sb_publishable_1wHhSq2xo0XBwsKXO_64HQ_xyVY9xRN';
const OWNER_SLUGS=['landing','home','home-page'];

const RANK={
  free_viewer:0,
  viewer_plus:1,
  creator_starter:2,
  creator_growth:3,
  creator_pro:4,
  studio_business:5,
  platform_owner:6,
  enterprise:7
};

let sb=null;
let user=null;
let profile=null;
let page=null;
let pageOwnerId='';
let fields=[];
let lastError='';
let lastSubmit=null;
let lastEmailDraft=null;
let readCount=0;
let pageWrites=0;
let submissionWrites=0;
let localTests=0;
let emailDraftOpens=0;
let storageUploads=0;
let lastAction='boot';
let redirectTo='';
let redirectSlug='';

let authState={
  version:VERSION,
  route:'web-builder-form-designer-owned-v7-12-258-test.html',
  checked:false,
  allowed:false,
  signedIn:false,
  email:'',
  userId:'',
  role:'',
  adminLevel:'',
  planKey:'',
  accountStatus:'',
  isPlatformOwner:false,
  canUseBuilder:false,
  workspace:'',
  lockClass:'form-designer-page-owner-lock',
  reason:'Checking...',
  supabaseReads:false,
  supabaseWrites:false,
  storageWrites:false,
  storageActions:false,
  schemaChanges:false,
  builderTableChanges:false,
  streamBanditShellChanges:false,
  activeMenuPromotion:false,
  indexPromotion:false,
  registryPromotion:true
};

const $=function(id){return document.getElementById(id);};

function app(){
  return $('app');
}

function esc(v){
  return String(v==null?'':v).replace(/[&<>"']/g,function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]||m;
  });
}

function obj(v){
  if(v&&typeof v==='object')return v;

  if(typeof v==='string'&&v.trim()){
    try{return JSON.parse(v)||{};}catch(e){}
  }

  return {};
}

function arr(v){
  if(Array.isArray(v))return v;

  if(v&&typeof v==='object'){
    if(Array.isArray(v.blocks))return v.blocks;
    if(Array.isArray(v.sections))return v.sections;
    if(Array.isArray(v.items))return v.items;
    return [];
  }

  if(typeof v==='string'&&v.trim()){
    try{
      let j=JSON.parse(v);

      if(Array.isArray(j))return j;

      if(j&&typeof j==='object'){
        if(Array.isArray(j.blocks))return j.blocks;
        if(Array.isArray(j.sections))return j.sections;
        if(Array.isArray(j.items))return j.items;
      }
    }catch(e){}

    return v.split(/\n|,/).map(function(x){return x.trim();}).filter(Boolean);
  }

  return [];
}

function truth(v){
  if(v===true||v===1)return true;

  if(typeof v==='string'){
    return ['true','1','yes','on','enabled','allow','allowed'].indexOf(v.toLowerCase())>-1;
  }

  return false;
}

function rank(k){
  return RANK[String(k||'free_viewer')]||0;
}

function client(){
  if(sb)return sb;
  if(!window.supabase||!window.supabase.createClient)throw new Error('Supabase SDK not loaded');
  sb=window.supabase.createClient(URL,KEY);
  return sb;
}

function timeout(ms,label){
  return new Promise(function(resolve,reject){
    setTimeout(function(){reject(new Error(label||'Timed out'));},ms);
  });
}

async function withTimeout(promise,ms,label){
  return Promise.race([promise,timeout(ms,label)]);
}

function isPlatformOwnerProfile(p){
  return !!p&&(p.admin_level==='owner'||p.admin_level==='platform_owner'||p.plan_key==='platform_owner');
}

function statusAllowed(p){
  let s=String(p&&p.account_status||'active').toLowerCase();
  return isPlatformOwnerProfile(p)||s==='active';
}

function builderAllowed(p){
  if(!p)return false;
  if(isPlatformOwnerProfile(p))return true;
  if(!statusAllowed(p))return false;

  let ps=obj(p.permissions_json);

  return rank(p.plan_key)>=rank('creator_growth')||
    truth(ps.web_builder)||
    truth(ps.web_builder_starter)||
    truth(ps.pages_manager)||
    truth(ps.web_builder_studio);
}

function sl(v){
  return String(v||'landing')
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9_-]+/g,'-')
    .replace(/^-+|-+$/g,'')||'landing';
}

function requestedSlug(){
  try{
    let u=new URL(location.href);
    return sl(u.searchParams.get('page')||'landing');
  }catch(e){
    return 'landing';
  }
}

function currentSlug(){
  let input=$('slug');

  if(input)return sl(input.value);

  return requestedSlug();
}

function isReservedSlug(slug){
  return OWNER_SLUGS.indexOf(sl(slug))>-1;
}

function settings(row){
  return obj(row&&row.settings_json);
}

function getBlocks(row){
  row=row||{};

  let candidates=[
    row.layout_json,
    row.blocks,
    row.content_json,
    row.page_json,
    row.sections,
    settings(row).blocks,
    settings(row).sections,
    settings(row).content_blocks,
    settings(row).contentBlocks
  ];

  for(let i=0;i<candidates.length;i++){
    let a=arr(candidates[i]);
    if(a.length)return a;
  }

  return [];
}

function isFormBlock(b){
  b=obj(b);

  let t=String(b.type||b.block_type||b.kind||'').toLowerCase();
  let title=String(b.title||b.heading||b.name||'').toLowerCase();

  return t.indexOf('form')>-1||
    t.indexOf('contact')>-1||
    title.indexOf('form')>-1||
    title.indexOf('contact')>-1||
    b.formKey||
    b.form_key||
    b.submitButtonText||
    b.submit_button_text;
}

function pageUrl(path,slug){
  return path+'?page='+encodeURIComponent(sl(slug||currentSlug()));
}

function links(){
  let s=currentSlug();

  return {
    slug:s,
    hub:'web-builder-account-control-hub-v7-12-263-test.html',
    pages:'web-builder-pages-manager-owned-v7-12-256-test.html',
    studio:pageUrl('overlay-route-truth-machine-v7-12-66-test.html',s),
    preview:pageUrl('web-builder-preview-owned-v7-12-257-test.html',s),
    menu:'web-builder-menu-builder-owned-v7-12-264-test.html',
    inbox:pageUrl('web-builder-form-inbox-owned-v7-12-258-test.html',s)
  };
}

function uid(){
  return 'f_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);
}

function defaultOptions(){
  return 'Option 1\nOption 2\nOption 3';
}

function typeName(t){
  return ({
    short:'Short text',
    long:'Long text',
    email:'Email',
    phone:'Phone',
    url:'URL',
    multiple:'Multiple choice',
    checkboxes:'Checkboxes',
    dropdown:'Dropdown',
    date:'Date picker',
    number:'Number',
    file:'Image/file URL'
  }[t]||'Field');
}

function placeholder(t){
  return ({
    short:'Your answer',
    long:'Write your answer',
    email:'name@email.com',
    phone:'Phone number',
    url:'https://example.com',
    date:'',
    number:'0',
    file:'Paste public image URL or file note'
  }[t]||'');
}

function needsOptions(t){
  return ['multiple','checkboxes','dropdown'].indexOf(t)>-1;
}

function fieldObj(type,label){
  return {
    id:uid(),
    label:label||typeName(type),
    kind:type,
    placeholder:placeholder(type),
    options:needsOptions(type)?defaultOptions():'',
    required:false
  };
}

function contactFields(){
  return [
    {id:uid(),label:'Your email',kind:'email',placeholder:'name@email.com',options:'',required:true},
    {id:uid(),label:'What can we help with?',kind:'multiple',placeholder:'',options:'General question\nBooking\nSupport\nOther',required:true},
    {id:uid(),label:'Message',kind:'long',placeholder:'Write your message',options:'',required:true}
  ];
}

function routing(){
  return {
    save_to_inbox:$('routeInbox').checked,
    owner_notification_intent:$('routeNotify').checked,
    owner_message_copy_intent:$('routeOwnerCopy').checked,
    email_destination_requested:$('routeEmail').checked,
    owner_email:$('ownerEmail').value.trim()||null,
    owner_name:$('ownerName').value.trim()||null,
    external_email_sent:false,
    message_delivered:false,
    note:'Email opens the user mail app only. Storage uploads are paused in this owner-lock pass.'
  };
}

function formBlock(){
  return {
    id:'owned-form-'+currentSlug(),
    type:'form',
    title:$('formTitleInput').value.trim()||'Form / Contact',
    text:$('introText').value.trim(),
    formKey:sl($('formKey').value||'contact'),
    submitButtonText:$('submitLabel').value.trim()||'Submit form',
    routing:routing(),
    storage:{
      uploads_paused_for_lock_pass:true,
      note:'No Supabase Storage upload is triggered by this locked form designer version.'
    },
    items:fields.map(function(f){
      return {
        id:f.id,
        label:f.label,
        kind:f.kind,
        placeholder:f.placeholder,
        options:f.options,
        required:!!f.required,
        storage_upload:false,
        accept:f.kind==='file'?'public URL or note only':''
      };
    })
  };
}

function setStatus(msg,kind){
  let el=$('status');

  if(!el)return;

  el.textContent=msg;
  el.className='status '+(kind||'');
}

async function readAuthority(){
  let c=client();
  let foundUser=null;

  let gu=await withTimeout(c.auth.getUser(),8000,'Supabase auth check timed out');
  if(gu&&gu.data&&gu.data.user)foundUser=gu.data.user;

  if(!foundUser){
    let gs=await withTimeout(c.auth.getSession(),8000,'Supabase session check timed out');
    if(gs&&gs.data&&gs.data.session&&gs.data.session.user)foundUser=gs.data.session.user;
  }

  if(!foundUser){
    return {signedIn:false,user:null,profile:null};
  }

  let pr=await withTimeout(
    c.from('sb_profiles')
      .select('id,username,display_name,role,admin_level,plan_key,permissions_json,account_status')
      .eq('id',foundUser.id)
      .maybeSingle(),
    10000,
    'Profile read timed out'
  );

  readCount++;
  authState.supabaseReads=true;

  if(pr.error)throw pr.error;

  return {
    signedIn:true,
    user:foundUser,
    profile:pr.data||null
  };
}

function rowSort(row){
  let s=settings(row);
  let n=Number(s.sort_order!=null?s.sort_order:s.sortOrder!=null?s.sortOrder:s.menu_order!=null?s.menu_order:999);
  return Number.isFinite(n)?n:999;

function rowIsHome(row){
  let s=settings(row);
  let slug=sl(row&&row.slug);

  return truth(s.is_home_page)||truth(s.isHomePage)||slug==='home'||slug==='home-page';
}

async function firstOwnedSlug(){
  let r=await withTimeout(
    client()
      .from('sb_site_pages')
      .select('id,slug,title,status,owner_id,settings_json,updated_at')
      .eq('owner_id',authState.userId)
      .limit(50),
    10000,
    'Own page redirect lookup timed out'
  );

  readCount++;
  authState.supabaseReads=true;

  if(r.error)throw r.error;

  let rows=(r.data||[]).filter(function(row){
    return row&&row.slug&&!isReservedSlug(row.slug);
  });

  rows.sort(function(a,b){
    let ah=rowIsHome(a)?0:1;
    let bh=rowIsHome(b)?0:1;

    if(ah!==bh)return ah-bh;

    let as=rowSort(a);
    let bs=rowSort(b);

    if(as!==bs)return as-bs;

    let au=String(a.updated_at||'');
    let bu=String(b.updated_at||'');

    if(au!==bu)return bu.localeCompare(au);

    return sl(a.slug).localeCompare(sl(b.slug));
  });

  return rows[0]?sl(rows[0].slug):'';
}

async function applyReservedSlugRedirect(slug){
  if(authState.isPlatformOwner)return false;
  if(!isReservedSlug(slug))return false;

  let own=await firstOwnedSlug();

  if(!own){
    renderLocked('This form designer slug is reserved for the platform owner workspace. Create your own page first.');
    return true;
  }

  redirectSlug=own;
  redirectTo=pageUrl('web-builder-form-designer-owned-v7-12-258-test.html',own);
  location.replace(redirectTo);

  return true;
}

async function readPage(slug){

    .from('sb_site_pages')
    .select('*')
    .eq('slug',slug)

  if(!authState.isPlatformOwner){
    q=q.eq('owner_id',authState.userId);
  }

  let r=await withTimeout(q,12000,'Form page read timed out');

  readCount++;
  authState.supabaseReads=true;

  if(r.error)throw r.error;

  let rows=r.data||[];

  if(!authState.isPlatformOwner){
    rows=rows.filter(function(row){
      return String(row.owner_id||'')===String(authState.userId);
    });
  }

  if(authState.isPlatformOwner&&rows.length>1){
    let own=rows.find(function(row){
      return String(row.owner_id||'')===String(authState.userId);
    });

    if(own)return own;
  }

  return rows[0]||null;
}

function optLines(f){
  return String(f.options||'').split(/\n|,/).map(function(x){return x.trim();}).filter(Boolean);

function liveField(f,i){
  let n='q'+i;
  let lab='<b>'+esc(f.label)+'</b> '+(f.required?'<span class="pill warn">required</span>':'');

  if(f.kind==='multiple'){
    return '<div class="question">'+lab+optLines(f).map(function(o){
      return '<label class="choice"><input type="radio" name="'+n+'" value="'+esc(o)+'"> '+esc(o)+'</label>';
    }).join('')+'</div>';
  }

  if(f.kind==='checkboxes'){
    return '<div class="question">'+lab+optLines(f).map(function(o){
      return '<label class="choice"><input type="checkbox" name="'+n+'" value="'+esc(o)+'"> '+esc(o)+'</label>';
    }).join('')+'</div>';
  }

  if(f.kind==='dropdown'){
    return '<div class="question">'+lab+'<select name="'+n+'"><option value="">Choose...</option>'+optLines(f).map(function(o){
      return '<option value="'+esc(o)+'">'+esc(o)+'</option>';
    }).join('')+'</select></div>';
  }

  if(f.kind==='long'){
    return '<div class="question">'+lab+'<textarea name="'+n+'" placeholder="'+esc(f.placeholder||'')+'"></textarea></div>';
  }

  if(f.kind==='file'){
    return '<div class="question">'+lab+'<input name="'+n+'" type="url" placeholder="Paste public image/file URL or note"><small>Storage upload is paused in this owner-lock pass. The URL/note can still be saved into the inbox answer.</small></div>';
  }

  let type={
    email:'email',
    phone:'tel',
    url:'url',
    date:'date',
    number:'number'
  }[f.kind]||'text';

  return '<div class="question">'+lab+'<input name="'+n+'" type="'+type+'" placeholder="'+esc(f.placeholder||'')+'"></div>';
}

function collect(){
  let root=$('liveForm');
  let answers={};
  let missing=[];
  let email='';

  for(let i=0;i<fields.length;i++){
    let f=fields[i];
    let n='q'+i;
    let els=[].slice.call(root.querySelectorAll('[name="'+n+'"]'));
    let value='';
    let values=[];

    if(els.length&&els[0].type==='checkbox'){
      values=els.filter(function(e){return e.checked;}).map(function(e){return e.value;});
      value=values.join(', ');
    }else if(els.length&&els[0].type==='radio'){
      let picked=els.find(function(e){return e.checked;});
      value=picked?picked.value:'';
    }else if(els[0]){
      value=String(els[0].value||'').trim();
    }

    if(f.required&&!value)missing.push(f.label);
    if(!email&&String(value).indexOf('@')>-1)email=String(value).trim();

    answers[f.label]={
      type:f.kind,
      answer:value,
      values:values,
      required:!!f.required,
      storage_upload:false
    };
  }

  if(missing.length)throw new Error('Required answers missing: '+missing.join(', '));

  return {
    answers:answers,
    email:email
  };
}

function cleanMailToAddress(to){
  return String(to||'').split(/[;,]+/).map(function(x){return x.trim();}).filter(Boolean).join(',');
}

  let to=cleanMailToAddress(routing().owner_email||'');
  let subject='Form submission: '+p.form_title+' / '+p.page_slug;

  return 'mailto:'+to+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(emailBody(p));
}

async function openEmailDraftFromPayload(p){
  let r=routing();

  if(!r.email_destination_requested)throw new Error('Email destination is not selected.');
  if(!cleanMailToAddress(r.owner_email))throw new Error('Owner email destination is missing.');

  let body=emailBody(p);
  let href=mailtoForPayload(p);

  lastEmailDraft={
    to:cleanMailToAddress(r.owner_email),
    subject:'Form submission: '+p.form_title+' / '+p.page_slug,
    bodyPreview:body,
    hrefPreview:href.slice(0,300),
    at:new Date().toISOString(),
    opened:true
  };

  emailDraftOpens++;

  try{
    if(navigator.clipboard)await navigator.clipboard.writeText(body);
  }catch(e){}

  let a=document.createElement('a');
  a.href=href;
  a.target='_self';
  a.rel='noopener';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();

  setTimeout(function(){
    try{a.remove();}catch(e){}
  },1000);
}

function replaceFormBlock(blocks,form){

  let out=blocks.map(function(b){
    if(!found&&isFormBlock(obj(b))){

      return form;
    }

    return b;
  });

  if(!found)out.push(form);

  return out;
}

async function saveFormDesign(){
  try{
    if(!page)throw new Error('No saved page row loaded. Load a page first.');
    if(!authState.allowed)throw new Error('Form Designer locked.');
    if(!authState.isPlatformOwner&&String(page.owner_id||'')!==String(authState.userId)){
      throw new Error('Creator users can save forms only to their own page rows.');
    }

    let form=formBlock();
    let existingBlocks=getBlocks(page);
    let nextBlocks=replaceFormBlock(existingBlocks,form);
    let nextSettings=Object.assign({},settings(page),{
      form_designer:{
        form_block:form,
        updated_by:'web-builder-form-designer-owned-v7-12-258-test.html',
        updated_at:new Date().toISOString(),
        storage_uploads_paused:true
      },
      content_blocks:nextBlocks,
      blocks:nextBlocks
    });

    let payload={
      settings_json:nextSettings
    };

    if(Object.prototype.hasOwnProperty.call(page,'layout_json')){
      payload.layout_json=nextBlocks;
    }else if(Object.prototype.hasOwnProperty.call(page,'content_json')){
      payload.content_json=nextBlocks;
    }else if(Object.prototype.hasOwnProperty.call(page,'page_json')){
      payload.page_json=nextBlocks;
    }else if(Object.prototype.hasOwnProperty.call(page,'sections')){
      payload.sections=nextBlocks;
    }

    let q=client()
      .from('sb_site_pages')
      .update(payload)
      .eq('id',page.id);

    if(!authState.isPlatformOwner){
      q=q.eq('owner_id',authState.userId);
    }

    let res=await withTimeout(
      q.select('*').maybeSingle(),
      12000,
      'Form design save timed out'
    );

    pageWrites++;
    authState.supabaseWrites=true;

    if(res.error)throw res.error;

    if(res.data)page=res.data;

    pageOwnerId=page.owner_id||pageOwnerId;

    lastAction='save form design passed';
    lastError='';

    setStatus('Saved form design to page row. No schema or Storage change.','good2');
    $('answers').textContent='FORM DESIGN SAVED\n\n'+JSON.stringify({
      page:page.slug,
      page_owner_id:pageOwnerId,
      fields:fields.length,
      savedColumns:Object.keys(payload),
      storageActions:false,
      schemaChanges:false
    },null,2);

    renderAll('Form design saved.');
  }catch(e){
    lastError=e&&e.message?e.message:String(e);
    lastAction='save form design failed';
    setStatus('Save failed: '+lastError,'bad2');
    $('answers').textContent='Save failed:\n'+lastError;
    renderDebug();
  }
}

    }:null,
    lastSubmit:lastSubmit,
    lastEmailDraft:lastEmailDraft,
    lastAction:lastAction,
    lastError:lastError,
    activeMenuPromotion:false,
    indexPromotion:false,
    registryPromotion:true
  });
}

function renderDebug(){
  if($('debug'))$('debug').textContent=JSON.stringify(state(),null,2);
}

function renderLinks(){
  if($('linkBox'))$('linkBox').textContent=JSON.stringify(links(),null,2);

  if($('previewTop'))$('previewTop').href=links().preview;
}

function renderAll(message){
  renderFieldList();
  renderLive();
  renderStats();
  renderLinks();
  renderDebug();

  if(message&&$('status'))setStatus(message,'good2');
}

function bindPage(){
  $('slug').addEventListener('change',function(){
    $('slug').value=currentSlug();
    loadPage();
  });

  $('loadPage').onclick=loadPage;
  $('contactPreset').onclick=setContact;
  $('addField').onclick=addField;
  $('applyFieldEdit').onclick=applyFieldEdit;
  $('fieldKind').onchange=updateOptionsNotice;
  $('saveFormDesign').onclick=saveFormDesign;
  $('localTest').onclick=localTest;
  $('realSubmit').onclick=realSubmit;
  $('openEmailDraft').onclick=openEmailDraft;
  $('openInbox').onclick=function(){
    location.href=links().inbox;
  };
  $('copyReport').onclick=async function(){
    let text=JSON.stringify(state(),null,2);

    try{
      await navigator.clipboard.writeText(text);
      setStatus('Copied form designer report.','good2');
    }catch(e){
      alert(text);
    }
  };

  ['formTitleInput','formKey','submitLabel','introText','routeInbox','routeNotify','routeOwnerCopy','routeEmail','ownerEmail','ownerName'].forEach(function(id){
    let el=$(id);

    if(el){
      el.addEventListener('input',function(){
        renderAll('');
      });

      el.addEventListener('change',function(){
        renderAll('');
      });
    }
  });
}

function renderLocked(reason){
  authState.checked=true;
  authState.allowed=false;
  authState.reason=reason||authState.reason;

  document.body.innerHTML='<main class="lockedScreen">\
<section class="hero">\
<span class="badge bad">Form Designer locked</span>\
<h1>Page owner access required</h1>\
<p>This form designer opens only for platform owner and eligible Web Builder creator accounts. Creator users can only edit their own page rows.</p>\
<div class="panel"><b>Reason</b><p>'+esc(authState.reason)+'</p></div>\
<div class="actions">\
<a class="btn primary" href="web-builder-account-control-hub-v7-12-263-test.html">Web Builder Hub</a>\
<a class="btn" href="web-builder-pages-manager-owned-v7-12-256-test.html">Owned Pages</a>\
<a class="btn" href="settings-platform-control-hub-v7-12-85-test.html">Back to Settings</a>\
</div>\
<h2>Debug</h2>\
<pre class="debug">'+esc(JSON.stringify(Object.assign({},authState,{redirectTo:redirectTo,redirectSlug:redirectSlug,lastError:lastError}),null,2))+'</pre>\
</section>\
</main>';
}

async function boot(){
  try{
    let authority=await readAuthority();

    authState.signedIn=authority.signedIn;

    if(!authority.signedIn){
      renderLocked('Sign in required before opening Form Designer.');
      return;
    }

    user=authority.user;
    profile=authority.profile||{};

    authState.userId=user.id;
    authState.email=user.email||'';
    authState.role=profile.role||'';
    authState.adminLevel=profile.admin_level||'';
    authState.planKey=profile.plan_key||'';
    authState.accountStatus=profile.account_status||'active';
    authState.isPlatformOwner=isPlatformOwnerProfile(profile);
    authState.canUseBuilder=builderAllowed(profile);
    authState.workspace=authState.isPlatformOwner?'platform-owner-any-workspace':'personal-owner-id-only';

    if(!authState.canUseBuilder){
      renderLocked('Web Builder plan or permission required.');
      return;
    }

    let initialSlug=requestedSlug();

    if(await applyReservedSlugRedirect(initialSlug)){
      return;
    }

    authState.allowed=true;
    authState.reason='Allowed. Form Designer owner workspace lock passed.';

    renderPage();
  }catch(e){
    authState.reason=e&&e.message?e.message:String(e);
    lastError=authState.reason;
    renderLocked('Form Designer lock check failed: '+authState.reason);
  }
}

boot();

})();
