};

const $=function(id){return document.getElementById(id);};

function app(){
  return $('app');
}

function esc(v){
  return String(v==null?'':v).replace(/[&<>"']/g,function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]||m;
  });
}

function obj(v){
  if(v&&typeof v==='object')return v;
  if(typeof v==='string'&&v.trim()){
    try{return JSON.parse(v)||{};}catch(e){}
  }
  return {};
}

function arr(v){
  if(Array.isArray(v))return v;
  if(v&&typeof v==='object'){
    if(Array.isArray(v.blocks))return v.blocks;
    if(Array.isArray(v.sections))return v.sections;
    if(Array.isArray(v.items))return v.items;
    return [];
  }
  if(typeof v==='string'&&v.trim()){
    try{
      let j=JSON.parse(v);
      if(Array.isArray(j))return j;
      if(j&&typeof j==='object'){
        if(Array.isArray(j.blocks))return j.blocks;
        if(Array.isArray(j.sections))return j.sections;
        if(Array.isArray(j.items))return j.items;
      }
    }catch(e){}
    return v.split(/\n|,/).map(function(x){return x.trim();}).filter(Boolean);
  }
  return [];
}

function truth(v){
  if(v===true||v===1)return true;
  if(typeof v==='string'){
    return ['true','1','yes','on','enabled','allow','allowed'].indexOf(v.toLowerCase())>-1;
  }
  return false;
}

function rank(k){
  return RANK[String(k||'free_viewer')]||0;
}

function client(){
  if(sb)return sb;
  if(!window.supabase||!window.supabase.createClient)throw new Error('Supabase SDK not loaded');
  sb=window.supabase.createClient(URL,KEY);
  return sb;
}

function timeout(ms,label){
  return new Promise(function(resolve,reject){
    setTimeout(function(){reject(new Error(label||'Timed out'));},ms);
  });
}

async function withTimeout(promise,ms,label){
  return Promise.race([promise,timeout(ms,label)]);
}

function isPlatformOwnerProfile(p){
  return !!p&&(p.admin_level==='owner'||p.admin_level==='platform_owner'||p.plan_key==='platform_owner');
}

function statusAllowed(p){
  let s=String(p&&p.account_status||'active').toLowerCase();
  return isPlatformOwnerProfile(p)||s==='active';
}

function builderAllowed(p){
  if(!p)return false;
  if(isPlatformOwnerProfile(p))return true;
  if(!statusAllowed(p))return false;

  let ps=obj(p.permissions_json);

  return rank(p.plan_key)>=rank('creator_growth')||
    truth(ps.web_builder)||
    truth(ps.web_builder_starter)||
    truth(ps.pages_manager)||
    truth(ps.web_builder_studio);
}

function sl(v){
  return String(v||'landing')
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9_-]+/g,'-')
    .replace(/^-+|-+$/g,'')||'landing';
}

function requestedSlug(){
  try{
    let u=new URL(location.href);
    return sl(u.searchParams.get('page')||'landing');
  }catch(e){
    return 'landing';
  }
}

function currentSlug(){
  let input=$('slug');
  if(input)return sl(input.value);
  return requestedSlug();
}

function isReservedSlug(slug){
  return OWNER_SLUGS.indexOf(sl(slug))>-1;
}

function settings(row){
  return obj(row&&row.settings_json);
}

function getBlocks(row){
  row=row||{};
  let candidates=[
    row.layout_json,
    row.blocks,
    row.content_json,
    row.page_json,
    row.sections,
    settings(row).blocks,
    settings(row).sections,
    settings(row).content_blocks,
    settings(row).contentBlocks,
    settings(row).form_designer&&settings(row).form_designer.blocks
  ];

  for(let i=0;i<candidates.length;i++){
    let a=arr(candidates[i]);
    if(a.length)return a;
  }

  return [];
}

function isFormBlock(b){
  b=obj(b);
  let t=String(b.type||b.block_type||b.kind||'').toLowerCase();
  let title=String(b.title||b.heading||b.name||'').toLowerCase();

  return t.indexOf('form')>-1||
    t.indexOf('contact')>-1||
    title.indexOf('form')>-1||
    title.indexOf('contact')>-1||
    b.formKey||
    b.form_key||
    b.submitButtonText||
    b.submit_button_text;
}

function uid(){
  return 'f_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);
}

function defaultOptions(){
  return 'Option 1\nOption 2\nOption 3';
}

function typeName(t){
  return ({
    short:'Short text',
    long:'Long text',
    email:'Email',
    phone:'Phone',
    url:'URL',
    multiple:'Multiple choice',
    checkboxes:'Checkboxes',
    dropdown:'Dropdown',
    date:'Date picker',
    number:'Number',
    file:'Image upload'
  }[t]||'Field');
}

function placeholder(t){
  return ({
    short:'Your answer',
    long:'Write your answer',
    email:'name@email.com',
    phone:'Phone number',
    url:'https://example.com',
    date:'',
    number:'0',
    file:''
  }[t]||'');
}

function needsOptions(t){
  return ['multiple','checkboxes','dropdown'].indexOf(t)>-1;
}

function contactFields(){
  return [
    {id:uid(),label:'Pick a mix',kind:'multiple',placeholder:'',options:'1\n2\n3\n4\n5',required:true},
    {id:uid(),label:'Your email',kind:'email',placeholder:'name@email.com',options:'',required:true},
    {id:uid(),label:'Long text',kind:'long',placeholder:'Whats one saying',options:'',required:true}
  ];
}

function fieldObj(type,label){
  return {
    id:uid(),
    label:label||typeName(type),
    kind:type,
    placeholder:placeholder(type),
    options:needsOptions(type)?defaultOptions():'',
    required:false
  };
}

function pageUrl(path,slug){
  return path+'?page='+encodeURIComponent(sl(slug||currentSlug()));
}

function links(){
  let s=currentSlug();

  return {
    slug:s,
    hub:'web-builder-account-control-hub-v7-12-263-test.html',

async function readAuthority(){
  let c=client();
  let foundUser=null;

  let gu=await withTimeout(c.auth.getUser(),8000,'Supabase auth check timed out');
  if(gu&&gu.data&&gu.data.user)foundUser=gu.data.user;

  if(!foundUser){
    let gs=await withTimeout(c.auth.getSession(),8000,'Supabase session check timed out');
    if(gs&&gs.data&&gs.data.session&&gs.data.session.user)foundUser=gs.data.session.user;
  }

  if(!foundUser){
    return {signedIn:false,user:null,profile:null};
  }

  let pr=await withTimeout(
    c.from('sb_profiles')
      .select('id,username,display_name,role,admin_level,plan_key,permissions_json,account_status')
      .eq('id',foundUser.id)
      .maybeSingle(),
    10000,
    'Profile read timed out'
  );

  readCount++;
  authState.supabaseReads=true;

  if(pr.error)throw pr.error;

  return {
    signedIn:true,
    user:foundUser,
    profile:pr.data||null
  };
}

function rowSort(row){
  let s=settings(row);
  let n=Number(s.sort_order!=null?s.sort_order:s.sortOrder!=null?s.sortOrder:s.menu_order!=null?s.menu_order:999);
  return Number.isFinite(n)?n:999;
}

function rowIsHome(row){
  let s=settings(row);
  let slug=sl(row&&row.slug);
  return truth(s.is_home_page)||truth(s.isHomePage)||slug==='home'||slug==='home-page';
}

async function firstOwnedSlug(){
  let r=await withTimeout(
    client()
      .from('sb_site_pages')
      .select('id,slug,title,status,owner_id,settings_json,updated_at')
      .eq('owner_id',authState.userId)
      .limit(50),
    10000,
    'Own page redirect lookup timed out'
  );

  readCount++;
  authState.supabaseReads=true;

  if(r.error)throw r.error;

  let rows=(r.data||[]).filter(function(row){
    return row&&row.slug&&!isReservedSlug(row.slug);
  });

  rows.sort(function(a,b){
    let ah=rowIsHome(a)?0:1;
    let bh=rowIsHome(b)?0:1;

    if(ah!==bh)return ah-bh;

    let as=rowSort(a);
    let bs=rowSort(b);

    if(as!==bs)return as-bs;

    let au=String(a.updated_at||'');
    let bu=String(b.updated_at||'');

    if(au!==bu)return bu.localeCompare(au);

    return sl(a.slug).localeCompare(sl(b.slug));
  });

  return rows[0]?sl(rows[0].slug):'';
}

async function applyReservedSlugRedirect(slug){
  if(authState.isPlatformOwner)return false;
  if(!isReservedSlug(slug))return false;

  let own=await firstOwnedSlug();

  if(!own){
    renderLocked('This form designer slug is reserved for the platform owner workspace. Create your own page first.');
    return true;
  }

  redirectSlug=own;
  redirectTo=pageUrl('web-builder-form-designer-owned-v7-12-258-test.html',own);
  location.replace(redirectTo);

  return true;
}

async function readPage(slug){
  let q=client()
    .from('sb_site_pages')
    .select('*')
    .eq('slug',slug)
    .limit(20);

  if(!authState.isPlatformOwner){
    q=q.eq('owner_id',authState.userId);
  }

  let r=await withTimeout(q,12000,'Form page read timed out');

  readCount++;
  authState.supabaseReads=true;

  if(r.error)throw r.error;

  let rows=r.data||[];

  if(!authState.isPlatformOwner){
    rows=rows.filter(function(row){
      return String(row.owner_id||'')===String(authState.userId);
    });
  }

  if(authState.isPlatformOwner&&rows.length>1){
    let own=rows.find(function(row){
      return String(row.owner_id||'')===String(authState.userId);
    });

    if(own)return own;
  }

  return rows[0]||null;
}

function safeFileName(name){
  return String(name||'upload')
    .toLowerCase()
    .replace(/[^a-z0-9._-]+/g,'-')
    .replace(/^-+|-+$/g,'')||'upload';
}

async function uploadFormFile(file,f,i){
  if(!file)return null;

  if(ALLOWED_TYPES.indexOf(file.type)===-1){
    throw new Error('Upload blocked: '+file.name+' is '+(file.type||'unknown')+'. Allowed: PNG, JPEG, WebP.');
  }

  if(file.size>50*1024*1024){
    throw new Error('Upload blocked: '+file.name+' is over 50MB.');
  }

  let ownerPart=pageOwnerId||authState.userId||'unknown-owner';
  let path='web-builder-forms/'+ownerPart+'/'+currentSlug()+'/'+Date.now()+'-'+i+'-'+safeFileName(file.name);

  let res=await withTimeout(
    client().storage.from(BUCKET).upload(path,file,{
      cacheControl:'3600',
      upsert:false,
      contentType:file.type
    }),
    20000,
    'Image upload timed out'
  );

  if(res.error)throw res.error;

  let pub=client().storage.from(BUCKET).getPublicUrl(path);

  storageUploads++;

  let meta={
    bucket:BUCKET,
    path:path,
    publicUrl:pub&&pub.data&&pub.data.publicUrl||'',
    name:file.name,
    type:file.type,
    size:file.size,
    field:f.label,
    uploaded_at:new Date().toISOString(),
    existingBucketOnly:true,
    bucketPolicyChanged:false
  };

  lastUploads.push(meta);

  return meta;
}

async function collect(opts){
  opts=opts||{};

  let root=$('liveForm');
  let answers={};
  let missing=[];
  let email='';

  for(let i=0;i<fields.length;i++){
    let f=fields[i];
    let n='q'+i;
    let els=[].slice.call(root.querySelectorAll('[name="'+n+'"]'));
    let value='';
    let values=[];
    let upload=null;

    if(f.kind==='file'){
      let input=els[0];
      let file=input&&input.files&&input.files[0];

      if(file){
        if(opts.uploadFiles){
          upload=await uploadFormFile(file,f,i);
          value=upload.publicUrl||upload.path;
        }else{
          value=file.name;
          upload={
            name:file.name,
            type:file.type,
            size:file.size,
            not_uploaded:true
          };
        }
      }
    }else if(els.length&&els[0].type==='checkbox'){
      values=els.filter(function(e){return e.checked;}).map(function(e){return e.value;});
      value=values.join(', ');
    }else if(els.length&&els[0].type==='radio'){
      let picked=els.find(function(e){return e.checked;});
      value=picked?picked.value:'';
    }else if(els[0]){
      value=String(els[0].value||'').trim();
    }

    if(f.required&&!value)missing.push(f.label);
    if(!email&&String(value).indexOf('@')>-1)email=String(value).trim();

    answers[f.label]={
      type:f.kind,
      answer:value,
      values:values,
      required:!!f.required,
      upload:upload
    };
  }

  if(missing.length)throw new Error('Required answers missing: '+missing.join(', '));

  return {
    answers:answers,
    email:email
  };
}

function emailBody(p){
  let lines=[
    'New form submission',

    'Form: '+p.form_title,
    'Page: '+p.page_slug,

async function realSubmit(){
  try{
    lastUploads=[];

    let p=submissionPayload(await collect({uploadFiles:true}));
    let r=p.answers_json.__routing;

    if(!r.save_to_inbox&&!r.email_destination_requested&&!r.owner_message_copy_intent){
      throw new Error('Choose at least one destination.');
    }

    if(r.save_to_inbox){
      let res=await withTimeout(
        client().from('sb_form_submissions').insert(p).select('*').maybeSingle(),
        12000,
        'Inbox submit timed out'
      );

      submissionWrites++;
      authState.supabaseWrites=true;

      if(res.error)throw res.error;

      lastSubmit=res.data||p;
    }

    lastAction='real submit passed';
    lastError='';

    $('answers').textContent='REAL SUBMIT RESULT\n\n'+JSON.stringify({
      savedToInbox:!!r.save_to_inbox,
      submission:lastSubmit,
      emailDraftRequested:!!r.email_destination_requested,
      privateMessageIntent:!!r.owner_message_copy_intent,
      uploads:lastUploads,
      storageUploads:storageUploads,
      existingBucketOnly:true,
      bucketPolicyChanged:false
    },null,2);

    setStatus('Submit processed. Uploads and inbox saved if selected.','good2');

    if(r.email_destination_requested){
      await openEmailDraftFromPayload(p);
    }

    renderStats();
    renderDebug();
  }catch(e){
    lastError=e&&e.message?e.message:String(e);
    lastAction='real submit failed';
    $('answers').textContent='Real submit failed:\n'+lastError;
    setStatus('Real submit failed: '+lastError,'bad2');
    renderDebug();
  }
}

function replaceFormBlock(blocks,form){
  let found=false;

  let out=blocks.map(function(b){
    if(!found&&isFormBlock(obj(b))){
      found=true;
      return form;
    }

    return b;
  });

  if(!found)out.push(form);

  return out;
}

async function saveFormDesign(){
  try{
    if(!page)throw new Error('No saved page row loaded. Load a page first.');
    if(!authState.allowed)throw new Error('Form Designer locked.');

    if(!authState.isPlatformOwner&&String(page.owner_id||'')!==String(authState.userId)){
      throw new Error('Creator users can save forms only to their own page rows.');
    }

    let form=formBlock();
    let existingBlocks=getBlocks(page);
    let nextBlocks=replaceFormBlock(existingBlocks,form);

    let nextSettings=Object.assign({},settings(page),{
      form_designer:{
        form_block:form,
        updated_by:'web-builder-form-designer-owned-v7-12-258-test.html',
        updated_at:new Date().toISOString(),
        overlays_preserved:true,
        image_upload_existing_bucket:true,
        bucket:BUCKET,
        bucket_policy_changed:false
      },
      content_blocks:nextBlocks,
      blocks:nextBlocks
    });

    let payload={
      settings_json:nextSettings
    };

    ['layout_json','content_json','page_json','sections','blocks'].forEach(function(col){
      if(page&&Object.prototype.hasOwnProperty.call(page,col)){
        payload[col]=nextBlocks;
      }
    });

    let q=client()
      .from('sb_site_pages')
      .update(payload)
      .eq('id',page.id);

    if(!authState.isPlatformOwner){
      q=q.eq('owner_id',authState.userId);
    }

    let res=await withTimeout(
      q.select('*').maybeSingle(),
      12000,
      'Form design save timed out'
    );

    pageWrites++;
    authState.supabaseWrites=true;

    if(res.error)throw res.error;

    if(res.data)page=res.data;

    pageOwnerId=page.owner_id||pageOwnerId;

    lastAction='save form design passed';
    lastError='';

    setStatus('Saved form design to page row. Overlay system preserved. No schema change.','good2');

    $('answers').textContent='FORM DESIGN SAVED\n\n'+JSON.stringify({
      page:page.slug,
      page_owner_id:pageOwnerId,
      fields:fields.length,
      savedColumns:Object.keys(payload),
      overlaysPreserved:true,
      builderOverlayPreserved:true,
      destinationOverlayPreserved:true,
      fieldEditOverlayPreserved:true,
      imageUploadExistingBucket:true,
      bucket:BUCKET,
      bucketPolicyChanged:false,
      schemaChanges:false
    },null,2);

    renderAll('Form design saved.');
  }catch(e){
    lastError=e&&e.message?e.message:String(e);
    lastAction='save form design failed';
    setStatus('Save failed: '+lastError,'bad2');
    $('answers').textContent='Save failed:\n'+lastError;
    renderDebug();
  }
}

async function boot(){
  try{
    let authority=await readAuthority();

    authState.signedIn=authority.signedIn;

    if(!authority.signedIn){
      renderLocked('Sign in required before opening Form Designer.');
      return;
    }

    user=authority.user;
    profile=authority.profile||{};

    authState.userId=user.id;
    authState.email=user.email||'';
    authState.role=profile.role||'';
    authState.adminLevel=profile.admin_level||'';
    authState.planKey=profile.plan_key||'';
    authState.accountStatus=profile.account_status||'active';
    authState.isPlatformOwner=isPlatformOwnerProfile(profile);
    authState.canUseBuilder=builderAllowed(profile);
    authState.workspace=authState.isPlatformOwner?'platform-owner-any-workspace':'personal-owner-id-only';

    if(!authState.canUseBuilder){
      renderLocked('Web Builder plan or permission required.');
      return;
    }

    let initialSlug=requestedSlug();

    if(await applyReservedSlugRedirect(initialSlug)){
      return;
    }

    authState.allowed=true;
    authState.reason='Allowed. Form Designer owner workspace lock passed.';

    renderPage();
  }catch(e){
    authState.reason=e&&e.message?e.message:String(e);
    lastError=authState.reason;
    renderLocked('Form Designer lock check failed: '+authState.reason);
  }
}

boot();
