<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stream Bandit Tools V5.24.1 Quality Merge Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="assets/stream-bandit.css">
<link rel="stylesheet" href="assets/stream-bandit-v5-5-polish.css">
</head>
<body>
<script>
/* Load the proven V5.20.2 full Tools page, then attach the V5.24.1 Quality Tools tab add-on.
   This avoids putting the add-on script tag inside the fetched HTML string, which browsers can ignore. */
fetch('tools-v5-20-2.html?base='+Date.now(),{cache:'no-store'})
  .then(function(r){return r.text();})
  .then(function(html){
    document.open();
    document.write(html);
    document.close();
    setTimeout(function(){
      var s=document.createElement('script');
      s.src='assets/stream-bandit-v5-24-1-tools-quality-tab.js?v=5.24.1-fixed-'+Date.now();
      s.onload=function(){console.log('Stream Bandit V5.24.1 Quality Tools add-on loaded');};
      s.onerror=function(){console.error('Stream Bandit V5.24.1 Quality Tools add-on failed to load');};
      document.body.appendChild(s);
    },350);
  })
  .catch(function(e){
    document.body.innerHTML='<div style="padding:30px;color:white;font-family:system-ui;background:#050712;min-height:100vh"><h1>Stream Bandit Tools V5.24.1</h1><p>Could not load V5.20.2 fallback page.</p><pre>'+String(e.message||e)+'</pre><p><a style="color:#22d3a6" href="tools-v5-20-2.html">Open V5.20.2 fallback</a></p></div>';
  });
</script>
</body>
</html>
