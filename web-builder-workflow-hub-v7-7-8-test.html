<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.7.8 Workflow Hub TEST</title><style>body{margin:0;background:#050711;color:white;font-family:system-ui,Arial;padding:22px}.wrap{max-width:1200px;margin:auto}.box,.card{border:1px solid #ffffff22;border-radius:24px;background:linear-gradient(135deg,#101529,#17122d);padding:20px;margin:0 0 16px;box-shadow:0 18px 60px #0007}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px;font-size:12px}.btn{border:0;border-radius:999px;padding:11px 15px;background:linear-gradient(135deg,#22d3a6,#7c3cff);color:white;font-weight:900;text-decoration:none;display:inline-block;margin:4px}.warn{background:linear-gradient(135deg,#ffb142,#7c3cff)}.hot{background:linear-gradient(135deg,#ff2d85,#7c3cff)}h1{font-size:clamp(38px,7vw,72px);line-height:.95;margin:8px 0}p{color:#b9c0d8;line-height:1.5}input{border:1px solid #ffffff24;border-radius:999px;background:#0006;color:white;padding:12px 15px;font:inherit;min-width:260px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:0;border-radius:999px;padding:10px 14px;background:#414667;color:white;font-weight:900;cursor:pointer}.tab.on{background:linear-gradient(135deg,#22d3a6,#7c3cff)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:12px}.card{display:flex;flex-direction:column;justify-content:space-between;min-height:205px}.card b{color:#baf7df}.link{word-break:break-all;background:#0006;color:#dfffee;border-radius:12px;padding:10px;margin-top:10px;font-size:12px}.note{background:#ffb1421f;border:1px solid #ffb14252;color:#ffe7ad;border-radius:16px;padding:12px;font-weight:800}</style></head><body><div class="wrap"><section class="box"><span class="pill">V7.7.8 Web Builder Workflow Hub Update TEST</span><h1>🏗️ Web Builder Workflow</h1><p>Updated hub pointing to the newest passed Web Builder pieces.</p><input id="slug" value="test-page" placeholder="page slug"><button id="apply" class="btn">Update Links</button><p id="status" class="note">Ready. Registry still waits until the group is complete.</p></section><section class="box"><div id="tabs" class="tabs"></div></section><section class="box"><h2 id="title">Build</h2><p id="desc">Working pages for this step.</p><div id="cards" class="grid"></div></section></div><script>const groups={Build:{desc:'Create blocks and save automatic actions.',items:[['Auto Actions Builder','Newest passed builder for automatic action links.','web-builder-auto-actions-v7-7-4-test.html?page={slug}','hot'],['Unified Shell','Manual-upload checkpoint with builder plus light settings.','web-builder-unified-shell-v7-7-5-test.html?page={slug}',''],['Old Canvas','Older strong canvas/repeater checkpoint, kept for reference.','web-builder-repeater-canvas-v7-5-7-test.html','warn']]},Style:{desc:'Pick colours and preview saved settings.',items:[['Colour Pickers','Proper colour picker controls.','web-builder-colour-pickers-v7-7-6-test.html?page={slug}','hot'],['Styled Preview','Preview using saved colours and saved actions.','web-builder-style-preview-v7-7-7-test.html?page={slug}','hot']]},Preview:{desc:'Check published-style output.',items:[['Styled Preview','Current best preview. Uses settings_json and actionUrl.','web-builder-style-preview-v7-7-7-test.html?page={slug}','hot'],['Action Preview','Previous passed action-aware preview without colour styling.','web-builder-action-preview-v7-7-3-test.html?page={slug}',''],['Block Focus Preview','Older focus preview kept for reference.','web-builder-preview-block-focus-v7-7-1-test.html?page={slug}','warn']]},Forms:{desc:'Submit and read Web Builder form answers.',items:[['Form Save','Submit form and save to sb_form_submissions.','web-builder-form-save-v7-6-5-test.html?page={slug}','hot'],['Form Answers','Read saved Web Builder form submissions.','web-builder-form-viewer-v7-6-6-test.html?page={slug}','hot']]},Tools:{desc:'Repair/audit helpers and registry.',items:[['Action Repair','Only needed for older pages missing action data.','web-builder-action-repair-v7-7-2-test.html?page={slug}','warn'],['Old Workflow Tabs','Previous workflow hub checkpoint.','web-builder-workflow-tabs-v7-6-9-test.html',''],['Registry','Full registry map. Do not shrink.','all-pages-version-registry-v6-29-test.html','warn']]}};let active='Build';function enc(){return encodeURIComponent((document.getElementById('slug').value||'test-page').trim()||'test-page')}function card(t){let href=t[2].replace('{slug}',enc()),cls=t[3]==='warn'?'btn warn':t[3]==='hot'?'btn hot':'btn';return '<article class="card"><div><b>'+t[0]+'</b><p>'+t[1]+'</p></div><div><a class="'+cls+'" href="'+href+'">Open</a><div class="link">'+href+'</div></div></article>'}function render(){document.getElementById('tabs').innerHTML=Object.keys(groups).map(k=>'<button class="tab '+(k===active?'on':'')+'" data-t="'+k+'">'+k+'</button>').join('');document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{active=b.dataset.t;render()});let g=groups[active];document.getElementById('title').textContent=active;document.getElementById('desc').textContent=g.desc;document.getElementById('cards').innerHTML=g.items.map(card).join('');document.getElementById('status').textContent='Links updated for '+decodeURIComponent(enc())}document.getElementById('apply').onclick=render;render();</script></body></html>
