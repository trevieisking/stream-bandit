<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.9.0 Shared Style Preview TEST</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--bg:#050711;--card:#101529;--card2:#17122d;--line:#ffffff22;--muted:#b9c0d8;--title:#fff;--accent:#22d3a6;--accent2:#7c3cff;--btnText:#fff;--fontScale:1}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 8% 0,color-mix(in srgb,var(--accent),transparent 70%),transparent 34%),radial-gradient(circle at 92% 0,color-mix(in srgb,var(--accent2),transparent 68%),transparent 38%),var(--bg);color:var(--title);font-family:system-ui,Arial;padding:22px;font-size:calc(16px * var(--fontScale))}.wrap{max-width:1180px;margin:auto}.box,.block,.card{border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,var(--card),var(--card2));padding:20px;margin:0 0 16px;box-shadow:0 18px 60px #0007}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px;font-size:12px}.btn{border:0;border-radius:999px;padding:11px 15px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--btnText);font-weight:900;text-decoration:none;display:inline-block;margin:4px}.warn{background:linear-gradient(135deg,#ffb142,var(--accent2))}.hot{background:linear-gradient(135deg,#ff2d85,var(--accent2))}h1{font-size:clamp(38px,7vw,72px);line-height:.95;margin:8px 0}p{color:var(--muted);line-height:1.5}input{border:1px solid #ffffff24;border-radius:999px;background:#0006;color:white;padding:12px 15px;font:inherit;min-width:260px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.card{background:#0004}.note{background:#ffb1421f;border:1px solid #ffb14252;color:#ffe7ad;border-radius:16px;padding:12px;font-weight:800}.good{background:#22d3a61f;border-color:#22d3a652;color:#baf7df}.src{white-space:pre-wrap;background:#0006;border-radius:14px;padding:12px;color:#dfffee;max-height:260px;overflow:auto}.link{word-break:break-all;background:#0006;color:#dfffee;border-radius:12px;padding:10px;margin-top:8px;font-size:12px}</style></head><body><div class="wrap"><section class="box"><span class="pill">V7.9.0 Shared Style Preview TEST</span><h1>Published Preview</h1><p>Uses saved Theme Studio shared style first, with page settings as fallback.</p><input id="slug" value="test-page"><button id="load" class="btn">Load Page</button><a class="btn hot" href="web-builder-theme-studio-controls-v7-8-9-test.html">Theme Studio</a><a class="btn warn" href="web-builder-full-edit-lock-v7-8-5-test.html?page=test-page">Builder</a><p id="status" class="note">Ready.</p></section><main id="main" class="box"><p>Loading...</p></main><section class="box"><h2>Debug</h2><div id="debug" class="src">Waiting...</div></section></div><script src="stream-bandit-shell-v6-24.js"></script><script>let sb,page,sharedStyle={};const STORE_ID='stream_bandit';const STYLE_KEY='web_builder_shared_style_v7_8_8';const $=i=>document.getElementById(i);function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function sl(s){return String(s||'block').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'block'}async function init(){if(sb)return;let t=await fetch('stream-bandit-shell-v6-24.js',{cache:'no-store'}).then(r=>r.text());sb=supabase.createClient((t.match(/SUPABASE_URL\s*=\s*'([^']+)'/)||[])[1],(t.match(/SUPABASE_KEY\s*=\s*'([^']+)'/)||[])[1])}function pickStyle(pageStyle,globalStyle){return {...(pageStyle||{}),...(globalStyle||{})}}function applyStyle(s){s=s||{};document.documentElement.style.setProperty('--accent',s.accent||'#22d3a6');document.documentElement.style.setProperty('--accent2',s.accent2||'#7c3cff');document.documentElement.style.setProperty('--bg',s.bg||'#050711');document.documentElement.style.setProperty('--card',s.card||s.cardColor||'#101529');document.documentElement.style.setProperty('--card2',s.card||s.cardColor||'#17122d');document.documentElement.style.setProperty('--title',s.titleColor||'#ffffff');document.documentElement.style.setProperty('--muted',s.textColor||'#b9c0d8');document.documentElement.style.setProperty('--btnText',s.buttonText||'#ffffff');document.documentElement.style.setProperty('--fontScale',s.largeText?'1.12':'1');document.documentElement.style.setProperty('--line',s.highContrast?'#ffffff66':'#ffffff22');document.body.style.fontFamily=s.font||'system-ui,Arial'}function isForm(b){return String(b.type||'').includes('form')||String(b.title||'').toLowerCase().includes('form')}function actionFor(b){let cur=page.slug,bs=b.blockSlug||sl(b.title||b.type);if(isForm(b))return 'web-builder-form-save-v7-6-5-test.html?page='+encodeURIComponent(cur);return 'web-builder-shared-style-block-v7-9-0-test.html?page='+encodeURIComponent(cur)+'&block='+encodeURIComponent(bs)}function cards(a,fn){return '<div class="grid">'+(Array.isArray(a)?a:[]).map(x=>'<div class="card">'+fn(x)+'</div>').join('')+'</div>'}function inner(b){let a=b.items||[],t=String(b.type||'');if(t==='form')return cards(a,x=>'<b>'+esc(x.label)+'</b><p>'+esc(x.kind)+(x.required?' required':'')+'</p>');if(t==='faq')return cards(a,x=>'<b>Q: '+esc(x.q)+'</b><p>A: '+esc(x.a)+'</p>');if(t==='pricing')return cards(a,x=>'<b>'+esc(x.name)+'</b><p>'+esc(x.price)+'</p><p>'+esc(x.features)+'</p>');if(t==='rating')return cards(a,x=>'<b>'+esc(x.name)+'</b><p>Rating '+esc(x.rating)+'</p><p>'+esc(x.review)+'</p>');if(t==='features')return cards(a,x=>'<b>'+esc(x.icon)+' '+esc(x.title)+'</b><p>'+esc(x.text)+'</p>');if(t==='page_feed'||t==='blog')return cards(a,x=>'<b>'+esc(x.title)+'</b><p>'+esc(x.body)+'</p>');if(t==='image_gallery')return cards(a,x=>'<b>'+esc(x.title)+'</b><p>'+esc(x.caption)+'</p>');return ''}function block(b){let link=actionFor(b);return '<section class="block"><span class="pill">'+esc(b.type||'block')+'</span><h2>'+esc(b.title||'Block')+'</h2><p>'+esc(b.text||'')+'</p>'+inner(b)+'<a class="btn" href="'+esc(link)+'">'+esc(isForm(b)?'Open Form':'Open Page')+'</a><div class="link">'+esc(link)+'</div></section>'}async function loadShared(){let r=await sb.from('sb_app_settings').select('settings').eq('id',STORE_ID).maybeSingle();if(r.error)throw r.error;let settings=(r.data&&r.data.settings)||{};sharedStyle=settings[STYLE_KEY]||settings.web_builder_style||settings.builderStyle||{};return sharedStyle}async function load(){try{await init();let slug=$('slug').value.trim()||'test-page';let pageRes=await sb.from('sb_site_pages').select('*').eq('status','published').eq('slug',slug).maybeSingle();if(pageRes.error)throw pageRes.error;if(!pageRes.data){$('main').innerHTML='<h2>No page found</h2><p>No published row for '+esc(slug)+'.</p>';return}page=pageRes.data;let global=await loadShared();let style=pickStyle(page.settings_json,global);applyStyle(style);let layout=Array.isArray(page.layout_json)?page.layout_json:[];$('main').innerHTML='<h2>'+esc(page.title||page.slug)+'</h2><p>'+esc([page.slug,page.page_type,page.status].filter(Boolean).join(' - '))+'</p>'+layout.map(block).join('');$('debug').textContent=JSON.stringify({styleSource:global.version?'shared studio + page fallback':'page/default fallback',sharedStyle:global,pageSettings:page.settings_json,blocks:layout.length},null,2);$('status').className='note good';$('status').textContent='Loaded with shared Theme Studio style applied.'}catch(e){$('status').textContent='Load failed: '+(e.message||e);$('debug').textContent=JSON.stringify(e,null,2)}}$('load').onclick=()=>{location.href='web-builder-shared-style-preview-v7-9-0-test.html?page='+encodeURIComponent($('slug').value.trim()||'test-page')};let start=new URL(location.href).searchParams.get('page')||'test-page';$('slug').value=start;load();</script></body></html>
