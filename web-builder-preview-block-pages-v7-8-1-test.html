<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.8.1 Preview Block Pages TEST</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--bg:#050711;--panel:#101529;--panel2:#17122d;--line:#ffffff22;--muted:#b9c0d8;--title:#ffffff;--accent:#22d3a6;--btnText:#ffffff}body{margin:0;background:var(--bg);color:var(--title);font-family:system-ui,Arial;padding:22px}.wrap{max-width:1180px;margin:auto}.box,.block,.card{border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,var(--panel),var(--panel2));padding:20px;margin:0 0 16px}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px;font-size:12px}.btn{border:0;border-radius:999px;padding:11px 15px;background:linear-gradient(135deg,var(--accent),#7c3cff);color:var(--btnText);font-weight:900;text-decoration:none;display:inline-block;margin:4px}.warn{background:linear-gradient(135deg,#ffb142,#7c3cff)}h1{font-size:clamp(38px,7vw,72px);line-height:.95;margin:8px 0}p,small{color:var(--muted);line-height:1.5}input{border:1px solid #ffffff24;border-radius:999px;background:#0006;color:white;padding:12px 15px;font:inherit;min-width:260px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}.card{background:#0004}.media{height:130px;border-radius:14px;background:#ffffff12;display:grid;place-items:center;margin:10px 0;overflow:hidden}.media img{width:100%;height:100%;object-fit:cover}.link{word-break:break-all;background:#0006;color:#dfffee;border-radius:12px;padding:10px;margin-top:8px;font-size:12px}.note{background:#ffb1421f;border:1px solid #ffb14252;color:#ffe7ad;border-radius:16px;padding:12px;font-weight:800}.src{white-space:pre-wrap;background:#0006;border-radius:14px;padding:12px;color:#dfffee;max-height:220px;overflow:auto}</style></head><body><div class="wrap"><section class="box"><span class="pill">V7.8.1 Preview Block Pages TEST</span><h1>Published Preview</h1><p>Preview buttons now open real block pages. Form still opens the form runner.</p><input id="slug" value="test-page" placeholder="page slug"><button id="load" class="btn">Load Page</button><a class="btn warn" href="web-builder-colour-pickers-v7-7-6-test.html?page=test-page">Colour Pickers</a><p id="status" class="note">Ready.</p></section><main id="main" class="box"><h2>No page loaded</h2><p>Load a published builder page.</p></main><section class="box"><h2>Debug</h2><div id="debug" class="src">Waiting...</div></section></div><script src="stream-bandit-shell-v6-24.js"></script><script>let sb,page;const $=i=>document.getElementById(i);function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function sl(s){return String(s||'block').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'block'}async function init(){if(sb)return;let t=await fetch('stream-bandit-shell-v6-24.js',{cache:'no-store'}).then(r=>r.text());sb=supabase.createClient((t.match(/SUPABASE_URL\s*=\s*'([^']+)'/)||[])[1],(t.match(/SUPABASE_KEY\s*=\s*'([^']+)'/)||[])[1])}function applyStyle(st){st=st||{};document.documentElement.style.setProperty('--bg',st.bg||'#050711');document.documentElement.style.setProperty('--title',st.titleColor||'#ffffff');document.documentElement.style.setProperty('--muted',st.textColor||'#b9c0d8');document.documentElement.style.setProperty('--accent',st.accent||'#22d3a6');document.documentElement.style.setProperty('--btnText',st.buttonText||'#ffffff');document.body.style.fontFamily=st.font||'system-ui,Arial'}function isForm(b){return String(b.type||'').toLowerCase().includes('form')||String(b.title||'').toLowerCase().includes('form')}function actionFor(b){let cur=page.slug,bs=b.blockSlug||sl(b.title||b.type);if(isForm(b))return 'web-builder-form-save-v7-6-5-test.html?page='+encodeURIComponent(cur);return 'web-builder-block-page-runner-v7-8-0-test.html?page='+encodeURIComponent(cur)+'&block='+encodeURIComponent(bs)}function cards(a,fn){return '<div class="grid">'+(Array.isArray(a)?a:[]).map(x=>'<div class="card">'+fn(x)+'</div>').join('')+'</div>'}function media(b){if(b.imageUrl)return '<div class="media"><img src="'+esc(b.imageUrl)+'"></div>';return ['image_gallery','image_hero','blog','video'].includes(String(b.type||''))?'<div class="media">'+esc(b.icon||'Media')+'</div>':''}function inner(b){let a=b.items||[],t=String(b.type||'');if(t==='form')return cards(a,x=>'<b>'+esc(x.label)+'</b><p>'+esc(x.kind)+(x.required?' required':'')+'</p>'+(x.options?'<p>'+esc(x.options)+'</p>':''));if(t==='faq')return cards(a,x=>'<b>Q: '+esc(x.q)+'</b><p>A: '+esc(x.a)+'</p>');if(t==='pricing')return cards(a,x=>'<b>'+esc(x.name)+'</b><p>'+esc(x.price)+'</p><p>'+esc(x.features)+'</p>');if(t==='rating')return cards(a,x=>'<b>'+esc(x.name)+'</b><p>Rating '+esc(x.rating)+'</p><p>'+esc(x.review)+'</p>');if(t==='features')return cards(a,x=>'<b>'+esc(x.icon)+' '+esc(x.title)+'</b><p>'+esc(x.text)+'</p>');if(t==='page_feed'||t==='blog')return cards(a,x=>'<b>'+esc(x.title)+'</b><p>'+esc(x.body)+'</p>');if(t==='image_gallery')return cards(a,x=>(x.url?'<div class="media"><img src="'+esc(x.url)+'"></div>':'')+'<b>'+esc(x.title)+'</b><p>'+esc(x.caption)+'</p>');return ''}function block(b){let link=actionFor(b),type=isForm(b)?'form_page':'block_page';return '<section class="block"><span class="pill">'+esc(b.type||'block')+'</span><span class="pill">'+type+'</span><h2>'+esc(b.title||'Block')+'</h2>'+media(b)+'<p>'+esc(b.text||'')+'</p>'+inner(b)+'<a class="btn" href="'+esc(link)+'">'+esc(isForm(b)?'Open Form':'Open Page')+'</a><div class="link">'+esc(link)+'</div></section>'}async function load(){try{await init();let p=new URL(location.href).searchParams,s=$('slug').value.trim()||p.get('page')||'test-page';let r=await sb.from('sb_site_pages').select('*').eq('status','published').eq('slug',s).maybeSingle();if(r.error)throw r.error;if(!r.data){$('main').innerHTML='<h2>No page found</h2><p>No published row for '+esc(s)+'.</p>';$('status').textContent='No page found for '+s;return}page=r.data;applyStyle(page.settings_json);$('slug').value=page.slug;let layout=Array.isArray(page.layout_json)?page.layout_json:[];$('main').innerHTML='<h2>'+esc(page.title||page.slug)+'</h2><p>'+esc([page.slug,page.page_type,page.status].filter(Boolean).join(' - '))+'</p>'+layout.map(block).join('');$('debug').textContent=JSON.stringify({page:page.slug,settings:page.settings_json,blocks:layout.length,mode:'block page links'},null,2);$('status').textContent='Loaded '+page.slug+' with real block page links.'}catch(e){$('status').textContent='Load failed: '+(e.message||e);$('debug').textContent=JSON.stringify(e,null,2)}}$('load').onclick=()=>{location.href='web-builder-preview-block-pages-v7-8-1-test.html?page='+encodeURIComponent($('slug').value.trim()||'test-page')};let start=new URL(location.href).searchParams.get('page')||'test-page';$('slug').value=start;load();</script></body></html>
