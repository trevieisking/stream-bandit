<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.8.5 Full Builder Edit Lock Fix TEST</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--bg:#050711;--panel:#101529;--panel2:#17122d;--line:#ffffff22;--muted:#b9c0d8;--title:#fff;--accent:#22d3a6;--btnText:#fff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 8% 0,#22d3a633,transparent 34%),radial-gradient(circle at 92% 0,#7c3cff33,transparent 38%),var(--bg);color:var(--title);font-family:system-ui,Arial;padding:18px}.wrap{max-width:1440px;margin:auto}.box,.panel,.card{border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,var(--panel),var(--panel2));padding:18px;margin:0 0 14px;box-shadow:0 18px 60px #0007}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px;font-size:12px}.btn{border:0;border-radius:999px;padding:10px 14px;background:linear-gradient(135deg,var(--accent),#7c3cff);color:var(--btnText);font-weight:900;text-decoration:none;display:inline-block;margin:4px;cursor:pointer}.warn{background:linear-gradient(135deg,#ffb142,#7c3cff)}.hot{background:linear-gradient(135deg,#ff2d85,#7c3cff)}h1{font-size:clamp(36px,6vw,70px);line-height:.95;margin:8px 0}p,label{color:var(--muted);line-height:1.45}input,textarea,select{width:100%;border:1px solid #ffffff24;border-radius:14px;background:#0006;color:white;padding:10px;font:inherit;margin:4px 0}textarea{min-height:66px}.top{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end}.builder{display:grid;grid-template-columns:280px minmax(0,1fr) 350px;gap:14px}.library,.props{position:sticky;top:12px;align-self:start}.libBtn{display:block;width:100%;text-align:left;border:1px solid #ffffff1a;border-radius:16px;background:#ffffff10;color:#fff;padding:12px;margin:8px 0;cursor:pointer}.libBtn:hover{background:#ffffff18}.libBtn b{display:block;color:#baf7df}.libBtn span{font-size:13px;color:#b9c0d8}.canvas{min-height:680px}.block{border:1px solid #ffffff20;border-radius:20px;background:#ffffff0f;padding:14px;margin:10px 0;cursor:pointer}.block.active{outline:3px solid #22d3a688}.blockHead{display:flex;justify-content:space-between;gap:8px;align-items:center}.mini{background:#0006;border-radius:14px;padding:10px;margin-top:8px;color:#dfffee;word-break:break-word;font-size:12px}.items{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-top:8px}.item{background:#0005;border-radius:14px;padding:10px}.note{background:#ffb1421f;border:1px solid #ffb14252;color:#ffe7ad;border-radius:16px;padding:12px;font-weight:800}.src{white-space:pre-wrap;word-break:break-word;background:#0006;border-radius:14px;padding:12px;color:#dfffee;max-height:240px;overflow:auto}@media(max-width:980px){.builder,.top{grid-template-columns:1fr}.library,.props{position:static}}</style></head><body><div class="wrap"><section class="box"><span class="pill">V7.8.5 Full Builder Edit Lock Fix TEST</span><h1>🏗️ Web Builder</h1><p>Full builder layout with edit-lock fix. Type in the right panel without being kicked out.</p><div class="top"><label>Slug<input id="slug" value="test-page"></label><label>Title<input id="title" value="Full Builder Restore"></label><div><button id="load" class="btn">Load</button><button id="save" class="btn hot">Save + Publish</button><button id="refresh" class="btn">Refresh Canvas</button><a id="preview" class="btn warn" href="web-builder-preview-block-pages-v7-8-1-test.html?page=test-page">Open Preview</a></div></div><p id="status" class="note">Ready.</p></section><section class="builder"><aside class="panel library"><h2>Block Library</h2><div id="lib"></div><button id="starter" class="btn">Starter Pack</button><button id="clear" class="btn warn">Clear</button></aside><main class="panel canvas"><h2>Canvas <span id="count" class="pill">0 blocks</span></h2><div id="canvas"></div></main><aside class="panel props"><h2>Properties</h2><div id="props"><p>Select a block.</p></div></aside></section><section class="box"><h2>Debug</h2><div id="debug" class="src">Waiting...</div></section></div><script src="stream-bandit-shell-v6-24.js"></script><script>let sb,blocks=[],selected=0;const $=id=>document.getElementById(id);const blockTypes=[['image_hero','🖼️ Image Hero','Image-led hero section'],['image_gallery','🖼️ Image Gallery','Gallery with image items'],['page_feed','📄 Page Feed','Feed cards'],['blog','🔥 Blog / News','Blog/news cards'],['rating','⭐ Rating / Review','Review rows'],['form','🧾 Form / Contact','Form questions'],['faq','❓ FAQ','Question and answer rows'],['features','💎 Feature Cards','Feature cards'],['pricing','💳 Pricing Cards','Pricing plans'],['video','🎥 Video / Mux','Video block'],['hero','🎬 Classic Hero','Simple hero block'],['footer','🐾 Footer','Footer content']];function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function slugify(v){return String(v||'block').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'block'}async function init(){if(sb)return;let t=await fetch('stream-bandit-shell-v6-24.js',{cache:'no-store'}).then(r=>r.text());sb=supabase.createClient((t.match(/SUPABASE_URL\s*=\s*'([^']+)'/)||[])[1],(t.match(/SUPABASE_KEY\s*=\s*'([^']+)'/)||[])[1])}function seed(type){if(type==='form')return[{label:'Your name',kind:'short',required:true,options:''},{label:'Choose option',kind:'multiple choice',required:true,options:'Trev\nKay\nTom\nDan'}];if(type==='faq')return[{q:'What is this page?',a:'A Stream Bandit builder page.'}];if(type==='pricing')return[{name:'Creator',price:'£9',features:'Pages\nForms\nMedia',button:'Choose'}];if(type==='rating')return[{name:'Visitor',rating:'5',review:'Works nicely.'}];if(type==='features')return[{icon:'✅',title:'Feature title',text:'Feature description now shows.'}];if(type==='image_gallery')return[{url:'',title:'Gallery image',caption:'Caption shows here.'}];if(type==='page_feed'||type==='blog')return[{title:'First item',body:'Full body/excerpt shows here.',link:'#'}];return[]}function makeBlock(type){let row=blockTypes.find(x=>x[0]===type)||[type,type,''];let title=row[1].replace(/^.+? /,'');return{id:'b_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),type,title,text:'Builder block content.',imageUrl:'',buttonText:type==='form'?'Open Form':'Open Page',buttonLink:'#',items:seed(type),visible:true}}function withActions(b){let page=$('slug').value.trim()||'test-page',bs=slugify(b.title||b.type),isForm=b.type==='form';let actionType=isForm?'form_submit':'block_page';let actionUrl=isForm?'web-builder-form-save-v7-6-5-test.html?page='+encodeURIComponent(page):'web-builder-block-page-artwork-v7-8-2-test.html?page='+encodeURIComponent(page)+'&block='+encodeURIComponent(bs);return {...b,blockSlug:bs,actionType,actionUrl,buttonLink:actionUrl}}function itemHtml(b){let a=b.items||[],t=b.type;if(t==='form')return a.map(x=>'<div class="item"><b>'+esc(x.label)+'</b><p>'+esc(x.kind)+(x.required?' · required':'')+'</p></div>').join('');if(t==='faq')return a.map(x=>'<div class="item"><b>Q: '+esc(x.q)+'</b><p>A: '+esc(x.a)+'</p></div>').join('');if(t==='pricing')return a.map(x=>'<div class="item"><b>'+esc(x.name)+'</b><p>'+esc(x.price)+'</p><p>'+esc(x.features)+'</p></div>').join('');if(t==='rating')return a.map(x=>'<div class="item"><b>'+esc(x.name)+'</b><p>⭐ '+esc(x.rating)+'</p><p>'+esc(x.review)+'</p></div>').join('');if(t==='features')return a.map(x=>'<div class="item"><b>'+esc(x.icon)+' '+esc(x.title)+'</b><p>'+esc(x.text)+'</p></div>').join('');if(t==='image_gallery'||t==='page_feed'||t==='blog')return a.map(x=>'<div class="item"><b>'+esc(x.title||'Item')+'</b><p>'+esc(x.caption||x.body||'')+'</p></div>').join('');return ''}function drawLibrary(){let html='';for(const t of blockTypes){html+='<button class="libBtn" data-add="'+t[0]+'"><b>'+t[1]+'</b><span>'+t[2]+'</span></button>'}$('lib').innerHTML=html;document.querySelectorAll('[data-add]').forEach(btn=>{btn.onclick=()=>{blocks.push(makeBlock(btn.dataset.add));selected=blocks.length-1;renderAll()}})}function renderCanvas(){$('preview').href='web-builder-preview-block-pages-v7-8-1-test.html?page='+encodeURIComponent($('slug').value.trim()||'test-page');$('count').textContent=blocks.length+' blocks';if(!blocks.length){$('canvas').innerHTML='<p>No blocks yet. Add blocks from the left.</p>'}else{$('canvas').innerHTML=blocks.map((b,i)=>{let a=withActions(b);return '<section class="block '+(i===selected?'active':'')+'" data-select="'+i+'"><div class="blockHead"><div><span class="pill">'+esc(b.type)+'</span><h3>'+esc(b.title)+'</h3></div><div><button class="btn" data-up="'+i+'">↑</button><button class="btn" data-down="'+i+'">↓</button></div></div><p>'+esc(b.text||'')+'</p><div class="items">'+itemHtml(b)+'</div><div class="mini">'+esc(a.actionType+' · '+a.actionUrl)+'</div></section>'}).join('')}document.querySelectorAll('[data-select]').forEach(el=>{el.onclick=e=>{if(e.target.tagName==='BUTTON')return;selected=Number(el.dataset.select);renderAll()}});document.querySelectorAll('[data-up]').forEach(btn=>{btn.onclick=()=>{let i=Number(btn.dataset.up);if(i>0){[blocks[i-1],blocks[i]]=[blocks[i],blocks[i-1]];selected=i-1;renderAll()}}});document.querySelectorAll('[data-down]').forEach(btn=>{btn.onclick=()=>{let i=Number(btn.dataset.down);if(i<blocks.length-1){[blocks[i+1],blocks[i]]=[blocks[i],blocks[i+1]];selected=i+1;renderAll()}}});$('debug').textContent=JSON.stringify(blocks.map(withActions),null,2)}function renderAll(){drawLibrary();renderCanvas();renderProps()}function markDirty(){let b=blocks[selected];if(b){$('status').textContent='Editing saved in memory. Click Refresh Canvas to update the middle preview, then Save + Publish.';$('debug').textContent=JSON.stringify(blocks.map(withActions),null,2)}}function renderProps(){let b=blocks[selected];if(!b){$('props').innerHTML='<p>Select a block.</p>';return}let html='<label>Title<input id="pTitle" value="'+esc(b.title)+'"></label><label>Description<textarea id="pText">'+esc(b.text||'')+'</textarea></label><label>Image URL<input id="pImg" value="'+esc(b.imageUrl||'')+'"></label><label>Button text<input id="pBtn" value="'+esc(b.buttonText||'Open Page')+'"></label><div class="mini" id="actionMini">'+esc(withActions(b).actionUrl)+'</div><button id="applyProps" class="btn">Refresh Canvas</button><button id="dup" class="btn">Duplicate</button><button id="del" class="btn hot">Delete Block</button>';if(['form','faq','pricing','rating','features','image_gallery','page_feed','blog'].includes(b.type)){html+='<h3>Items</h3><button class="btn" id="addItem">Add Item</button>';(b.items||[]).forEach((it,idx)=>{html+='<div class="card"><span class="pill">Item '+(idx+1)+'</span>';Object.keys(it).forEach(k=>{html+='<label>'+esc(k)+'<textarea data-item="'+idx+'" data-key="'+esc(k)+'">'+esc(it[k])+'</textarea></label>'});html+='<button class="btn warn" data-remove="'+idx+'">Remove</button></div>'})}$('props').innerHTML=html;$('pTitle').oninput=e=>{b.title=e.target.value;let mini=$('actionMini');if(mini)mini.textContent=withActions(b).actionUrl;markDirty()};$('pText').oninput=e=>{b.text=e.target.value;markDirty()};$('pImg').oninput=e=>{b.imageUrl=e.target.value;markDirty()};$('pBtn').oninput=e=>{b.buttonText=e.target.value;markDirty()};$('applyProps').onclick=()=>renderCanvas();$('dup').onclick=()=>{blocks.splice(selected+1,0,JSON.parse(JSON.stringify({...b,id:'b_'+Date.now().toString(36)})));selected++;renderAll()};$('del').onclick=()=>{blocks.splice(selected,1);selected=Math.max(0,selected-1);renderAll()};if($('addItem'))$('addItem').onclick=()=>{b.items=b.items||[];b.items.push(seed(b.type)[0]||{title:'Item',body:'Text'});renderAll()};document.querySelectorAll('[data-item]').forEach(el=>{el.oninput=()=>{let idx=Number(el.dataset.item);let key=el.dataset.key;b.items[idx][key]=el.value;markDirty()}});document.querySelectorAll('[data-remove]').forEach(btn=>{btn.onclick=()=>{b.items.splice(Number(btn.dataset.remove),1);renderAll()}})}async function loadPage(){try{await init();let s=$('slug').value.trim()||'test-page';let r=await sb.from('sb_site_pages').select('*').eq('slug',s).maybeSingle();if(r.error)throw r.error;if(r.data){$('title').value=r.data.title||s;blocks=Array.isArray(r.data.layout_json)?r.data.layout_json:[]}selected=0;renderAll();$('status').textContent=r.data?'Loaded '+s:'No page found. Save to create it.'}catch(e){$('status').textContent='Load failed: '+(e.message||e);drawLibrary()}}async function savePage(){try{await init();let s=slugify($('slug').value||'test-page');$('slug').value=s;let fixed=blocks.map(withActions);let old=await sb.from('sb_site_pages').select('settings_json').eq('slug',s).maybeSingle();let settings=(old.data&&old.data.settings_json)||{};let payload={slug:s,title:$('title').value||s,page_type:'custom',status:'published',layout_json:fixed,settings_json:{...settings,version:'V7.8.5',builder:'full-edit-lock-fix'},updated_at:new Date().toISOString()};let r=await sb.from('sb_site_pages').upsert(payload,{onConflict:'slug'}).select('*').single();if(r.error)throw r.error;blocks=Array.isArray(r.data.layout_json)?r.data.layout_json:fixed;renderAll();$('status').textContent='Saved and published full builder page.'}catch(e){$('status').textContent='Save failed: '+(e.message||e)}}$('load').onclick=loadPage;$('save').onclick=savePage;$('refresh').onclick=()=>renderCanvas();$('starter').onclick=()=>{blocks=['image_hero','faq','pricing','rating','features','form','footer'].map(makeBlock);selected=0;renderAll()};$('clear').onclick=()=>{blocks=[];selected=0;renderAll()};$('slug').oninput=()=>renderCanvas();drawLibrary();let start=new URL(location.href).searchParams.get('page')||'test-page';$('slug').value=start;loadPage();</script></body></html>
