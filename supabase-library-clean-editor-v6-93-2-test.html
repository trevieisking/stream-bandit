<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Bandit V6.93.2 Supabase Library Global Editor TEST</title>
<style>
:root{
  color-scheme:dark;
  --bg:#050711;
  --p:#101529;
  --p2:#17122d;
  --line:#ffffff22;
  --muted:#b9c0d8;
  --accent:#22d3a6;
  --accent2:#7c3cff;
  --pink:#ff2d85;
  --btnText:#fff;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  background:
    radial-gradient(circle at top left,color-mix(in srgb,var(--accent),transparent 72%),transparent 34%),
    radial-gradient(circle at top right,color-mix(in srgb,var(--accent2),transparent 66%),transparent 38%),
    var(--bg);
  color:#fff;
  font-family:Inter,system-ui,Arial,sans-serif;
  padding:24px;
}
.box{
  max-width:860px;
  border:1px solid var(--line);
  border-radius:28px;
  background:linear-gradient(135deg,var(--p),var(--p2));
  box-shadow:0 20px 70px #0007;
  padding:24px;
}
.badge{
  display:inline-flex;
  border-radius:999px;
  background:#22d3a624;
  border:1px solid #22d3a657;
  color:#baf7df;
  font-weight:950;
  padding:7px 12px;
}
.muted{color:var(--muted);line-height:1.55}
.err{
  background:#ff4d6d1f;
  border:1px solid #ff4d6d55;
  color:#ffd8df;
  border-radius:16px;
  padding:12px;
  white-space:pre-wrap;
}
.src{
  background:#0005;
  border-radius:14px;
  padding:12px;
  color:#dfffee;
  white-space:pre-wrap;
  font-family:ui-monospace,Consolas,monospace;
}
</style>
</head>
<body>
<div class="box">
  <span class="badge">V6.93.2 Supabase Library Global Editor TEST</span>
  <h1>Loading Supabase Library Editor...</h1>
  <p class="muted">
    This test safely loads the working V6.93.0 editor, then upgrades global helpers,
    Details route, Player 1 route, Player 2 route and queue key carry.
  </p>
  <div id="status" class="src">Starting...</div>
</div>

<script>
(async function(){
  const status=document.getElementById('status');

  function log(t){
    status.textContent=t;
  }

  function fail(e){
    status.className='err';
    status.textContent='Supabase Library V6.93.2 loader failed:\n'+(e&&e.stack||e&&e.message||e);
  }

  try{
    log('Fetching V6.93.0 clean editor...');

    let html=await fetch('supabase-library-clean-editor-v6-93-0-test.html',{cache:'no-store'})
      .then(function(r){
        if(!r.ok)throw new Error('Fetch failed '+r.status);
        return r.text();
      });

    log('Applying V6.93.2 global helper and route upgrades...');

    html=html.replace(
      /Stream Bandit V6\.93\.0 Supabase Library Clean Editor TEST/g,
      'Stream Bandit V6.93.2 Supabase Library Global Editor TEST'
    );

    html=html.replace(
      /V6\.93\.0 Supabase Library Clean Editor TEST/g,
      'V6.93.2 Supabase Library Global Editor TEST'
    );

    html=html.replace(
      /V6\.93\.0 Supabase Library Clean Editor TEST — no live\/index promotion\./g,
      'V6.93.2 Supabase Library Global Editor TEST — no live/index promotion.'
    );

    html=html.replace(
      'Clean full page. No wrapper patches. Old Admin Quick Add pattern + current overlay editor.',
      'Global helper editor pass. Working V6.93.0 editor logic preserved, current global shell/theme/account/player routes applied.'
    );

    html=html.replace(
      'Routes protected</b><p>Details V6.77.7, Player 1 V6.34, Player 2 V6.78.9.3.</p>',
      'Routes upgraded</b><p>Details V7.3.1, Player 1 V7.3.3, Player 2 V6.78.9.4 Global Carry.</p>'
    );

    html=html.replace(
      "const PLAYER1='player-watch-shell-v6-34-test.html',PLAYER2='player-2-progress-helper-v6-78-9-3-test.html',DETAILS='details-artwork-16x9-v6-77-7-test.html',BUCKET='stream-bandit-images';",
      "const PLAYER1='player-one-global-helpers-v7-3-3-test.html',PLAYER2='player-2-progress-helper-v6-78-9-4-test.html',DETAILS='details-global-helpers-v7-3-1-test.html',BUCKET='stream-bandit-images';"
    );

    html=html.replace(
      "const payload={type:'library',version:'V6.93.0'",
      "const payload={type:'library',version:'V6.93.2'"
    );

    html=html.replace(
      "sessionStorage.setItem('streamBanditUpNextV1',JSON.stringify(payload));localStorage.setItem('streamBanditQueueV1',JSON.stringify(payload));localStorage.setItem('streamBanditUpNextV1',JSON.stringify(payload))}catch(e){}location.href=PLAYER2",
      "sessionStorage.setItem('streamBanditUpNextV1',JSON.stringify(payload));sessionStorage.setItem('streamBanditPlayer2Queue',JSON.stringify(payload));localStorage.setItem('streamBanditQueueV1',JSON.stringify(payload));localStorage.setItem('streamBanditUpNextV1',JSON.stringify(payload));localStorage.setItem('streamBanditPlayer2Queue',JSON.stringify(payload))}catch(e){}location.href=PLAYER2"
    );

    const oldScripts =
      '<script src="stream-bandit-shell-v6-24.js"><\\/script><script src="stream-bandit-menu-saves-count-v6-72-1.js"><\\/script><script src="stream-bandit-auth-profile-v6-31.js"><\\/script>';

    const newScripts =
      '<script src="stream-bandit-shell-v6-24.js"><\\/script><script src="stream-bandit-menu-saves-count-v6-72-1.js"><\\/script><script src="stream-bandit-auth-profile-v6-31.js"><\\/script><script src="stream-bandit-auth-sync-v6-31-7.js"><\\/script><script src="stream-bandit-auth-avatar-v7-0-2.js"><\\/script><script src="stream-bandit-shared-style-v7-0-2.js"><\\/script><script src="stream-bandit-settings-global-v7-1-8.js"><\\/script>';

    html=html.replace(oldScripts,newScripts);

    html=html.replace(
      '</body>',
      '<script>setTimeout(function(){try{if(window.StreamBanditShellAuth&&window.StreamBanditShellAuth.refresh)window.StreamBanditShellAuth.refresh();}catch(e){}},1200);<\\/script></body>'
    );

    log('Opening upgraded editor...');

    document.open();
    document.write(html);
    document.close();

  }catch(e){
    fail(e);
  }
})();
</script>
</body>
</html>
