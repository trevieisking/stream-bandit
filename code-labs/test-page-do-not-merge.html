<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Labs Safe Test Page</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#070b15;color:#f5f8ff;font-family:system-ui,Arial,sans-serif}
main{width:min(760px,calc(100% - 32px));border:1px solid #263348;border-radius:28px;background:#101827;padding:28px;box-shadow:0 22px 80px rgba(0,0,0,.42)}
h1{font-size:clamp(34px,7vw,64px);line-height:.95;margin:0 0 12px;letter-spacing:-.05em}
p{color:#aeb9ce;font-size:17px;line-height:1.5}.pill{display:inline-flex;border:1px solid #27d69c66;border-radius:999px;background:#27d69c22;color:#baf7df;font-weight:900;padding:8px 12px;margin-bottom:16px}
</style>
</head>
<body>
<main>
<span class="pill">Code Labs safe test file</span>
<h1>Code Labs test page</h1>
<p>This is a harmless create-file drill. It proves Code Labs can create a test page on a branch before any real page is touched.</p>
<p>Do not merge this into live unless the drill needs to stay for the next delete test.</p>
</main>
</body>
</html>
