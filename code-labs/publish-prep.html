(function(){'use strict';
var VERSION='V216-protected-writer-route';
function q(s,r){return(r||document).querySelector(s)}
function disable(id,label){var el=q(id);if(!el)return;el.disabled=true;el.setAttribute('aria-disabled','true');el.setAttribute('title','Legacy direct-connector execution is disabled. Use the protected Code Labs Writer after Code God PASS.');if(label)el.textContent=label}
function align(){
  if((document.body&&document.body.getAttribute('data-page'))!=='publish-prep')return true;
  var root=q('#githubWriter');
  if(!root)return false;
  var old=q('#gwCodeGodCheck');if(old)old.remove();

}

})();
