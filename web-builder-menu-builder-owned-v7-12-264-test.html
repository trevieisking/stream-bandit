<script>
(function(){
'use strict';

const VERSION='V7.12.263.13 Web Builder Menu Builder Owner Workspace Lock';
const URL='https://xzxqfrvqdgkzwujbkdbk.supabase.co';
const KEY='sb_publishable_1wHhSq2xo0XBwsKXO_64HQ_xyVY9xRN';
const ICONS=['🏠','📄','🎬','🦌','⭐','❤️','📺','📝','📞','🛒','⚙️','🔒','❓'];
const OWNER_SLUGS=['landing','home','home-page'];

const RANK={
  free_viewer:0,
  viewer_plus:1,
  creator_starter:2,
  creator_growth:3,
  creator_pro:4,
  studio_business:5,
  platform_owner:6,
  enterprise:7
};

let sb=null;
let user=null;
let profile=null;
let pages=[];
let selectedId='';
let highlightedId='';
let readCount=0;
let writeCount=0;
let jumpSearches=0;
let jumpLast='';
let lastError='';
let lastAction='boot';

let authState={
  version:VERSION,
  route:'web-builder-menu-builder-owned-v7-12-264-test.html',
  checked:false,
  allowed:false,
  signedIn:false,
  email:'',
  userId:'',
  role:'',
  adminLevel:'',
  planKey:'',
  accountStatus:'',
  isPlatformOwner:false,
  canUseBuilder:false,
  workspace:'',
  lockClass:'menu-builder-owner-workspace-lock',
  reason:'Checking...',
  supabaseReads:false,
  supabaseWrites:false,
  storageWrites:false,
  storageActions:false,
  schemaChanges:false,
  builderTableChanges:false,
  streamBanditShellChanges:false,
  activeMenuPromotion:false,
  indexPromotion:false,
  registryPromotion:true,
  sortOrderColumnRequired:false,
  menuStoredInSettingsJson:true
};

const $=function(id){return document.getElementById(id);};

function app(){
  return $('app');
}

function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g,function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]||m;
  });
}

function obj(v){
  if(v&&typeof v==='object')return v;

  if(typeof v==='string'&&v.trim()){
    try{return JSON.parse(v)||{};}catch(e){}
  }

  return {};
}

function truth(v){
  if(v===true||v===1)return true;

  if(typeof v==='string'){
    return ['true','1','yes','on','enabled','allow','allowed'].indexOf(v.toLowerCase())>-1;
  }

  return false;
}

function rank(k){
  return RANK[String(k||'free_viewer')]||0;
}

function client(){
  if(sb)return sb;
  if(!window.supabase||!window.supabase.createClient)throw new Error('Supabase SDK not loaded');
  sb=window.supabase.createClient(URL,KEY);
  return sb;
}

function timeout(ms,label){
  return new Promise(function(resolve,reject){
    setTimeout(function(){reject(new Error(label||'Timed out'));},ms);
  });
}

async function withTimeout(promise,ms,label){
  return Promise.race([promise,timeout(ms,label)]);
}

function isPlatformOwnerProfile(p){
  return !!p&&(p.admin_level==='owner'||p.admin_level==='platform_owner'||p.plan_key==='platform_owner');
}

function statusAllowed(p){
  let s=String(p&&p.account_status||'active').toLowerCase();
  return isPlatformOwnerProfile(p)||s==='active';
}

function builderAllowed(p){
  if(!p)return false;
  if(isPlatformOwnerProfile(p))return true;
  if(!statusAllowed(p))return false;

  let ps=obj(p.permissions_json);

  return rank(p.plan_key)>=rank('creator_growth')||
    truth(ps.web_builder)||
    truth(ps.web_builder_starter)||
    truth(ps.pages_manager)||
    truth(ps.web_builder_studio);
}

function slugify(v){
  return String(v||'')
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9_-]+/g,'-')
    .replace(/^-+|-+$/g,'')||'untitled-page';
}

function settings(row){
  return obj(row&&row.settings_json);
}

function ownerMatches(row){
  return String(row&&row.owner_id||'')===String(authState.userId||'');
}

function isReserved(slug){
  return OWNER_SLUGS.indexOf(slugify(slug))>-1;
}

function menuLabel(row){
  let s=settings(row);
  return s.menu_label||s.menuLabel||row.title||row.slug||'Untitled page';
}

function menuIcon(row){
  let s=settings(row);
  return s.menu_icon||s.menuIcon||'📄';
}

function menuPosition(row){
  let s=settings(row);
  return s.menu_position||s.menuPosition||'top';
}

function menuIndent(row){
  let s=settings(row);
  let n=Number(s.menu_indent!=null?s.menu_indent:s.menuIndent!=null?s.menuIndent:0);
  return Math.max(0,Math.min(3,Number.isFinite(n)?n:0));
}

function menuOrder(row){
  let s=settings(row);
  let n=Number(s.menu_order!=null?s.menu_order:s.menuOrder!=null?s.menuOrder:s.sort_order!=null?s.sort_order:999);
  return Number.isFinite(n)?n:999;
}

function showInMenu(row){
  let s=settings(row);

  if(s.show_in_menu!=null)return truth(s.show_in_menu);
  if(s.showInMenu!=null)return truth(s.showInMenu);

  return String(row.status||'draft').toLowerCase()==='published';
}

function normalizeRow(row){
  row=row||{};

  let s=settings(row);
  let slug=slugify(row.slug||s.slug||'untitled-page');

  return {
    id:row.id,
    slug:slug,
    title:row.title||s.title||slug,
    status:row.status||s.status||'draft',
    owner_id:row.owner_id||'',
    settings_json:Object.assign({},s,{
      slug:slug,
      title:row.title||s.title||slug,
      status:row.status||s.status||'draft',
      menu_label:s.menu_label||s.menuLabel||row.title||slug,
      menu_icon:s.menu_icon||s.menuIcon||'📄',
      menu_position:s.menu_position||s.menuPosition||'top',
      menu_order:Number(s.menu_order!=null?s.menu_order:s.menuOrder!=null?s.menuOrder:s.sort_order!=null?s.sort_order:999),
      menu_indent:menuIndent(row),
      show_in_menu:s.show_in_menu!=null?s.show_in_menu:s.showInMenu!=null?s.showInMenu:String(row.status||'draft').toLowerCase()==='published'
    }),
    updated_at:row.updated_at||''
  };
}

function selected(){
  return pages.find(function(p){return p.id===selectedId;})||pages[0]||null;
}

function sortedPages(){
  return pages.slice().sort(function(a,b){
    let pa=menuPosition(a);
    let pb=menuPosition(b);

    if(pa!==pb)return pa.localeCompare(pb);

    let oa=menuOrder(a);
    let ob=menuOrder(b);

    if(oa!==ob)return oa-ob;

    return menuLabel(a).localeCompare(menuLabel(b));
  });
}

function menuItems(pos){
  return sortedPages().filter(function(p){
    return showInMenu(p)&&menuPosition(p)===pos;
  });
}

function setStatus(msg,kind){
  let el=$('status');

  if(!el)return;

  el.textContent=msg;
  el.className='status '+(kind||'');
}

async function readAuthority(){
  let c=client();
  let foundUser=null;

  let gu=await withTimeout(c.auth.getUser(),8000,'Supabase auth check timed out');
  if(gu&&gu.data&&gu.data.user)foundUser=gu.data.user;

  if(!foundUser){
    let gs=await withTimeout(c.auth.getSession(),8000,'Supabase session check timed out');
    if(gs&&gs.data&&gs.data.session&&gs.data.session.user)foundUser=gs.data.session.user;
  }

  if(!foundUser){
    return {signedIn:false,user:null,profile:null};
  }

  let pr=await withTimeout(
    c.from('sb_profiles')
      .select('id,username,display_name,role,admin_level,plan_key,permissions_json,account_status')
      .eq('id',foundUser.id)
      .maybeSingle(),
    10000,
    'Profile read timed out'
  );

  readCount++;
  authState.supabaseReads=true;

  if(pr.error)throw pr.error;

  return {
    signedIn:true,
    user:foundUser,
    profile:pr.data||null
  };
}

async function loadPages(){
  try{
    if(!authState.allowed)throw new Error('Menu Builder locked.');

    setStatus('Loading pages for menu builder...','');

    let q=client()
      .from('sb_site_pages')
      .select('id,slug,title,status,owner_id,settings_json,updated_at')
      .order('slug',{ascending:true})
      .limit(200);

    if(!authState.isPlatformOwner){
      q=q.eq('owner_id',authState.userId);
    }

    let r=await withTimeout(q,12000,'Menu page read timed out');

    readCount++;
    authState.supabaseReads=true;

    if(r.error)throw r.error;

    let rows=(r.data||[]).map(normalizeRow);

    if(!authState.isPlatformOwner){
      rows=rows.filter(ownerMatches);
    }

    pages=rows;

    if(!selectedId&&pages.length)selectedId=pages[0].id;

    if(selectedId&&!pages.some(function(p){return p.id===selectedId;})){
      selectedId=pages[0]?pages[0].id:'';
    }

    lastAction='load pages passed';
    lastError='';

    setStatus('Loaded '+pages.length+' pages for this menu workspace.','good');
    render();
  }catch(e){
    lastError=e&&e.message?e.message:String(e);
    lastAction='load pages failed';
    setStatus('Load failed: '+lastError,'bad');
    render();
  }
}

function selectPublished(){
  pages.forEach(function(p,i){
    let s=settings(p);
    p.settings_json=Object.assign({},s,{
      show_in_menu:String(p.status||'draft').toLowerCase()==='published',
      menu_order:menuOrder(p)===999?i+1:menuOrder(p)
    });
  });

  lastAction='selected published pages locally';
  lastError='';

  setStatus('Published pages selected locally. Click Save Menu To Supabase when ready.','good');
  render();
}

function clearMenu(){
  pages.forEach(function(p){
    p.settings_json=Object.assign({},settings(p),{
      show_in_menu:false
    });
  });

  lastAction='cleared menu selection locally';
  lastError='';

  setStatus('Menu selection cleared locally. Click Save Menu To Supabase to persist.','good');
  render();
}

function applyEditor(){
  let row=selected();

  if(!row)return;

  let label=$('editLabel').value.trim()||row.title||row.slug;
  let icon=$('editIcon').value||'📄';
  let position=$('editPosition').value||'top';
  let order=Number($('editOrder').value||menuOrder(row)||999);
  let indent=Number($('editIndent').value||0);

  row.settings_json=Object.assign({},settings(row),{
    menu_label:label,
    menu_icon:icon,
    menu_position:position,
    menu_order:Number.isFinite(order)?order:999,
    menu_indent:Math.max(0,Math.min(3,Number.isFinite(indent)?indent:0)),
    show_in_menu:$('editShow').checked
  });

  lastAction='local menu item edited';
  lastError='';

  setStatus('Menu item updated locally. Click Save Menu To Supabase to persist.','good');
  render();
}

function moveSelected(delta){
  let row=selected();

  if(!row)return;

  let next=Math.max(1,menuOrder(row)+delta);

  row.settings_json=Object.assign({},settings(row),{
    menu_order:next
  });

  lastAction='local menu item moved';
  render();
}

function indentSelected(delta){
  let row=selected();

  if(!row)return;

  let next=Math.max(0,Math.min(3,menuIndent(row)+delta));

  row.settings_json=Object.assign({},settings(row),{
    menu_indent:next
  });

  lastAction='local menu item indent changed';
  render();
}

async function saveMenu(){
  try{
    if(!authState.allowed)throw new Error('Menu Builder locked.');

    let rows=pages.slice();

    if(!authState.isPlatformOwner){
      rows=rows.filter(ownerMatches);
    }

    if(!rows.length)throw new Error('No rows to save.');

    setStatus('Saving menu settings to settings_json...','');

    let saved=0;

    for(let i=0;i<rows.length;i++){
      let row=rows[i];

      if(!authState.isPlatformOwner&&!ownerMatches(row)){
        continue;
      }

      let s=Object.assign({},settings(row),{
        menu_label:menuLabel(row),
        menu_icon:menuIcon(row),
        menu_position:menuPosition(row),
        menu_order:menuOrder(row),
        menu_indent:menuIndent(row),
        show_in_menu:showInMenu(row),
        updated_by:'web-builder-menu-builder-owned-v7-12-264-test.html',
        updated_at:new Date().toISOString()
      });

      let q=client()
        .from('sb_site_pages')
        .update({settings_json:s})
        .eq('id',row.id);

      if(!authState.isPlatformOwner){
        q=q.eq('owner_id',authState.userId);
      }

      let r=await withTimeout(q,12000,'Menu save timed out');

      if(r.error)throw r.error;

      saved++;
    }

    writeCount++;
    authState.supabaseWrites=true;
    lastAction='save menu passed';
    lastError='';

    setStatus('Saved menu settings for '+saved+' page rows.','good');
    render();
  }catch(e){
    lastError=e&&e.message?e.message:String(e);
    lastAction='save menu failed';
    setStatus('Save failed: '+lastError,'bad');
    render();
  }
}

function jumpSearch(){
  let q=String($('menuJumpSearch').value||'').trim().toLowerCase();

  if(!q){
    $('menuJumpStatus').textContent='Type a page title or slug first.';
    return;
  }

  jumpSearches++;

  let needle=q.replace(/\s+/g,'-');

  let found=sortedPages().find(function(p){
    return slugify(p.slug).indexOf(needle)>-1||
      String(p.title||'').toLowerCase().indexOf(q)>-1||
      menuLabel(p).toLowerCase().indexOf(q)>-1;
  });

  if(!found){
    jumpLast='not found: '+q;
    $('menuJumpStatus').textContent='No menu tab found.';
    render();
    return;
  }

  selectedId=found.id;
  highlightedId=found.id;
  jumpLast=found.slug;

  render();

  setTimeout(function(){
    let el=document.querySelector('[data-page-id="'+found.id.replace(/"/g,'')+'"]');
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  },50);

  $('menuJumpStatus').textContent='Found '+found.title+' / '+found.slug;
}

async function copyReport(){
  let text=JSON.stringify(state(),null,2);

  try{
    await navigator.clipboard.writeText(text);
    setStatus('Copied menu builder report.','good');
  }catch(e){
    alert(text);
  }
}

function renderTabs(){
  let list=sortedPages();
  let box=$('pageList');

  if(!list.length){
    box.innerHTML='<div class="notice">No pages found for this workspace.</div>';
    return;
  }

  box.innerHTML=list.map(function(p){
    let active=p.id===selectedId?'active':'';
    let jump=p.id===highlightedId?'jumpFound':'';
    let show=showInMenu(p);
    let reserved=isReserved(p.slug);

    return '<article class="menuTab '+active+' '+jump+'" data-page-id="'+esc(p.id)+'" onclick="window.__sbMenuSelect(\''+esc(p.id)+'\')">\
<div class="handle">'+esc(menuIcon(p))+'</div>\
<div class="tabText"><b>'+esc(menuLabel(p))+'</b><code>'+esc(p.slug)+'</code></div>\
<div class="tabMeta">\
<span class="pill '+(show?'good':'warn')+'">'+(show?'shown':'hidden')+'</span>\
<span class="pill">'+esc(menuPosition(p))+'</span>\
<span class="pill">order '+esc(menuOrder(p))+'</span>\
<span class="pill">indent '+esc(menuIndent(p))+'</span>\
'+(ownerMatches(p)?'<span class="pill good">own</span>':'<span class="pill cyan">owner '+esc(String(p.owner_id||'').slice(0,8))+'</span>')+'\
'+(reserved?'<span class="pill warn">reserved</span>':'')+'\
</div>\
</article>';
  }).join('');
}

function renderPreview(){
  let current=selected()||pages[0]||null;
  let currentSlug=current?current.slug:'';

  function nav(pos){
    let items=menuItems(pos);

    if(!items.length)return '';

    return items.map(function(p){
      return '<a class="'+(p.slug===currentSlug?'current':'')+' indent'+menuIndent(p)+'" href="web-builder-preview-owned-v7-12-257-test.html?page='+encodeURIComponent(p.slug)+'">'+esc(menuIcon(p)+' '+menuLabel(p))+'</a>';
    }).join('');
  }

  let top=nav('top');
  let left=nav('left');
  let right=nav('right');
  let layout=left&&right?'':left?'noRight':right?'noLeft':'full';

  $('preview').innerHTML='<div class="siteTop"><div class="siteBrand">Builder Site Menu</div><nav class="siteNav">'+top+'</nav></div>\
<div class="siteBody '+layout+'">\
'+(left?'<nav class="sideNav">'+left+'</nav>':'')+'\
<section class="pageMock"><span class="badge">Preview</span><h2>'+esc(current?current.title:'No page selected')+'</h2><p>'+esc(current?current.slug:'Load pages to preview menu placement.')+'</p></section>\
'+(right?'<nav class="sideNav right">'+right+'</nav>':'')+'\
</div>';
}

function renderEditor(){
  let row=selected();

  if(!row){
    $('editor').innerHTML='<div class="notice">No selected page.</div>';
    return;
  }

  $('editor').innerHTML='<div class="field"><b>Selected page</b><p>'+esc(row.title)+'<br><code>'+esc(row.slug)+'</code></p></div>\
<label class="checkLine"><input id="editShow" type="checkbox"> Show this page in the published menu</label>\
<div class="field"><b>Label</b><input id="editLabel" autocomplete="off" value="'+esc(menuLabel(row))+'"></div>\
<div class="field"><b>Icon</b><select id="editIcon">'+ICONS.map(function(icon){return '<option value="'+esc(icon)+'">'+esc(icon)+'</option>';}).join('')+'</select></div>\
<div class="field"><b>Position</b><select id="editPosition"><option value="top">top</option><option value="left">left</option><option value="right">right</option></select></div>\
<div class="field"><b>Order</b><input id="editOrder" type="number" value="'+esc(menuOrder(row))+'"><small>Stored inside settings_json.menu_order. No sort_order database column is used.</small></div>\
<div class="field"><b>Sub-tab indent</b><input id="editIndent" type="number" min="0" max="3" value="'+esc(menuIndent(row))+'"></div>\
<div class="actions"><button id="applyEdit" class="btn primary" type="button">Apply Menu Edit</button><button id="moveUp" class="btn" type="button">Move Up</button><button id="moveDown" class="btn" type="button">Move Down</button><button id="indentLeft" class="btn" type="button">Sub-tab Left</button><button id="indentRight" class="btn" type="button">Sub-tab Right</button></div>';

  $('editShow').checked=showInMenu(row);
  $('editIcon').value=menuIcon(row);
  $('editPosition').value=menuPosition(row);
  $('applyEdit').onclick=applyEditor;
  $('moveUp').onclick=function(){moveSelected(-1);};
  $('moveDown').onclick=function(){moveSelected(1);};
  $('indentLeft').onclick=function(){indentSelected(-1);};
  $('indentRight').onclick=function(){indentSelected(1);};
}

function state(){
  return Object.assign({},authState,{
    canonicalRoute:'web-builder-menu-builder-owned-v7-12-264-test.html',
    checkpoint:'CHECKPOINT-WEB-BUILDER-DOORWAY-LOCK-ROLLPLAN-V7-12-263-8.md',
    menuBuilderOwnerLock:true,
    personalWorkspaceScoped:true,
    scope:authState.isPlatformOwner?'platform-owner-all-rows':'personal-owner-id-only',
    ownerScopeUserId:authState.userId,
    platformOwnerCanEditAllMenus:authState.isPlatformOwner,
    creatorCanOnlyEditOwnMenuRows:!authState.isPlatformOwner,
    adminRoleAloneDoesNotExposeWorkspaces:true,
    readCount:readCount,
    writeCount:writeCount,
    pageCount:pages.length,
    visibleOwnCount:authState.isPlatformOwner?pages.length:pages.filter(ownerMatches).length,
    shownMenuCount:pages.filter(showInMenu).length,
    selected:selected()?{
      id:selected().id,
      slug:selected().slug,
      title:selected().title,
      owner_id:selected().owner_id,
      ownerMatchesCurrentUser:ownerMatches(selected()),
      showInMenu:showInMenu(selected()),
      menuLabel:menuLabel(selected()),
      menuPosition:menuPosition(selected()),
      menuOrder:menuOrder(selected()),
      menuIndent:menuIndent(selected())
    }:null,
    jumpSearches:jumpSearches,
    jumpLast:jumpLast,
    lastAction:lastAction,
    lastError:lastError,
    supabaseReads:readCount>0,
    supabaseWrites:writeCount>0,
    storageWrites:false,
    storageActions:false,
    schemaChanges:false,
    builderTableChanges:false,
    sortOrderColumnRequired:false,
    menuStoredInSettingsJson:true,
    activeMenuPromotion:false,
    indexPromotion:false,
    registryPromotion:true
  });
}

function renderDebug(){
  $('debug').textContent=JSON.stringify(state(),null,2);
}

function renderCount(){
  $('countText').textContent=pages.length+' pages / '+pages.filter(showInMenu).length+' shown';
}

function render(){
  if(!$('pageList'))return;
  renderCount();
  renderTabs();
  renderEditor();
  renderPreview();
  renderDebug();
}

function selectPage(id){
  selectedId=id;
  highlightedId='';
  render();
}

function bindPage(){
  window.__sbMenuSelect=selectPage;

  $('loadPages').onclick=loadPages;
  $('saveMenu').onclick=saveMenu;
  $('selectPublished').onclick=selectPublished;
  $('clearMenu').onclick=clearMenu;
  $('copyReport').onclick=copyReport;
  $('menuJumpBtn').onclick=jumpSearch;
  $('menuJumpSearch').addEventListener('keydown',function(e){
    if(e.key==='Enter'){
      e.preventDefault();
      jumpSearch();
    }
  });
}

function renderLocked(reason){
  authState.checked=true;
  authState.allowed=false;
  authState.reason=reason||authState.reason;

  document.body.innerHTML='<main class="lockedScreen">\
<section class="hero">\
<span class="badge bad">Menu Builder locked</span>\
<h1>Builder access required</h1>\
<p>This menu builder opens only for platform owner and eligible Web Builder creator accounts.</p>\

<a class="btn" href="web-builder-pages-manager-owned-v7-12-256-test.html">Owned Pages</a>\
<a class="btn" href="settings-platform-control-hub-v7-12-85-test.html">Back to Settings</a>\
</div>\
<h2>Debug</h2>\
<pre class="debug">'+esc(JSON.stringify(authState,null,2))+'</pre>\
</section>\
</main>';
}

async function boot(){
  try{
    let authority=await readAuthority();

    authState.signedIn=authority.signedIn;

    if(!authority.signedIn){
      renderLocked('Sign in required before opening Menu Builder.');
      return;
    }

    user=authority.user;
    profile=authority.profile||{};

    authState.userId=user.id;
    authState.email=user.email||'';
    authState.role=profile.role||'';
    authState.adminLevel=profile.admin_level||'';
    authState.planKey=profile.plan_key||'';
    authState.accountStatus=profile.account_status||'active';
    authState.isPlatformOwner=isPlatformOwnerProfile(profile);
    authState.canUseBuilder=builderAllowed(profile);
    authState.workspace=authState.isPlatformOwner?'platform-owner-all-rows':'personal-owner-id-only';

    if(!authState.canUseBuilder){
      renderLocked('Web Builder plan or permission required.');
      return;
    }

    authState.allowed=true;
    authState.reason='Allowed. Menu Builder owner workspace lock passed.';

    renderPage();
  }catch(e){
    authState.reason=e&&e.message?e.message:String(e);
    lastError=authState.reason;
    renderLocked('Menu Builder lock check failed: '+authState.reason);
  }
}

boot();
