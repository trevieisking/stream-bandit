<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream Bandit V7.7.4 Auto Actions TEST</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;background:#050711;color:white;font-family:system-ui,Arial;padding:22px}.wrap{max-width:1180px;margin:auto}.box,.card,.block{border:1px solid #ffffff22;border-radius:24px;background:linear-gradient(135deg,#101529,#17122d);padding:20px;margin:0 0 16px}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px;font-size:12px}.btn{border:0;border-radius:999px;padding:11px 15px;background:linear-gradient(135deg,#22d3a6,#7c3cff);color:white;font-weight:900;text-decoration:none;display:inline-block;margin:4px;cursor:pointer}.warn{background:linear-gradient(135deg,#ffb142,#7c3cff)}.hot{background:linear-gradient(135deg,#ff2d85,#7c3cff)}h1{font-size:clamp(38px,7vw,72px);line-height:.95;margin:8px 0}p,label{color:#b9c0d8;line-height:1.5}input,textarea,select{border:1px solid #ffffff24;border-radius:14px;background:#0006;color:white;padding:11px;font:inherit;width:100%;margin:5px 0}textarea{min-height:70px}.row{display:flex;gap:8px;flex-wrap:wrap}.row input{max-width:330px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}.link{word-break:break-all;background:#0006;color:#dfffee;border-radius:12px;padding:10px;margin-top:8px;font-size:12px}.note{background:#ffb1421f;border:1px solid #ffb14252;color:#ffe7ad;border-radius:16px;padding:12px;font-weight:800}.src{white-space:pre-wrap;word-break:break-word;background:#0006;border-radius:14px;padding:12px;color:#dfffee;max-height:240px;overflow:auto}</style></head><body><div class="wrap"><section class="box"><span class="pill">V7.7.4 Web Builder Auto Actions TEST</span><h1>🏗️ Auto Actions Builder</h1><p>This builder saves action data automatically. New pages should not need the V7.7.2 repair tool.</p><div class="row"><input id="slug" value="test-page" placeholder="page slug"><input id="title" value="Auto Actions Test Page" placeholder="page title"><button id="load" class="btn">Load Page</button><button id="save" class="btn hot">Save + Publish</button><a id="preview" class="btn warn" href="web-builder-action-preview-v7-7-3-test.html?page=test-page">Open Preview</a></div><p id="status" class="note">Ready.</p></section><section class="box"><h2>Add blocks</h2><button class="btn" data-add="form">Add Form</button><button class="btn" data-add="faq">Add FAQ</button><button class="btn" data-add="pricing">Add Pricing</button><button class="btn" data-add="rating">Add Rating</button><button class="btn" data-add="features">Add Features</button></section><section class="box"><h2>Blocks</h2><div id="blocks"><p>No blocks yet.</p></div></section><section class="box"><h2>Debug</h2><div id="debug" class="src">Waiting...</div></section></div><script src="stream-bandit-shell-v6-24.js"></script><script>let sb,blocks=[];const $=i=>document.getElementById(i);function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function sl(s){return String(s||'block').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'block'}async function init(){if(sb)return;let t=await fetch('stream-bandit-shell-v6-24.js',{cache:'no-store'}).then(r=>r.text());sb=supabase.createClient((t.match(/SUPABASE_URL\s*=\s*'([^']+)'/)||[])[1],(t.match(/SUPABASE_KEY\s*=\s*'([^']+)'/)||[])[1])}function seed(type){if(type==='form')return[{label:'Choose a name',kind:'multiple choice',required:true,options:'Trev\nKay\nTom\nDan'}];if(type==='faq')return[{q:'Does this auto save actions?',a:'Yes, this page saves actionUrl and actionType.'}];if(type==='pricing')return[{name:'Creator',price:'£9',features:'Pages\nForms\nActions'}];if(type==='rating')return[{name:'Visitor',rating:'5',review:'Works nicely.'}];if(type==='features')return[{icon:'✅',title:'Auto Actions',text:'Buttons know where to go.'}];return[]}function make(type){let names={form:'Form / Contact',faq:'FAQ',pricing:'Pricing Cards',rating:'Rating / Review',features:'Feature Cards'};return{id:'b_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),type,title:names[type]||type,text:'Auto action test block.',buttonText:'Open',buttonLink:'#',items:seed(type),visible:true}}function addActions(b){let page=$('slug').value.trim()||'test-page',bs=sl(b.title||b.type),isForm=String(b.type).includes('form');let actionType=isForm?'form_submit':'block_focus';let actionUrl=isForm?'web-builder-form-save-v7-6-5-test.html?page='+encodeURIComponent(page):'web-builder-action-preview-v7-7-3-test.html?page='+encodeURIComponent(page)+'&block='+encodeURIComponent(bs);return {...b,blockSlug:bs,actionType,actionUrl,buttonLink:actionUrl}}function render(){document.getElementById('preview').href='web-builder-action-preview-v7-7-3-test.html?page='+encodeURIComponent($('slug').value.trim()||'test-page');$('blocks').innerHTML=blocks.length?'<div class="grid">'+blocks.map((b,i)=>{let a=addActions(b);return '<article class="card"><span class="pill">'+esc(b.type)+'</span><h3>'+esc(b.title)+'</h3><label>Title</label><input data-i="'+i+'" data-k="title" value="'+esc(b.title)+'"><label>Description</label><textarea data-i="'+i+'" data-k="text">'+esc(b.text||'')+'</textarea><p><b>Saved action:</b></p><div class="link">'+esc(a.actionType)+' · '+esc(a.actionUrl)+'</div><button class="btn warn" data-del="'+i+'">Delete</button></article>'}).join('')+'</div>':'<p>No blocks yet.</p>';$('debug').textContent=JSON.stringify(blocks.map(addActions),null,2);document.querySelectorAll('[data-i]').forEach(el=>el.oninput=()=>{blocks[+el.dataset.i][el.dataset.k]=el.value;render()});document.querySelectorAll('[data-del]').forEach(el=>el.onclick=()=>{blocks.splice(+el.dataset.del,1);render()})}async function loadPage(){try{await init();let s=$('slug').value.trim()||'test-page';let r=await sb.from('sb_site_pages').select('*').eq('slug',s).maybeSingle();if(r.error)throw r.error;if(r.data){$('title').value=r.data.title||s;blocks=Array.isArray(r.data.layout_json)?r.data.layout_json:[]}render();$('status').textContent=r.data?'Loaded '+s:'No page found. You can create it by saving.'}catch(e){$('status').textContent='Load failed: '+(e.message||e)}}async function save(){try{await init();let s=sl($('slug').value||'test-page');$('slug').value=s;let fixed=blocks.map(addActions);let payload={slug:s,title:$('title').value||s,page_type:'custom',status:'published',layout_json:fixed,settings_json:{version:'V7.7.4',builder:'auto-actions'},updated_at:new Date().toISOString()};let r=await sb.from('sb_site_pages').upsert(payload,{onConflict:'slug'}).select('*').single();if(r.error)throw r.error;blocks=Array.isArray(r.data.layout_json)?r.data.layout_json:fixed;render();$('status').textContent='Saved and published with automatic actions.'}catch(e){$('status').textContent='Save failed: '+(e.message||e)}}document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{blocks.push(make(b.dataset.add));render()});$('load').onclick=loadPage;$('save').onclick=save;$('slug').oninput=render;let start=new URL(location.href).searchParams.get('page')||'test-page';$('slug').value=start;loadPage();</script></body></html>
