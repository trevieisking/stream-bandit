<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Bandit V7.9.2 Shared Style Block Duplicate Route Fix TEST</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{color-scheme:dark;--bg:#050711;--card:#101529;--card2:#17122d;--line:#ffffff22;--muted:#b9c0d8;--title:#fff;--accent:#22d3a6;--accent2:#7c3cff;--btnText:#fff;--fontScale:1}*{box-sizing:border-box;min-width:0}body{margin:0;background:radial-gradient(circle at 8% 0,color-mix(in srgb,var(--accent),transparent 70%),transparent 34%),radial-gradient(circle at 92% 0,color-mix(in srgb,var(--accent2),transparent 78%),transparent 38%),var(--bg);color:var(--title);font-family:system-ui,Arial;padding:22px;font-size:calc(16px * var(--fontScale))}.wrap{max-width:1120px;margin:auto}.box,.hero,.card{border:1px solid var(--line);border-radius:26px;background:linear-gradient(135deg,var(--card),var(--card2));padding:22px;margin:0 0 16px;box-shadow:0 18px 60px #0007}.heroGrid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px;align-items:center}.art{min-height:230px;border-radius:24px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;position:relative;overflow:hidden}.art:before{content:"";position:absolute;inset:18px;border:1px dashed #ffffff4a;border-radius:20px}.artIcon{font-size:92px;filter:drop-shadow(0 18px 22px #0009);z-index:1}.pill{display:inline-block;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:900;padding:6px 10px;font-size:12px}.btn{border:0;border-radius:999px;padding:11px 15px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--btnText);font-weight:900;text-decoration:none;display:inline-block;margin:4px}.warn{background:linear-gradient(135deg,#ffb142,var(--accent2))}h1{font-size:clamp(40px,7vw,78px);line-height:.93;margin:10px 0}h2{margin:0 0 12px}p{color:var(--muted);line-height:1.55}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.card{background:#0004}.media{height:220px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;margin:12px 0;overflow:hidden;font-size:44px}.media img{width:100%;height:100%;object-fit:cover}.note{background:#ffb1421f;border:1px solid #ffb14252;color:#ffe7ad;border-radius:16px;padding:12px;font-weight:800}.good{background:#22d3a61f;border-color:#22d3a652;color:#baf7df}.src{white-space:pre-wrap;background:#0006;border-radius:14px;padding:12px;color:#dfffee;max-height:240px;overflow:auto}@media(max-width:850px){.heroGrid{grid-template-columns:1fr}.art{min-height:170px}.artIcon{font-size:64px}}</style>
</head>
<body>
<div class="wrap">
<section class="hero"><span class="pill">V7.9.2 Shared Style Block TEST</span><div class="heroGrid"><div><h1 id="title">Block Page</h1><p id="meta">Loading...</p><a id="back" class="btn warn">Back To Preview</a><p id="status" class="note">Ready.</p></div><div id="art" class="art"><div id="artIcon" class="artIcon">🏗️</div></div></div></section>
<main id="main" class="box"><p>Loading block page...</p></main>
<section class="box"><h2>Debug</h2><div id="debug" class="src">Waiting...</div></section>
</div>
<script src="stream-bandit-shell-v6-24.js"></script>
<script>
let sb,page,block,sharedStyle={};const STORE_ID='stream_bandit';const STYLE_KEY='web_builder_shared_style_v7_8_8';const $=i=>document.getElementById(i);
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function sl(s){return String(s||'block').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'block'}
async function init(){if(sb)return;let t=await fetch('stream-bandit-shell-v6-24.js',{cache:'no-store'}).then(r=>r.text());sb=supabase.createClient((t.match(/SUPABASE_URL\s*=\s*'([^']+)'/)||[])[1],(t.match(/SUPABASE_KEY\s*=\s*'([^']+)'/)||[])[1])}
function applyStyle(s){s=s||{};document.documentElement.style.setProperty('--accent',s.accent||'#22d3a6');document.documentElement.style.setProperty('--accent2',s.accent2||'#7c3cff');document.documentElement.style.setProperty('--bg',s.bg||'#050711');document.documentElement.style.setProperty('--card',s.card||s.cardColor||'#101529');document.documentElement.style.setProperty('--card2',s.card||s.cardColor||'#17122d');document.documentElement.style.setProperty('--title',s.titleColor||'#ffffff');document.documentElement.style.setProperty('--muted',s.textColor||'#b9c0d8');document.documentElement.style.setProperty('--btnText',s.buttonText||'#ffffff');document.documentElement.style.setProperty('--fontScale',s.largeText?'1.12':'1');document.documentElement.style.setProperty('--line',s.highContrast?'#ffffff66':'#ffffff22');document.body.style.fontFamily=s.font||'system-ui,Arial'}
async function loadShared(){let r=await sb.from('sb_app_settings').select('settings').eq('id',STORE_ID).maybeSingle();if(r.error)throw r.error;let settings=(r.data&&r.data.settings)||{};sharedStyle=settings[STYLE_KEY]||settings.web_builder_style||settings.builderStyle||{};return sharedStyle}
function artFor(t){t=String(t||'').toLowerCase();if(t.includes('faq'))return'❓';if(t.includes('pricing'))return'💳';if(t.includes('rating'))return'⭐';if(t.includes('gallery')||t.includes('image'))return'🖼️';if(t.includes('feature'))return'💎';if(t.includes('blog')||t.includes('feed'))return'📰';if(t.includes('video')||t.includes('mux'))return'🎥';if(t.includes('form'))return'🧾';return'🏗️'}
function media(b){if(b.imageUrl)return '<div class="media"><img src="'+esc(b.imageUrl)+'"></div>';return '<div class="media">'+artFor(b.type)+'</div>'}
function cards(a,fn){return '<div class="grid">'+(Array.isArray(a)?a:[]).map(x=>'<article class="card">'+fn(x)+'</article>').join('')+'</div>'}
function renderBlock(b){let a=b.items||[],t=String(b.type||'');if(t==='faq')return cards(a,x=>'<h2>Q: '+esc(x.q)+'</h2><p>A: '+esc(x.a)+'</p>');if(t==='pricing')return cards(a,x=>'<h2>'+esc(x.name)+'</h2><p style="font-size:32px;color:var(--title);font-weight:900">'+esc(x.price)+'</p><p>'+esc(x.features)+'</p><a class="btn">'+esc(x.button||'Choose')+'</a>');if(t==='rating')return cards(a,x=>'<h2>'+esc(x.name)+'</h2><p style="font-size:28px;color:var(--title);font-weight:900">⭐ '+esc(x.rating)+'</p><p>'+esc(x.review)+'</p>');if(t==='features')return cards(a,x=>'<h2>'+esc(x.icon)+' '+esc(x.title)+'</h2><p>'+esc(x.text)+'</p>');if(t==='image_gallery')return cards(a,x=>(x.url?'<div class="media"><img src="'+esc(x.url)+'"></div>':'<div class="media">🖼️</div>')+'<h2>'+esc(x.title)+'</h2><p>'+esc(x.caption)+'</p>');if(t==='page_feed'||t==='blog')return cards(a,x=>'<h2>'+esc(x.title)+'</h2><p>'+esc(x.body)+'</p>'+(x.link&&x.link!=='#'?'<a class="btn" href="'+esc(x.link)+'">Open</a>':''));return '<h2>'+esc(b.title||'Block')+'</h2>'+media(b)+'<p>'+esc(b.text||'')+'</p>'}
function findBlock(layout,params){let blockId=params.get('blockId')||params.get('id')||'';let blockIndex=params.get('blockIndex')||params.get('index')||'';let blockSlug=params.get('block')||'';if(blockId){let byId=layout.find(b=>String(b.id||'')===blockId);if(byId)return byId}if(blockIndex!==''&&!Number.isNaN(Number(blockIndex))&&layout[Number(blockIndex)])return layout[Number(blockIndex)];if(blockSlug){let exact=layout.find(b=>String(b.blockSlug||'')===blockSlug);if(exact)return exact;let fallback=layout.find(b=>sl(b.title||b.type)===blockSlug);if(fallback)return fallback}return layout[0]}
async function load(){try{await init();let p=new URL(location.href).searchParams,slug=p.get('page')||'test-page';let r=await sb.from('sb_site_pages').select('*').eq('slug',slug).maybeSingle();if(r.error)throw r.error;if(!r.data){$('main').innerHTML='<h2>No page found</h2><p>No sb_site_pages row for '+esc(slug)+'.</p>';return}page=r.data;let global=await loadShared();applyStyle({...page.settings_json,...global});let layout=Array.isArray(page.layout_json)?page.layout_json:[];block=findBlock(layout,p);$('back').href='web-builder-shared-style-preview-v7-9-2-test.html?page='+encodeURIComponent(page.slug);if(!block){$('main').innerHTML='<h2>No block found</h2><p>This page has no blocks.</p>';return}let idx=layout.indexOf(block);$('artIcon').textContent=artFor(block.type);$('title').textContent=block.title||'Block Page';$('meta').textContent=[page.slug,block.type,'index '+idx,block.id?'id '+block.id:'no-id',block.blockSlug||sl(block.title||block.type)].filter(Boolean).join(' - ');$('main').innerHTML='<span class="pill">'+esc(block.type||'block')+'</span>'+media(block)+'<p>'+esc(block.text||'')+'</p>'+renderBlock(block);$('debug').textContent=JSON.stringify({version:'V7.9.2 duplicate block route fix',requested:{page:page.slug,blockId:p.get('blockId'),blockIndex:p.get('blockIndex'),block:p.get('block')},matched:{index:idx,id:block.id||null,blockSlug:block.blockSlug||sl(block.title||block.type),type:block.type,title:block.title},styleSource:global.version?'shared studio + page fallback':'page/default fallback'},null,2);$('status').className='note good';$('status').textContent='Loaded exact block page. V7.9.2 uses blockId/blockIndex before title slug.'}catch(e){$('status').textContent='Load failed: '+(e.message||e);$('debug').textContent=JSON.stringify(e,null,2)}}load();
</script>
</body>
</html>
