name: Deploy Code Labs GitHub Writer

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-code-labs-github-writer.yml
      - supabase/functions/code-labs-github-writer/**
      - supabase/functions/code-labs-mcp-stub/oauth.ts
      - supabase/functions/code-labs-mcp-stub/context.ts
      - supabase/functions/code-labs-mcp-stub/github-writer.ts
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-code-labs-github-writer
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: xzxqfrvqdgkzwujbkdbk
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy writer-only Code Labs connector
        run: supabase functions deploy code-labs-github-writer --project-ref "$PROJECT_ID" --no-verify-jwt
