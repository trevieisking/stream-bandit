name: Code Labs finish parent sweep
on:
  push:
    branches: [fix/code-labs-sol-v142-clean]
    paths: [.github/workflows/code-labs-finish-parent-sweep.yml]
permissions:
  contents: write
jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/code-labs-sol-v142-clean
          fetch-depth: 0
      - name: Patch four remaining pages only
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          files = [
            Path('code-labs/buddy-canvas.html'),
            Path('code-labs/help.html'),
            Path('code-labs/helper-route-map.html'),
            Path('code-labs/index.html'),
          ]
          key = '?v=cl-v145-sol-parent-refresh'
          patterns = [
            re.compile(r'(<script\s+src=["\']assets/cl-nav\.js)(?:\?[^"\']*)?(["\'])'),
            re.compile(r'(<script\s+src=["\']assets/code-labs-v1-1-safety\.js)(?:\?[^"\']*)?(["\'])'),
          ]
          changed = []
          for path in files:
            before = path.read_text(encoding='utf-8')
            after = before
            for pattern in patterns:
              after = pattern.sub(lambda m: m.group(1) + key + m.group(2), after)
            if after == before:
              raise SystemExit(f'No loader URL changed in {path}')
            path.write_text(after, encoding='utf-8')
            changed.append(str(path))
          if changed != [str(p) for p in files]:
            raise SystemExit('Unexpected changed-file set')
          PY
          git diff --check
          test "$(git diff --name-only | sort)" = "$(printf '%s\n' code-labs/buddy-canvas.html code-labs/help.html code-labs/helper-route-map.html code-labs/index.html | sort)"
          rm .github/workflows/code-labs-finish-parent-sweep.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add code-labs/buddy-canvas.html code-labs/help.html code-labs/helper-route-map.html code-labs/index.html .github/workflows/code-labs-finish-parent-sweep.yml
          git commit -m "fix(code-labs): refresh final parent loader cache keys"
          git push origin HEAD:fix/code-labs-sol-v142-clean