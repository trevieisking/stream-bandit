name: Code Labs finish parent sweep
on:
  push:
    branches: [fix/code-labs-sol-v142-clean]
    paths: [.github/workflows/code-labs-finish-parent-sweep.yml]
permissions:
  contents: write
jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/code-labs-sol-v142-clean
          fetch-depth: 0
      - shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          files=[Path(x) for x in ('code-labs/buddy-canvas.html','code-labs/help.html','code-labs/helper-route-map.html','code-labs/index.html')]
          key='?v=cl-v145-sol-parent-refresh'
          pats=[re.compile(r'(<script\s+src=["\']assets/cl-nav\.js)(?:\?[^"\']*)?(["\'])'),re.compile(r'(<script\s+src=["\']assets/code-labs-v1-1-safety\.js)(?:\?[^"\']*)?(["\'])')]
          for p in files:
            before=p.read_text(encoding='utf-8'); after=before
            for pat in pats: after=pat.sub(lambda m:m.group(1)+key+m.group(2),after)
            if after==before: raise SystemExit(f'No loader change in {p}')
            p.write_text(after,encoding='utf-8')
          PY
          git diff --check
          test "$(git diff --name-only | sort)" = "$(printf '%s\n' code-labs/buddy-canvas.html code-labs/help.html code-labs/helper-route-map.html code-labs/index.html | sort)"
          rm .github/workflows/code-labs-finish-parent-sweep.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add code-labs/buddy-canvas.html code-labs/help.html code-labs/helper-route-map.html code-labs/index.html .github/workflows/code-labs-finish-parent-sweep.yml
          git commit -m "fix(code-labs): refresh final parent loader cache keys"
          git push origin HEAD:fix/code-labs-sol-v142-clean
# trigger update
