name: Deploy Code Labs Sol V142

on:
  push:
    branches:
      - fix/code-labs-sol-chat-v142-diagnostics
    paths:
      - .github/workflows/deploy-code-labs-sol-v142.yml
      - supabase/functions/code-labs-sol-chat-v142/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-code-labs-sol-v142
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
        env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Code Labs Sol V142
        run: supabase functions deploy code-labs-sol-chat-v142 --project-ref xzxqfrvqdgkzwujbkdbk
