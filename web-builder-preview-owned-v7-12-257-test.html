async function firstOwnedSlug(){
  let r=await withTimeout(
    client()
      .from('sb_site_pages')
      .select('id,slug,title,status,owner_id,settings_json,updated_at')
      .eq('owner_id',authState.userId)
      .limit(50),
    10000,
    'Own page redirect lookup timed out'
  );

  supabaseReadCount++;
  authState.supabaseReads=true;

  if(r.error)throw r.error;

  let rows=(r.data||[]).filter(function(row){
    return row&&row.slug&&!isReservedSlug(row.slug);
  });

  rows.sort(function(a,b){
    let ah=rowIsHome(a)?0:1;
    let bh=rowIsHome(b)?0:1;

    if(ah!==bh)return ah-bh;

    let as=rowSort(a);
    let bs=rowSort(b);

    if(as!==bs)return as-bs;

    let au=String(a.updated_at||'');
    let bu=String(b.updated_at||'');

    if(au!==bu)return bu.localeCompare(au);

    return slugify(a.slug).localeCompare(slugify(b.slug));
  });

  return rows[0]?slugify(rows[0].slug):'';
}

async function applyReservedSlugRedirect(slug){
  if(authState.isPlatformOwner)return false;
  if(!isReservedSlug(slug))return false;

  let own=await firstOwnedSlug();

  if(!own){
    renderLocked('This preview slug is reserved for the platform owner workspace. Create or save your own page first.', {
      openPages:true
    });
    return true;
  }

  redirectSlug=own;
  redirectTo=pageUrl(ROUTES.preview,own);
  location.replace(redirectTo);

  return true;
}

  }

  if(k.indexOf('radio')>-1||k.indexOf('multiple')>-1||k.indexOf('choose one')>-1){
    return '<div class="formField">'+label+(opts.length?opts:['Option 1']).map(function(o){
      return '<label class="choice"><input type="radio" name="'+name+'" value="'+esc(o)+'"'+required+'> '+esc(o)+'</label>';
    }).join('')+'</div>';
  }

  if(k.indexOf('dropdown')>-1||k.indexOf('select')>-1){
    return '<div class="formField">'+label+'<select name="'+name+'"'+required+'><option value="">Choose...</option>'+opts.map(function(o){
      return '<option value="'+esc(o)+'">'+esc(o)+'</option>';
    }).join('')+'</select></div>';
  }

  if(k.indexOf('yes')>-1){
    return '<div class="formField">'+label+'<label class="choice"><input type="radio" name="'+name+'" value="Yes"'+required+'> Yes</label><label class="choice"><input type="radio" name="'+name+'" value="No"'+required+'> No</label></div>';
  }

  if(k.indexOf('long')>-1||k.indexOf('textarea')>-1||k.indexOf('paragraph')>-1){
    return '<div class="formField">'+label+'<textarea name="'+name+'" '+required+' placeholder="'+ph+'"></textarea></div>';
  }

  if(k.indexOf('image')>-1||k.indexOf('file')>-1){
    return '<div class="formField">'+label+'<input name="'+name+'" type="text" '+required+' placeholder="File upload fields are paused in this locked preview pass. Paste a public URL or note here."><small>No storage upload happens from this preview lock pass.</small></div>';
  }

async function collectForm(form,blockIndex){
  let b=obj(contentBlocks[Number(blockIndex)]||blocks[Number(blockIndex)]||{});
  let qs=formQuestions(b);
  let answers={};
  let email='';
  let missing=[];

  for(let i=0;i<qs.length;i++){
    let q=obj(qs[i]);
    let name=inputName(blockIndex,i);
    let label=q.label||q.title||('Question '+(i+1));
    let els=[].slice.call(form.querySelectorAll('[name="'+name+'"]'));
    let kind=String(q.kind||q.type||'short').toLowerCase();
    let value='';
    let values=[];

    if(els.length&&els[0].type==='checkbox'){
      values=els.filter(function(e){return e.checked;}).map(function(e){return e.value;});
      value=values.join(', ');
    }else if(els.length&&els[0].type==='radio'){
      let picked=els.find(function(e){return e.checked;});
      value=picked?picked.value:'';
    }else if(els[0]){
      value=String(els[0].value||'').trim();
    }

    if(bool(q.required,false)&&!value)missing.push(label);
    if(!email&&String(value).indexOf('@')>-1)email=String(value).trim();

    answers[label]={
      type:kind,
      answer:value,
      values:values,
      required:bool(q.required,false)
    };
  }

  if(missing.length){
    throw new Error('Required answers missing: '+missing.join(', '));
  }

  return {
    block:b,
    answers:answers,
    email:email
  };
}

async function submitInlineForm(form){
  let box=form.querySelector('.formStatus');
  let blockIndex=form.dataset.formBlock;

  try{
    box.textContent='Submitting...';
    box.className='status formStatus';

    let c=client();
    let collected=await collectForm(form,blockIndex);
    let b=collected.block;
    let title=blockTitle(b,Number(blockIndex));

    let payload={
      page_slug:currentSlug(),
      form_title:title,
      form_key:form.dataset.formKey||formKey(b),
      block_id:b.id||('published-form-'+currentSlug()+'-'+blockIndex),
      block_title:title,
      answers_json:Object.assign({},collected.answers,{
        __form:{
          source:'owned-preview-menu-rail-icons-search-v7-12-300-41',
          page_slug:currentSlug(),
          page_owner_id:pageOwnerId,
          block_index:blockIndex
        }
      }),
      submitter_id:user?user.id:null,
      submitter_email:collected.email||null,
      status:'new'
    };

    let res=await withTimeout(
      c.from('sb_form_submissions').insert(payload).select('*').maybeSingle(),
      12000,
      'Form submission timed out'
    );

    submissionWrites++;
    authState.supabaseWrites=true;

    if(res.error)throw res.error;

    lastSubmission=res.data||payload;

    box.textContent='Submitted. Thank you.';
    box.className='status formStatus submitOk';
    form.reset();
    debug();
  }catch(e){
    lastError=e&&e.message?e.message:String(e);
    box.textContent='Submit failed: '+lastError;
    box.className='status formStatus submitBad';
    debug();
  }
}

  let comment=saved&&saved.comment||'';

  let buttons=[1,2,3,4,5].map(function(n){
    return '<button type="button" data-rate="'+n+'" class="'+(n<=val?'on':'')+'">★</button>';
  }).join('');

  return '<div class="viewerBox" data-rating-box="1" data-block="'+blockIndex+'" data-item="'+itemIndex+'">\
<b>Rate this</b>\
<div class="stars">'+buttons+'</div>\
<textarea placeholder="Optional review note">'+esc(comment)+'</textarea>\
<button class="btn hot" type="button" data-save-rating="1">Save rating</button>\
<p class="notice">'+(saved?'Your rating is saved on this device: '+val+' stars.':'Choose stars and save your rating.')+'</p>\
</div>';
}

function hydrateRatings(){
  document.querySelectorAll('[data-rating-box="1"]').forEach(function(box){
    let blockIndex=box.getAttribute('data-block')||'0';
    let itemIndex=box.getAttribute('data-item')||'0';
    let rating=0;

    box.querySelectorAll('[data-rate]').forEach(function(btn){
      btn.addEventListener('click',function(){
        rating=Number(btn.getAttribute('data-rate'))||0;

        box.querySelectorAll('[data-rate]').forEach(function(b){
          b.classList.toggle('on',Number(b.getAttribute('data-rate'))<=rating);
        });
      });
    });

    let save=box.querySelector('[data-save-rating="1"]');

    if(save){
      save.addEventListener('click',function(){
        let existing=savedRating(blockIndex,itemIndex);
        let finalRating=rating||Number(existing&&existing.rating)||0;
        let note=box.querySelector('textarea')?box.querySelector('textarea').value:'';

        localStorage.setItem(ratingKey(blockIndex,itemIndex),JSON.stringify({
          rating:finalRating,
          comment:note,
          at:new Date().toISOString()
        }));

        renderPage();
      });
    }
  });
}

function ratingList(items,blockIndex){
  ratingBlocksRendered++;

  items=arr(items);

  if(!items.length){
    items=[{title:'Reviewer name',description:'Share your review.'}];
  }

  return '<div class="grid">'+items.map(function(x,i){
    x=obj(x);

    let title=x.title||x.name||x.label||('Reviewer '+(i+1));
    let desc=x.description||x.text||x.body||'';

    return '<article class="previewBlock"><h3>'+esc(title)+'</h3><p>'+esc(desc)+'</p>'+ratingControls(blockIndex,i)+'</article>';
  }).join('')+'</div>';
}

function cardList(items){
  let cleaned=arr(items).map(obj).filter(function(x){
    return hasText(x.title||x.name||x.label)||
      hasText(x.description||x.text||x.body)||
      mediaUrl(x);
  });

  if(!cleaned.length){
    hiddenBlocks++;
    return '';
  }

  cardBlocksRendered++;

  return '<div class="grid">'+cleaned.map(function(x,i){
    let title=x.title||x.name||x.label||('Item '+(i+1));
    let desc=x.description||x.text||x.body||'';
    let img=mediaUrl(x);

    if(img)imageFieldsFound++;

    return '<article class="previewBlock">\
'+(img?'<div class="imageBox"><img src="'+esc(img)+'" alt="'+esc(title)+'" loading="lazy"></div>':'')+'\
<h3>'+esc(title)+'</h3>\
<p>'+esc(desc)+'</p>\
</article>';
  }).join('')+'</div>';
}

function renderVideo(b){
  let url=videoUrl(b);
  let poster=posterUrl(b);

  if(poster)posterFieldsFound++;

  if(!url&&poster){
    return '<div class="imageBox"><img src="'+esc(poster)+'" alt="'+esc(blockTitle(b,0))+'" loading="lazy"></div>';
  }

  if(!url){
    hiddenBlocks++;
    return '';
  }

  return '<div class="video"><video controls playsinline '+(poster?'poster="'+esc(poster)+'" ':'')+'src="'+esc(url)+'"></video></div><p><a class="btn" href="'+esc(url)+'" target="_blank" rel="noopener">Open video link</a></p>';
}

function renderHeroBlock(b,i){
  let img=mediaUrl(b);
  let body=blockBody(b);
  let btn=blockButton(b);

  if(img)imageFieldsFound++;

  return '<div class="blockHero">\
<div><p>'+esc(body||'')+'</p><div class="actions">'+btn+'</div></div>\
'+(img?'<div class="imageBox"><img src="'+esc(img)+'" alt="'+esc(blockTitle(b,i))+'" loading="lazy"></div>':'')+'\
</div>';
}

function renderBlock(b,i){
  b=obj(b);

  if(!hasRealContent(b)){
    hiddenBlocks++;
    return '';
  }

  let type=blockType(b);
  let title=blockTitle(b,i);
  let body=blockBody(b);
  let img=mediaUrl(b);
  let html='';

  if(isFormBlock(b))return renderFormBlock(b,i);

  if(isRatingBlock(b)){
    return '<section class="previewBlock"><span class="pill">rating</span><h3>'+esc(title)+'</h3>'+ratingList(b.items||b.reviews||[],i)+'</section>';
  }

  if(type.indexOf('hero')>-1){
    html=renderHeroBlock(b,i);
  }else if(type.indexOf('video')>-1){
    html=renderVideo(b);
  }else if(type.indexOf('gallery')>-1||type.indexOf('card')>-1||b.items||b.cards){
    html=cardList(b.items||b.cards||[]);
  }else if(type.indexOf('image')>-1||type.indexOf('media')>-1){
    if(!img){
      hiddenBlocks++;
      return '';
    }

    imageFieldsFound++;

    html='<div class="imageBox"><img src="'+esc(img)+'" alt="'+esc(title)+'" loading="lazy"></div>'+blockButton(b);
  }else{
    html='<p>'+esc(body)+'</p>'+blockButton(b);
  }

  if(!String(html||'').trim()){
    hiddenBlocks++;
    return '';
  }

  rendered++;

  return '<section class="previewBlock"><span class="pill">'+esc(type)+'</span><h3>'+esc(title)+'</h3>'+html+'</section>';
}

function navHtml(pos,current){
  let items=sortedMenu(pos);

  if(!items.length)return '';

  return items.map(function(m){
    let active=m.slug===current?'current':'';
    let label=String(m.label||m.title||m.slug||'');
    let slug=slugify(m.slug);
    let icon=m.iconSymbol||iconSymbol(m.icon);

    return '<a class="'+active+' indent'+m.indent+'" href="'+pageUrl(ROUTES.preview,slug)+'" data-page-menu-link="1" data-menu-position="'+esc(pos)+'" data-menu-label="'+esc(label.toLowerCase())+'" data-menu-slug="'+esc(slug)+'" data-menu-icon="'+esc(String(m.icon||''))+'"><span class="menuIcon" aria-hidden="true">'+esc(icon)+'</span><span>'+esc(label)+'</span></a>';
  }).join('');
}

function hydrateMenuSearch(){
  let input=$('siteMenuSearchInput');
  let button=$('siteMenuSearchGo');
  let count=$('siteMenuSearchCount');

  if(!input)return;

  let links=[].slice.call(document.querySelectorAll('[data-page-menu-link="1"]'));

  function apply(openBest){
    let q=String(input.value||'').trim().toLowerCase();
    let visible=[];
    menuSearches++;
    lastMenuSearch=q;

    links.forEach(function(a){
      let hay=[
        a.getAttribute('data-menu-label')||'',
        a.getAttribute('data-menu-slug')||'',
        a.getAttribute('data-menu-icon')||'',
        a.textContent||''
      ].join(' ').toLowerCase();

      let match=!q||hay.indexOf(q)>-1;

      a.classList.toggle('menuHidden',!match);

      if(match)visible.push(a);
    });

    if(count){
      count.textContent=q?(visible.length+' menu match'+(visible.length===1?'':'es')):(links.length+' menu link'+(links.length===1?'':'s'));
    }

    if(openBest&&visible[0]){
      location.href=visible[0].href;
    }

    debug();
  }

  input.addEventListener('input',function(){
    apply(false);
  });

  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'){
      e.preventDefault();
      apply(true);
    }
  });

  if(button){
    button.addEventListener('click',function(){
      apply(true);
    });
  }

  apply(false);
}

function renderPage(){
  let s=settings(page);
  let slug=slugify(page&&page.slug||currentSlug());
  let title=page&&page.title||s.title||slug;
  let desc=s.description||s.page_description||s.subtitle||'';
  let statusText=page&&page.status||'preview';

  blocks=getBlocks(page);
  heroBlock=blocks.find(function(b){return isHeroBlock(obj(b));})||null;
  contentBlocks=blocks.filter(function(b){return !heroBlock||b!==heroBlock;});

  rendered=0;
  hiddenBlocks=0;
  formBlocksRendered=0;
  ratingBlocksRendered=0;
  cardBlocksRendered=0;
  imageFieldsFound=0;
  posterFieldsFound=0;
  heroPromoted=!!heroBlock;

  let topNav=navHtml('top',slug);
  let leftNav=navHtml('left',slug);
  let rightNav=navHtml('right',slug);
  let layoutClass=leftNav&&rightNav?'':leftNav?'noRight':rightNav?'noLeft':'full';

  lastLayoutClass=layoutClass||'three-column';

  let blockHtml=contentBlocks.map(function(b,i){
    return renderBlock(obj(b),i);
  }).join('');

  if(!blockHtml.trim()){
    blockHtml='<section class="previewBlock"><h3>'+esc(title)+'</h3><p>'+esc(desc||'This page has no visible content blocks yet. Empty blocks are hidden by the preview guard.')+'</p></section>';
  }

  let menuBar=topNav?'<div class="siteMenuBar"><nav class="siteNav siteTopRail" aria-label="Page menu top rail">'+topNav+'</nav><div class="siteMenuSearch"><input id="siteMenuSearchInput" type="search" placeholder="Search pages..." aria-label="Search page menu"><button id="siteMenuSearchGo" type="button">Go</button><small id="siteMenuSearchCount" class="menuSearchCount">Ready</small></div></div>':'';

  let html='<div class="sitePreview">\
<header class="siteHead"><div class="siteHeadMain"><div class="siteLogo">'+esc(s.site_name||s.siteName||title)+'</div></div>'+menuBar+'</header>\
'+heroHtml(title,slug,statusText,desc,heroBlock)+'\
<main class="siteBody '+layoutClass+'">\
'+(leftNav?'<nav class="sideNav" aria-label="Left page menu">'+leftNav+'</nav>':'')+'\
<section class="blockGrid">'+blockHtml+'</section>\
'+(rightNav?'<nav class="sideNav right" aria-label="Right page menu">'+rightNav+'</nav>':'')+'\
</main>\
<footer class="siteFoot"><strong>'+esc(s.footer_title||s.footerTitle||s.site_name||title)+'</strong><small>'+esc(s.footer_text||s.footerText||'Web Builder owned preview.')+'</small></footer>\
</div>';

  $('previewFrame').innerHTML=html;

  hydrateInlineForms();
  hydrateRatings();
  hydrateMenuSearch();
  debug();
}

function localFallback(){
  let slug=currentSlug();

  page={
    id:'local-preview-'+slug,
    slug:slug,
    title:slug.replace(/-/g,' ').replace(/\b\w/g,function(m){return m.toUpperCase();}),
    status:'draft',
    owner_id:authState.userId,
    settings_json:{
      description:'Local fallback preview. Load Supabase to render the saved page.',
      menu_label:slug,
      menu_icon:'page',
      show_in_menu:true,
      sort_order:100
    },
    content_json:[
      {
        type:'text',
        title:'Local fallback',
        body:'This fallback creates nothing and saves nothing. It only proves the preview shell is working.'
      }
    ]
  };

  pageOwnerId=authState.userId;
  menuRows=[page];
  mode='local-fallback';

  renderPage();
  status('Rendered local fallback. No Supabase write happened.','good');
}

async function loadLive(){
  try{
    let slug=currentSlug();

    status('Loading owned preview for '+slug+'...','');

    let found=await readPageBySlug(slug);

    if(!found){
      page=null;
      pageOwnerId='';
      mode='not-found';
      $('previewFrame').innerHTML='<section class="previewBlock"><h3>Page not found in this workspace</h3><p>The requested slug is not available for this account: '+esc(slug)+'</p><p><a class="btn primary" href="'+ROUTES.pages+'">Open Owned Pages</a></p></section>';
      status('Page not found in this workspace: '+slug,'bad');
      debug();
      return;
    }

    page=found;
    pageOwnerId=found.owner_id||'';

    menuRows=await readMenuRows(pageOwnerId);

    mode='supabase';

    $('slug').value=slugify(page.slug);

    updateLinks();
    renderPage();

    status('Loaded owned preview for '+slugify(page.slug)+'.','good');
  }catch(e){
    lastError=e&&e.message?e.message:String(e);
    status('Load failed: '+lastError,'bad');
    debug();
  }
}

function updateLinks(){
  let l=links(currentSlug());

  $('linkBox').textContent=JSON.stringify(l,null,2);
  let studioTop=$('studioTop');
  if(studioTop)studioTop.href=l.canonicalStudio;
}

async function copyReport(){
  let text=$('debug')?$('debug').textContent:JSON.stringify(authState,null,2);

function renderLocked(reason,options){
  authState.checked=true;
  authState.allowed=false;
  authState.reason=reason||authState.reason;

  options=options||{};

  document.body.innerHTML='<main class="lockedScreen">\
<section class="hero">\
<span class="badge bad">Owned Preview locked</span>\
<h1>Page owner access required</h1>\
<p>This preview opens only for platform owner and eligible Web Builder creator accounts. Creator users can only preview their own workspace pages.</p>\
<div class="panel"><b>Reason</b><p>'+esc(authState.reason)+'</p></div>\
<div class="actions">\
<a class="btn primary" href="'+ROUTES.hub+'">Web Builder Hub</a>\
<a class="btn" href="'+ROUTES.pages+'">Owned Pages</a>\
<a class="btn" href="settings-platform-control-hub-v7-12-85-test.html">Back to Settings</a>\
</div>\
<h2>Debug</h2>\
<pre class="debug">'+esc(JSON.stringify(Object.assign({},authState,{redirectTo:redirectTo,redirectSlug:redirectSlug}),null,2))+'</pre>\
</section>\
</main>';
}

async function boot(){
  try{
    let authority=await readAuthority();

    authState.signedIn=authority.signedIn;

    if(!authority.signedIn){
      renderLocked('Sign in required before opening Owned Preview.');
      return;
    }

    user=authority.user;
    profile=authority.profile||{};

    authState.userId=user.id;
    authState.email=user.email||'';
    authState.role=profile.role||'';
    authState.adminLevel=profile.admin_level||'';
    authState.planKey=profile.plan_key||'';
    authState.accountStatus=profile.account_status||'active';
    authState.isPlatformOwner=isPlatformOwnerProfile(profile);
    authState.canUseBuilder=builderAllowed(profile);
    authState.workspace=authState.isPlatformOwner?'platform-owner-any-workspace':'personal-owner-id-only';

    if(!authState.canUseBuilder){
      renderLocked('Web Builder plan or permission required.');
      return;
    }

    let initialSlug=requestedSlugFromUrl();

    if(await applyReservedSlugRedirect(initialSlug)){
      return;
    }

    authState.checked=true;
    authState.allowed=true;
    authState.reason='Allowed. Owned Preview page-owner lock passed.';

    renderShell();

    await loadLive();
  }catch(e){
    authState.reason=e&&e.message?e.message:String(e);
    lastError=authState.reason;
    renderLocked('Owned Preview lock check failed: '+authState.reason);
  }
}

boot();
