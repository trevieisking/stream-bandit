<style>
:root{color-scheme:dark;--bg:#050711;--p:#101529;--p2:#17122d;--line:#ffffff22;--muted:#b9c0d8;--accent:#22d3a6;--accent2:#7c3cff;--pink:#ff2d85;--warn:#ffb142;--btnText:#fff;--fontScale:1}*{box-sizing:border-box;min-width:0}html,body{max-width:100vw;overflow-x:hidden}body{margin:0;padding:14px;background:radial-gradient(circle at 8% 0,color-mix(in srgb,var(--accent),transparent 72%),transparent 34%),radial-gradient(circle at 92% 0,color-mix(in srgb,var(--accent2),transparent 66%),transparent 38%),var(--bg);color:#fff;font-family:Inter,system-ui,Arial,sans-serif;font-size:calc(15px * var(--fontScale))}.wrap{max-width:1480px;margin:auto}.hero,.box,.movie,.card{border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,var(--p),var(--p2));box-shadow:0 14px 48px #0007;padding:16px;margin-bottom:14px}.badge,.pill{display:inline-flex;border-radius:999px;background:#22d3a624;border:1px solid #22d3a657;color:#baf7df;font-weight:950}.badge{padding:6px 10px;font-size:12px}.pill{padding:5px 8px;font-size:12px;margin:2px}h1{font-size:clamp(38px,5.2vw,66px);line-height:.95;margin:9px 0;letter-spacing:-.055em}h2{margin:0 0 10px}.muted,p,small{color:var(--muted);line-height:1.45}.btn{border:0;border-radius:999px;padding:10px 14px;background:#414667;color:var(--btnText);font-weight:950;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#061017}.hot{background:linear-gradient(135deg,var(--pink),var(--accent2))}.warn{background:linear-gradient(135deg,var(--warn),var(--accent2));color:#111}.status,.note{padding:10px 12px;border-radius:16px;background:#22d3a61a;border:1px solid #22d3a647;color:#dfffee;font-weight:850;margin-top:10px}.note{background:#ffb1421f;border-color:#ffb14252;color:#ffe7ad}.heroGrid{display:grid;grid-template-columns:minmax(300px,1fr) minmax(300px,420px);gap:16px}.art{border:1px solid #ffffff1a;border-radius:26px;background:linear-gradient(135deg,#22d3a61f,#7c3cff2d);min-height:240px;display:grid;place-items:center}.artIcon{font-size:76px}.grid,.movieGrid,.stats{display:grid;gap:12px}.movieGrid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}.stats{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}.movie{padding:0;overflow:hidden}.card{background:#ffffff0f;box-shadow:none}.card b{display:block;color:#baf7df;margin-bottom:8px}.controls,.actions{display:flex;gap:9px;flex-wrap:wrap}.input,.select{border:1px solid #ffffff24;border-radius:999px;background:#0004;color:#fff;padding:12px 14px;font-weight:850}.input{flex:1;min-width:260px}.thumb{aspect-ratio:16/9;background:#ffffff10;display:grid;place-items:center;color:#b9c0d8;overflow:hidden;text-align:center}.thumb img{width:100%;height:100%;object-fit:cover}.body{padding:14px}.body h3{margin:0 0 8px}.body p{font-size:13px;margin:0 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.micro{text-align:center;color:#8f98b8;margin:22px 0}@media(max-width:980px){body{padding:10px}.heroGrid{grid-template-columns:1fr}.btn{width:100%}.art{min-height:210px}.input{min-width:0;width:100%}}
</style>

<body data-sb-likes-menu-url="likes-clean-machine-v7-12-42-test.html">
<div class="wrap">
<section class="hero"><div class="heroGrid"><div><span class="badge">V7.12.157 Likes · Real Save Table</span><h1>My Likes</h1><p>Reads your actual <b>sb_likes</b> rows, then loads the matching movies.</p><div class="actions"><button id="reload" class="btn primary" type="button">Reload Likes</button><a class="btn hot" href="library-global-helpers-v7-4-8-test.html">Browse Library</a><a class="btn warn" href="watchlist-clean-machine-v7-12-43-test.html">Watchlist</a><a class="btn" href="favourites-clean-machine-v7-12-41-test.html">Favourites</a></div><div id="status" class="status">Loading Likes...</div><div id="helperStatus" class="note">Checking foundation...</div></div><div class="art"><div class="artIcon">👍✅</div></div></div></section>
<section class="box"><h2>Liked titles</h2><div class="controls"><input id="localSearch" class="input" placeholder="Filter liked titles..."><select id="sort" class="select"><option value="saved">Recently saved</option><option value="title">Title A-Z</option><option value="year">Year</option></select></div><div id="stats" class="stats" style="margin-top:14px"></div><div id="grid" class="movieGrid" style="margin-top:14px"></div></section>
<p class="micro">Likes refit: Header Shell + Likes Content + Footer Shell. Reads sb_likes.</p>
</div>
<script src="stream-bandit-shell-v6-24.js?v=likes-real-1"></script>
<script src="stream-bandit-theme-projector-v7-12-156.js?v=likes-real-1"></script>
<script src="stream-bandit-header-shell-v7-12-156.js?v=likes-real-1"></script>
<script src="stream-bandit-footer-shell-v7-12-156.js?v=likes-real-1"></script>
<script src="stream-bandit-core-saves-v6-75.js?v=likes-real-1"></script>
<script src="stream-bandit-menu-saves-count-v6-72-1.js?v=likes-real-1"></script>
<script src="live-readiness-search-supabase-fallback-v7-12-130.js?v=likes-real-1"></script>
<script>
(function(){'use strict';
const TABLE='sb_likes',DETAILS='details-clean-machine-v7-12-38-test.html',PLAYER='player-one-global-helpers-v7-3-3-test.html';
let client=null,user=null,savedRows=[],movies=[];const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]||c));}
function poster(m){return m.thumbnail_url||m.poster_url||m.poster||m.thumb||m.image_url||m.backdrop_url||'';}function firstUrl(m){return m.video_url||m.mux_playback_url||m.stream_url||m.url||'';}function yearVal(m){return m.year||m.release_year||(m.release_date?String(m.release_date).slice(0,4):'');}
async function getClient(){if(client)return client;let c=window.StreamBanditSupabaseConfig||(window.StreamBanditShell&&window.StreamBanditShell.config&&window.StreamBanditShell.config());if(!c||!c.url||!c.key)throw new Error('Missing public config bridge');client=supabase.createClient(c.url,c.key);let got=await client.auth.getUser();user=got&&got.data&&got.data.user?got.data.user:null;return client;}
function card(m){let id=encodeURIComponent(String(m.id||'')),img=poster(m),play=firstUrl(m);return '<article class="movie"><div class="thumb">'+(img?'<img src="'+esc(img)+'" loading="lazy" alt="">':'No artwork')+'</div><div class="body"><h3>'+esc(m.title||'Untitled')+'</h3><p>'+esc(m.description||m.summary||'No description yet.')+'</p><div>'+(yearVal(m)?'<span class="pill">'+esc(yearVal(m))+'</span>':'')+'</div><div class="actions"><a class="btn primary" href="'+DETAILS+'?id='+id+'">Details</a><a class="btn hot" href="'+PLAYER+'?id='+id+(play?'&src='+encodeURIComponent(play):'')+'">Play</a></div></div></article>';}
function render(){let q=$('localSearch').value.toLowerCase();let list=movies.filter(m=>!q||[m.title,m.description,yearVal(m)].join(' ').toLowerCase().includes(q));if($('sort').value==='title')list.sort((a,b)=>String(a.title||'').localeCompare(String(b.title||'')));if($('sort').value==='year')list.sort((a,b)=>String(yearVal(b)||'').localeCompare(String(yearVal(a)||'')));$('stats').innerHTML='<div class="card"><b>Showing</b><p>'+list.length+'</p></div><div class="card"><b>Saved rows</b><p>'+savedRows.length+'</p></div><div class="card"><b>Signed in</b><p>'+(user?'Yes':'No')+'</p></div>';$('grid').innerHTML=list.map(card).join('')||'<div class="note">No liked movies found yet.</div>';}
async function load(){try{let sb=await getClient();if(!user){$('status').textContent='Please open Profile and sign in to view your Likes.';movies=[];savedRows=[];render();return;}let r=await sb.from(TABLE).select('movie_id,created_at').eq('user_id',user.id).order('created_at',{ascending:false}).limit(1000);if(r.error)throw r.error;savedRows=r.data||[];let ids=[...new Set(savedRows.map(x=>String(x.movie_id)).filter(Boolean))];if(!ids.length){movies=[];$('status').textContent='Likes loaded: no saved titles yet.';render();return;}let mr=await sb.from('sb_movies').select('*').in('id',ids).limit(1000);if(mr.error)throw mr.error;let byId=new Map((mr.data||[]).map(m=>[String(m.id),m]));movies=ids.map(id=>byId.get(id)).filter(Boolean);$('status').textContent='Likes loaded: '+movies.length+' saved movies.';render();try{if(window.StreamBanditMenuSavesCount&&window.StreamBanditMenuSavesCount.refresh)window.StreamBanditMenuSavesCount.refresh();if(window.StreamBanditHeaderShell&&window.StreamBanditHeaderShell.updateCounts)window.StreamBanditHeaderShell.updateCounts();}catch(e){}}catch(e){$('status').textContent='Likes load note: '+(e.message||e);$('grid').innerHTML='<div class="note">Saved titles could not load yet.</div>';}}
function helper(){try{if(window.StreamBanditThemeProjector&&window.StreamBanditThemeProjector.refresh)window.StreamBanditThemeProjector.refresh();if(window.StreamBanditHeaderShell&&window.StreamBanditHeaderShell.refresh)window.StreamBanditHeaderShell.refresh();if(window.StreamBanditFooterShell&&window.StreamBanditFooterShell.refresh)window.StreamBanditFooterShell.refresh();if(window.StreamBanditMenuSavesCount&&window.StreamBanditMenuSavesCount.refresh)window.StreamBanditMenuSavesCount.refresh();}catch(e){}$('helperStatus').innerHTML='<b>Foundation:</b> Header '+(window.StreamBanditHeaderShell?'✅':'⚠️')+' · Footer '+(window.StreamBanditFooterShell?'✅':'⚠️')+' · Full search '+(window.StreamBanditLiveReadinessSearchFallback?'✅':'⚠️')+' · Table '+TABLE;}
function wire(){$('reload').onclick=load;$('localSearch').oninput=render;$('sort').oninput=render;window.addEventListener('streambandit-core-saves-changed',load);window.addEventListener('streambandit:page-saves-changed',load);window.addEventListener('streambandit:details-saves-changed',load);}wire();helper();load();setTimeout(helper,700);setTimeout(helper,1800);setInterval(helper,5000);
})();
</script>
</body>
